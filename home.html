 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Nemi Mart | Premium Ayurveda</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        /* ==========================================================================
           1. CSS VARIABLES & BASE SETUP (ENTERPRISE PREMIUM LAYOUT)
           ========================================================================== */
        :root {
            --creme: #FFFDF5;
            --gold: #D4AF37;
            --gold-light: #F3E5AB;
            --dark-green: #1B3022;
            --leaf-green: #2D5A27;
            --leaf-light: #eaf2e9;
            --white: #ffffff;
            --text-dark: #333333;
            --text-muted: #888888;
            --soft-shadow: 0 10px 40px rgba(0,0,0,0.06);
            --card-shadow: 0 15px 35px rgba(27,48,34,0.08);
            --hover-shadow: 0 20px 50px rgba(212,175,55,0.2);
            --inner-shadow: inset 0 2px 10px rgba(0,0,0,0.05);
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--creme); color: var(--text-dark); padding-bottom: 100px; overflow-x: hidden; line-height: 1.6; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--creme); }
        ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }

        header { 
            background: rgba(27, 48, 34, 0.95); 
            backdrop-filter: blur(10px);
            padding: 15px 5%; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            box-shadow: 0 4px 30px rgba(0,0,0,0.2); 
            border-bottom: 2px solid var(--gold);
        }
        .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
        
        .logo-area { position: relative; width: 60px; height: 60px; display: flex; justify-content: center; align-items: center; text-decoration: none; transition: var(--transition); }
        .logo-area:hover { transform: scale(1.08) rotate(5deg); }
        .main-logo { width: 45px; z-index: 5; position: relative; filter: drop-shadow(0 0 10px rgba(212,175,55,0.6)); }
        
        .orbit-icons { position: absolute; width: 100%; height: 100%; animation: rotateFull 12s linear infinite; }
        .orbit-icons i { position: absolute; font-size: 10px; color: var(--gold); opacity: 0.8; }
        .oi1 { top: 0; left: 50%; transform: translateX(-50%); } 
        .oi2 { bottom: 0; left: 50%; transform: translateX(-50%); } 
        .oi3 { left: 0; top: 50%; transform: translateY(-50%); } 
        .oi4 { right: 0; top: 50%; transform: translateY(-50%); }
        @keyframes rotateFull { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .address-box { flex: 1; margin-left: 20px; color: white; text-decoration: none; transition: var(--transition); cursor: pointer; }
        .address-box:hover { opacity: 0.9; transform: translateX(5px); }
        .address-box p { font-size: 11px; opacity: 0.7; letter-spacing: 1px; text-transform: uppercase; margin-bottom: -2px; }
        .address-box h4 { font-size: 15px; font-weight: 600; color: var(--gold); display: flex; align-items: center; gap: 6px; }

        .top-actions { display: flex; gap: 20px; font-size: 22px; }
        .top-actions a { color: white; transition: var(--transition); cursor: pointer; position: relative; }
        .top-actions a:hover { color: var(--gold); transform: translateY(-3px); }

        .search-container { position: relative; max-width: 800px; margin: 5px auto 0; cursor: pointer; }
        .search-fake-input { 
            background: white; 
            border-radius: 20px; 
            height: 50px; 
            display: flex; 
            align-items: center; 
            padding: 0 20px; 
            color: var(--text-muted); 
            font-size: 14px; 
            box-shadow: var(--inner-shadow); 
            transition: var(--transition); 
            border: 2px solid transparent; 
        }
        .search-fake-input:hover { border-color: var(--gold); box-shadow: 0 5px 20px rgba(212,175,55,0.2); transform: translateY(-2px); }

        .cat-strip { 
            display: flex; 
            overflow-x: auto; 
            padding: 35px 5%; 
            gap: 25px; 
            background: white; 
            scrollbar-width: none; 
            border-bottom: 1px solid rgba(0,0,0,0.05);
            box-shadow: 0 10px 20px rgba(0,0,0,0.02);
        }
        .cat-strip::-webkit-scrollbar { display: none; }
        .cat-card { text-align: center; min-width: 85px; text-decoration: none; color: var(--dark-green); transition: var(--transition); cursor: pointer; }
        
        .icon-circle { 
            width: 75px; height: 75px; background: var(--leaf-light); 
            border-radius: 24px; display: flex; justify-content: center; 
            align-items: center; margin: 0 auto 12px; border: 2px solid transparent; 
            transition: var(--transition); box-shadow: var(--soft-shadow);
        }
        .cat-card:hover .icon-circle { transform: translateY(-10px) rotate(8deg); background: var(--dark-green); border-color: var(--gold); box-shadow: var(--hover-shadow); }
        .cat-card:hover i { color: var(--gold); transform: scale(1.1); }
        .cat-card:hover span { color: var(--leaf-green); font-weight: 700; }
        
        .cat-card i { font-size: 30px; color: var(--leaf-green); transition: 0.4s; }
        .cat-card span { font-size: 13px; font-weight: 600; display: block; transition: 0.3s; }

        .banner-wrapper { position: relative; margin: 30px auto; width: 95%; max-width: 1200px; overflow: hidden; border-radius: 30px; box-shadow: var(--card-shadow); border: 2px solid rgba(212,175,55,0.2); }
        .banner-container { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; }
        .banner-slide { min-width: 100%; scroll-snap-align: start; position: relative; }
        .banner-slide img { width: 100%; aspect-ratio: 16/7; object-fit: cover; display: block; }

        .section-header { display: flex; justify-content: space-between; align-items: center; padding: 45px 5% 25px; max-width: 1200px; margin: 0 auto; }
        .section-header h2 { font-size: 24px; color: var(--dark-green); font-weight: 800; display: flex; align-items: center; gap: 10px; }
        .section-header h2 i { color: var(--gold); font-size: 20px; }
        
        .view-all { 
            text-decoration: none; color: var(--leaf-green); font-size: 14px; 
            font-weight: 600; background: var(--leaf-light); padding: 8px 18px; 
            border-radius: 12px; transition: var(--transition); cursor: pointer; 
        }
        .view-all:hover { background: var(--dark-green); color: var(--gold); border-color: var(--gold); transform: translateY(-2px); }

        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 0 5%; max-width: 1200px; margin: 0 auto; min-height: 200px; }
        @media (min-width: 768px) { .product-grid { grid-template-columns: repeat(3, 1fr); gap: 20px; } }
        @media (min-width: 1024px) { .product-grid { grid-template-columns: repeat(4, 1fr); gap: 25px; } }

        .p-card { 
            background: white; border-radius: 24px; padding: 18px; 
            box-shadow: var(--soft-shadow); transition: var(--transition); 
            border: 1px solid rgba(0,0,0,0.03); display: flex; 
            flex-direction: column; position: relative; overflow: hidden;
            animation: fadeInUp 0.8s ease forwards; cursor: pointer; 
        }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        .p-card:hover { transform: translateY(-10px); border-color: var(--gold); box-shadow: var(--hover-shadow); z-index: 10; }

        .p-img-box { 
            width: 100%; aspect-ratio: 1/1; background: #fbfbfb; 
            border-radius: 18px; margin-bottom: 15px; display: flex; 
            align-items: center; justify-content: center; overflow: hidden; 
        }
        .p-img-box img { max-width: 85%; max-height: 85%; object-fit: contain; transition: transform 0.6s; }
        .p-card:hover .p-img-box img { transform: scale(1.1); }

        .discount-badge { position: absolute; top: 10px; left: 10px; background: #ff4757; color: white; font-size: 10px; font-weight: 700; padding: 4px 8px; border-radius: 8px; z-index: 2; }
        .p-tag { font-size: 10px; font-weight: 700; color: var(--gold); text-transform: uppercase; margin-bottom: 8px; }
        .p-title { font-size: 14px; font-weight: 600; color: var(--dark-green); height: 38px; overflow: hidden; margin-bottom: 18px; }
        
        .p-price-row { display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
        .p-price { color: var(--leaf-green); font-weight: 800; font-size: 18px; }
        .p-old-price { font-size: 11px; color: var(--text-muted); text-decoration: line-through; }
        
        .add-btn { 
            background: var(--dark-green); color: white; border: none; 
            width: 40px; height: 40px; border-radius: 12px; cursor: pointer; 
            transition: var(--transition); box-shadow: 0 4px 10px rgba(27,48,34,0.2);
        }
        .add-btn:hover { background: var(--gold); transform: scale(1.1); }
        .add-btn.added { background: var(--leaf-green); pointer-events: none; }

        .bottom-nav { 
            position: fixed; bottom: 0; width: 100%; background: white; 
            display: flex; justify-content: space-around; align-items: center; 
            padding: 12px 0 15px; box-shadow: 0 -10px 30px rgba(0,0,0,0.08); 
            border-radius: 30px 30px 0 0; z-index: 2000; 
        }
        .nav-item { text-align: center; text-decoration: none; color: #a0a0a0; font-size: 11px; font-weight: 600; flex: 1; }
        .nav-item i { font-size: 24px; display: block; margin-bottom: 5px; }
        .nav-item.active { color: var(--leaf-green); }

        .cart-float { position: relative; margin-top: -65px; }
        .cart-circle { 
            width: 75px; height: 75px; background: var(--leaf-green); 
            border: 8px solid var(--creme); border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; 
            color: white; font-size: 26px; box-shadow: 0 15px 25px rgba(45,90,39,0.4); 
        }
        .badge { position: absolute; top: 2px; right: 5px; background: #ff4757; color: white; font-size: 11px; width: 24px; height: 24px; border-radius: 50%; display: flex; justify-content: center; align-items: center; border: 3px solid white; font-weight: 800; }

        #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 15px; width: 90%; max-width: 400px; pointer-events: none; }
        .nemi-toast { background: var(--dark-green); color: white; padding: 16px 22px; border-radius: 18px; display: flex; align-items: center; gap: 15px; border: 1px solid var(--gold); animation: toastEnter 0.5s ease forwards; }
        @keyframes toastEnter { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

        .loader { text-align: center; padding: 40px; font-size: 18px; color: var(--leaf-green); grid-column: 1 / -1; }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <header>
        <div class="header-top">
            <a href="index.html" class="logo-area">
                <div class="orbit-icons">
                    <i class="fas fa-plus oi1"></i><i class="fas fa-heart oi2"></i><i class="fas fa-star oi3"></i><i class="fas fa-leaf oi4"></i>
                </div>
                <img src="https://raw.githubusercontent.com/nemimart/The-Nemi-Mart/main/logo.png" class="main-logo" alt="Logo">
            </a>
            <div class="address-box" onclick="window.location.href='address.html'">
                <p>Deliver to</p>
                <h4>Akash, Patiala - 147001 <i class="fas fa-chevron-down"></i></h4>
            </div>
            <div class="top-actions">
                <a onclick="window.location.href='heart.html'"><i class="far fa-heart"></i></a>
                <a onclick="window.location.href='profile.html'"><i class="far fa-user-circle"></i></a>
            </div>
        </div>
        <div class="search-container" onclick="window.location.href='search.html'">
            <div class="search-fake-input"><i class="fas fa-search"></i> Search Premium Ayurvedic products...</div>
        </div>
    </header>

    <div class="cat-strip" id="dynamicCategories">
        <div class="cat-card"><div class="icon-circle"><i class="fas fa-leaf"></i></div><span>Ayurveda</span></div>
        <div class="cat-card"><div class="icon-circle"><i class="fas fa-mortar-pestle"></i></div><span>Immunity</span></div>
        <div class="cat-card"><div class="icon-circle"><i class="fas fa-spa"></i></div><span>Skin Care</span></div>
        <div class="cat-card"><div class="icon-circle"><i class="fas fa-tint"></i></div><span>Hair Care</span></div>
    </div>

    <div class="banner-wrapper">
        <div class="banner-container">
            <div class="banner-slide"><img src="https://images.unsplash.com/photo-1615485290382-441e4d0c9cb5?auto=format&fit=crop&w=1200&q=80" alt="Banner"></div>
        </div>
    </div>

    <div class="section-header">
        <h2><i class="fas fa-fire"></i> Top Selling</h2>
        <div class="view-all" onclick="window.location.href='allproduct.html'">View All</div>
    </div>
    <div class="product-grid" id="topSellingGrid">
        <div class="loader">Waking up Servers...</div>
    </div>

    <div class="section-header">
        <h2><i class="fas fa-crown"></i> Premium Range</h2>
        <div class="view-all" onclick="window.location.href='allproduct.html'">View All</div>
    </div>
    <div class="product-grid" id="premiumGrid">
        <div class="loader">Polishing Products...</div>
    </div>

    <nav class="bottom-nav">
        <a href="#" class="nav-item active"><i class="fas fa-home-alt"></i>Home</a>
        <a onclick="window.location.href='allproduct.html'" class="nav-item"><i class="fas fa-store"></i>Shop</a>
        <div class="cart-float"><a onclick="window.location.href='cart.html'"><div class="cart-circle"><i class="fas fa-shopping-basket"></i><div class="badge" id="cartBadge">0</div></div></a></div>
        <a onclick="window.location.href='notifications.html'" class="nav-item"><i class="fas fa-bell"></i>Alerts</a>
        <a onclick="window.location.href='orders.html'" class="nav-item"><i class="fas fa-box-open"></i>Orders</a>
    </nav>

    <script>
        // ==========================================
        // 1. FIREBASE REALTIME DB CONFIG (FIXED FOR RTDB)
        // ==========================================
        const firebaseConfig = {
            databaseURL: "https://nemi-mart-2-default-rtdb.firebaseio.com/"
        };

        // Cloudinary Config (Memory only)
        const cloudConfig = {
            cloudName: "despxo7zb",
            apiKey: "653743323596558"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const database = firebase.database();

        // --- 2. NOTIFICATION SYSTEM ---
        class NotificationSystem {
            static showToast(title, message) {
                const container = document.getElementById('toast-container');
                const toast = document.createElement('div');
                toast.className = 'nemi-toast';
                toast.innerHTML = `
                    <i class="fas fa-check-circle" style="color:#D4AF37"></i>
                    <div class="toast-text">
                        <h4 style="font-size:14px">${title}</h4>
                        <p style="font-size:12px">${message}</p>
                    </div>`;
                container.appendChild(toast);
                setTimeout(() => { toast.remove(); }, 3000);
            }
        }

        // --- 3. CART ENGINE ---
        class CartEngine {
            constructor() {
                this.cartKey = 'nemi_mart_cart_v3';
                this.items = JSON.parse(localStorage.getItem(this.cartKey)) || [];
                this.updateBadge();
            }
            isProductInCart(productId) { return this.items.some(item => item.id === productId); }
            addItem(productStr, event, btnElement) {
                event.stopPropagation();
                const product = JSON.parse(decodeURIComponent(productStr));
                if (this.isProductInCart(product.id)) {
                    NotificationSystem.showToast("Already in Cart", "Check your shopping bag!");
                    return;
                }
                this.items.push({ ...product, qty: 1 });
                localStorage.setItem(this.cartKey, JSON.stringify(this.items));
                this.updateBadge();
                if (btnElement) {
                    btnElement.classList.add('added');
                    btnElement.innerHTML = '<i class="fas fa-check"></i>';
                }
                NotificationSystem.showToast("Added!", `${product.name} is ready for you.`);
            }
            updateBadge() {
                const badge = document.getElementById('cartBadge');
                if (badge) badge.innerText = this.items.length;
            }
        }
        const appCart = new CartEngine();

        // --- 4. DATA RENDERING LOGIC ---
        function createProductCardHTML(product) {
            const productString = encodeURIComponent(JSON.stringify(product));
            const inCartClass = appCart.isProductInCart(product.id) ? 'added' : '';
            const inCartIcon = appCart.isProductInCart(product.id) ? '<i class="fas fa-check"></i>' : '<i class="fas fa-plus"></i>';
            
            // Image fallback: Agar product.image nahi hai toh product.img lo
            const imageSrc = product.image || product.img || 'https://via.placeholder.com/300';
            
            return `
                <div class="p-card" onclick="window.location.href='product-detail.html?id=${product.id}'">
                    <div class="p-img-box">
                        <img src="${imageSrc}" alt="${product.name}">
                    </div>
                    <div class="p-tag">${product.tag || 'Organic'}</div>
                    <div class="p-title">${product.name}</div>
                    <div class="p-price-row">
                        <div class="p-price">
                            ₹${product.price}
                            ${product.oldPrice ? `<span class="p-old-price">₹${product.oldPrice}</span>` : ''}
                        </div>
                        <button class="add-btn ${inCartClass}" onclick="appCart.addItem('${productString}', event, this)">
                            ${inCartIcon}
                        </button>
                    </div>
                </div>`;
        }

        // --- 5. THE FETCH ENGINE (REALTIME DATABASE) ---
        function loadHomeProducts() {
            const productsRef = database.ref('products');
            
            productsRef.on('value', (snapshot) => {
                const data = snapshot.val();
                const topGrid = document.getElementById('topSellingGrid');
                const premiumGrid = document.getElementById('premiumGrid');
                
                if (!data) {
                    topGrid.innerHTML = '<div class="loader">No Products Found.</div>';
                    premiumGrid.innerHTML = '<div class="loader">No Products Found.</div>';
                    return;
                }

                topGrid.innerHTML = '';
                premiumGrid.innerHTML = '';

                // Firebase RTDB returns object, convert to array
                const productList = Object.keys(data).map(key => ({
                    id: key,
                    ...data[key]
                }));

                // Logic to show products
                productList.forEach(prod => {
                    const card = createProductCardHTML(prod);
                    
                    // Filter based on your DB fields
                    if(prod.isTopSelling === true || prod.isTopSelling === "true") {
                        topGrid.innerHTML += card;
                    }
                    if(prod.isPremium === true || prod.isPremium === "true") {
                        premiumGrid.innerHTML += card;
                    }
                });

                // Agar dono grid abhi bhi khali hain (yani flags nahi mile), toh random 4-4 dikha do
                if(topGrid.innerHTML === '') {
                    productList.slice(0, 4).forEach(p => topGrid.innerHTML += createProductCardHTML(p));
                }
                if(premiumGrid.innerHTML === '') {
                    productList.slice(4, 8).forEach(p => premiumGrid.innerHTML += createProductCardHTML(p));
                }

            }, (error) => {
                console.error("Database Error: ", error);
                document.getElementById('topSellingGrid').innerHTML = '<div class="loader">Access Denied / Network Error</div>';
            });
        }

        // Bootstrapping
        window.onload = loadHomeProducts;
    </script>
</body>
</html>
