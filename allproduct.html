<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Nemi Mart | Exclusive Premium Shop</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">

    <style>
        /* ==========================================================================
           1. CSS VARIABLES & THEME CONFIGURATION
           ========================================================================== */
        :root {
            --primary-dark: #0f1c13;
            --primary: #1B3022;
            --primary-light: #2c4c36;
            --accent-gold: #D4AF37;
            --accent-gold-hover: #f0c946;
            --success-green: #27ae60;
            --danger-red: #e74c3c;
            --bg-main: #FFFDF5;
            --bg-card: #FFFFFF;
            --text-dark: #1a1a1a;
            --text-muted: #8898aa;
            --font-sans: 'Poppins', sans-serif;
            --font-serif: 'Playfair Display', serif;
            --shadow-sm: 0 5px 15px rgba(0,0,0,0.05);
            --shadow-md: 0 12px 35px rgba(0,0,0,0.08);
            --shadow-lg: 0 20px 50px rgba(27, 48, 34, 0.15);
            --shadow-gold: 0 10px 25px rgba(212, 175, 55, 0.2);
            --radius-sm: 12px;
            --radius-md: 20px;
            --radius-lg: 30px;
            --radius-pill: 50px;
            --transition-smooth: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-main);
            color: var(--text-dark);
            line-height: 1.6;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-main); }
        ::-webkit-scrollbar-thumb { background: var(--accent-gold); border-radius: 10px; }

        /* ==========================================================================
           3. PREMIUM HEADER
           ========================================================================== */
        header {
            background: var(--primary);
            height: 90px;
            padding: 0 6%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: var(--shadow-md);
            border-bottom: 3px solid var(--accent-gold);
        }

        .brand-zone { display: flex; align-items: center; gap: 15px; }

        .back-btn {
            width: 45px; height: 45px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: #fff; cursor: pointer; transition: var(--transition-smooth);
        }

        .back-btn:hover { background: var(--accent-gold); color: var(--primary); transform: translateX(-3px); }

        .brand-zone h1 {
            font-family: var(--font-serif);
            color: var(--accent-gold);
            font-size: 26px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .cart-zone {
            position: relative;
            background: var(--bg-card);
            width: 50px; height: 50px;
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: var(--transition-smooth);
        }

        .cart-badge {
            position: absolute; top: -8px; right: -8px;
            background: var(--accent-gold); color: var(--primary);
            font-size: 13px; font-weight: 800;
            min-width: 26px; height: 26px;
            border-radius: 50%; border: 3px solid var(--primary);
            display: flex; align-items: center; justify-content: center;
        }

        /* ==========================================================================
           4. HERO & SEARCH
           ========================================================================== */
        .hero-section {
            background: linear-gradient(180deg, #ffffff 0%, var(--bg-main) 100%);
            padding: 30px 6% 10px;
            border-radius: 0 0 40px 40px;
            position: relative; z-index: 10;
        }

        .search-container { position: relative; max-width: 800px; margin: 0 auto; }

        .search-container input {
            width: 100%; height: 65px;
            padding: 0 25px 0 65px;
            background: var(--bg-card);
            border: 2px solid transparent;
            border-radius: var(--radius-lg);
            font-size: 16px; font-weight: 500;
            box-shadow: var(--shadow-md);
            outline: none; transition: var(--transition-smooth);
        }

        .search-container input:focus { border-color: var(--accent-gold); box-shadow: var(--shadow-gold); }

        .search-icon { position: absolute; left: 25px; top: 50%; transform: translateY(-50%); color: var(--accent-gold); font-size: 22px; }

        .filter-wrapper { margin-top: 25px; display: flex; overflow-x: auto; gap: 12px; padding-bottom: 15px; scrollbar-width: none; }
        .filter-wrapper::-webkit-scrollbar { display: none; }

        .cat-btn {
            padding: 12px 26px; background: var(--bg-card); border-radius: var(--radius-pill);
            font-size: 14px; font-weight: 600; color: var(--text-muted);
            white-space: nowrap; cursor: pointer; transition: var(--transition-smooth);
            box-shadow: var(--shadow-sm);
        }

        .cat-btn.active { background: var(--primary); color: #fff; box-shadow: 0 8px 20px rgba(27, 48, 34, 0.3); }

        /* ==========================================================================
           5. PRODUCT GRID
           ========================================================================== */
        .shop-container { padding: 40px 6% 100px; max-width: 1400px; margin: 0 auto; }

        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 25px; }

        .product-card {
            background: var(--bg-card); border-radius: var(--radius-md);
            padding: 18px; position: relative;
            transition: var(--transition-smooth);
            animation: fadeUp 0.6s ease forwards;
            border: 1px solid rgba(0,0,0,0.02);
        }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .product-card:hover { transform: translateY(-10px); box-shadow: var(--shadow-lg); border-color: var(--accent-gold); }

        .image-box {
            width: 100%; height: 220px;
            background: #fdfdfd; border-radius: var(--radius-sm);
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 18px; overflow: hidden; cursor: pointer;
        }

        .image-box img { width: 100%; height: 100%; object-fit: cover; transition: 0.8s; }
        .product-card:hover .image-box img { transform: scale(1.1); }

        .product-title { font-size: 18px; font-weight: 700; color: var(--primary); margin: 10px 0; cursor: pointer; }
        .product-title:hover { color: var(--accent-gold); }

        .price-new { font-size: 22px; font-weight: 800; color: var(--success-green); }
        .price-old { font-size: 14px; color: var(--text-muted); text-decoration: line-through; margin-right: 8px; }

        .card-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #eee; padding-top: 15px; }

        .add-btn {
            width: 45px; height: 45px; background: var(--primary);
            color: white; border: none; border-radius: var(--radius-sm);
            cursor: pointer; transition: 0.3s;
        }

        .add-btn:hover { background: var(--accent-gold); color: var(--primary); transform: rotate(90deg); }

        /* Shimmer Loading */
        .shimmer-card { height: 380px; background: #fff; border-radius: 20px; overflow: hidden; }
        .s-img { height: 220px; background: #f0f0f0; animation: shim 1.5s infinite; }
        @keyframes shim { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        #toast-zone { position: fixed; bottom: 30px; right: 30px; z-index: 9999; }
        .toast { background: var(--primary); color: white; padding: 15px 25px; border-radius: 10px; margin-top: 10px; border-left: 5px solid var(--accent-gold); box-shadow: var(--shadow-lg); }

        @media (max-width: 768px) {
            .product-grid { grid-template-columns: repeat(2, 1fr); gap: 15px; }
            .image-box { height: 160px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="brand-zone">
            <div class="back-btn" onclick="window.history.back()"><i class="fas fa-arrow-left"></i></div>
            <h1>Nemi Mart</h1>
        </div>
        <div class="cart-zone" onclick="location.href='cart.html'">
            <i class="fas fa-shopping-bag"></i>
            <span class="cart-badge" id="cartBadge">0</span>
        </div>
    </header>

    <section class="hero-section">
        <div class="search-container">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="searchInput" placeholder="Search premium wellness products...">
        </div>
        <div class="filter-wrapper" id="categoryContainer">
            <div class="cat-btn active">All Products</div>
        </div>
    </section>

    <main class="shop-container">
        <div class="product-grid" id="productGrid">
            <div class="shimmer-card"><div class="s-img"></div></div>
            <div class="shimmer-card"><div class="s-img"></div></div>
            <div class="shimmer-card"><div class="s-img"></div></div>
        </div>
    </main>

    <div id="toast-zone"></div>

    <script>
        const CONFIG = {
            FIREBASE_URL: "https://nemi-mart-2-default-rtdb.firebaseio.com/notifications.json",
            PLACEHOLDER: "https://via.placeholder.com/300?text=Nemi+Mart"
        };

        let AppState = {
            products: [],
            categories: new Set(["All"]),
            cartCount: parseInt(localStorage.getItem('nemi_cart_count')) || 0
        };

        // 1. Initial Load
        document.addEventListener('DOMContentLoaded', () => {
            updateBadge();
            loadProducts();
            
            document.getElementById('searchInput').addEventListener('input', (e) => {
                filterItems(e.target.value.toLowerCase());
            });
        });

        // 2. Fetch Data (Firebase + Cloudinary logic)
        async function loadProducts() {
            try {
                const response = await fetch(CONFIG.FIREBASE_URL);
                const data = await response.json();
                
                if (data) {
                    processData(data);
                } else {
                    document.getElementById('productGrid').innerHTML = "<h3>No Products Found</h3>";
                }
            } catch (err) {
                console.error("Fetch Error:", err);
            }
        }

        function processData(data) {
            AppState.products = [];
            Object.keys(data).forEach(key => {
                const item = data[key];
                // Deep scan for products
                if(item.name && item.price) {
                    const prod = {
                        id: key,
                        name: item.name,
                        price: item.price,
                        oldPrice: item.oldPrice || (parseInt(item.price) + 100),
                        // Cloudinary integration: Agar URL mein Cloudinary hai to wahi use hoga
                        img: item.img || item.image || item.cloudinary_url || CONFIG.PLACEHOLDER,
                        category: item.category || "General"
                    };
                    AppState.products.push(prod);
                    AppState.categories.add(prod.category);
                }
            });
            renderCategories();
            renderUI(AppState.products);
        }

        // 3. Render Functions
        function renderCategories() {
            const container = document.getElementById('categoryContainer');
            container.innerHTML = "";
            AppState.categories.forEach(cat => {
                const btn = document.createElement('div');
                btn.className = `cat-btn ${cat === 'All' ? 'active' : ''}`;
                btn.innerText = cat;
                btn.onclick = () => {
                    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    const filtered = cat === 'All' ? AppState.products : AppState.products.filter(p => p.category === cat);
                    renderUI(filtered);
                };
                container.appendChild(btn);
            });
        }

        function renderUI(items) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = "";

            items.forEach(prod => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <div class="image-box" onclick="goToProduct('${prod.id}')">
                        <img src="${prod.img}" alt="${prod.name}" loading="lazy">
                    </div>
                    <div class="product-info">
                        <p style="font-size:12px; color:var(--accent-gold); font-weight:700;">${prod.category.toUpperCase()}</p>
                        <h3 class="product-title" onclick="goToProduct('${prod.id}')">${prod.name}</h3>
                        <div class="card-footer">
                            <div>
                                <span class="price-old">₹${prod.oldPrice}</span>
                                <span class="price-new">₹${prod.price}</span>
                            </div>
                            <button class="add-btn" onclick="addCart('${prod.name}')">
                                <i class="fas fa-plus"></i>
                            </button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // 4. Interaction Logic
        function goToProduct(id) {
            // Product page pe redirect with ID
            window.location.href = `product.html?id=${id}`;
        }

        function addCart(name) {
            AppState.cartCount++;
            localStorage.setItem('nemi_cart_count', AppState.cartCount);
            updateBadge();
            showToast(`${name} added to cart!`);
        }

        function updateBadge() {
            const b = document.getElementById('cartBadge');
            b.innerText = AppState.cartCount;
            b.style.transform = "scale(1.2)";
            setTimeout(() => b.style.transform = "scale(1)", 200);
        }

        function filterItems(query) {
            const filtered = AppState.products.filter(p => 
                p.name.toLowerCase().includes(query) || 
                p.category.toLowerCase().includes(query)
            );
            renderUI(filtered);
        }

        function showToast(msg) {
            const zone = document.getElementById('toast-zone');
            const t = document.createElement('div');
            t.className = 'toast';
            t.innerText = msg;
            zone.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }
    </script>
</body>
</html>
