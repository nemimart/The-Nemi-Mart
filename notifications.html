<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nemi Mart | Premium Updates</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root {
            --gold: #D4AF37;
            --gold-gradient: linear-gradient(135deg, #D4AF37 0%, #F1D27B 100%);
            --cream-bg: #FCFBF7;
            --card-white: #FFFFFF;
            --deep-slate: #1E293B;
            --success-green: #059669;
            --soft-red: #FFF1F2;
            --text-main: #0F172A;
            --text-muted: #64748B;
            --shadow-lux: 0 20px 25px -5px rgba(212, 175, 55, 0.1), 0 8px 10px -6px rgba(212, 175, 55, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--cream-bg);
            background-image: radial-gradient(circle at 0% 0%, #FFF9E6 0%, transparent 50%),
                              radial-gradient(circle at 100% 100%, #F5F1E6 0%, transparent 50%);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* --- MODERN HEADER --- */
        .navbar {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: sticky; top: 0; z-index: 1000;
            padding: 18px 24px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 4px 30px rgba(0,0,0,0.03);
        }

        .nav-brand { display: flex; align-items: center; gap: 15px; }
        
        .back-btn {
            width: 44px; height: 44px; border-radius: 14px;
            background: white; border: 1px solid #E2E8F0;
            display: flex; align-items: center; justify-content: center;
            color: var(--text-main); font-size: 18px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .back-btn:active { transform: scale(0.9); background: #F8FAFC; }

        .nav-title h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 22px; font-weight: 800;
            background: linear-gradient(to right, #1A1A1A, var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* --- FEED LAYOUT --- */
        .container { max-width: 550px; margin: 0 auto; padding: 25px 20px; }

        .feed-header {
            display: flex; justify-content: space-between; align-items: flex-end;
            margin-bottom: 28px; padding: 0 5px;
        }

        .feed-title-group h2 { font-size: 24px; font-weight: 800; font-family: 'Outfit'; }
        .live-indicator {
            display: inline-flex; align-items: center; gap: 6px;
            background: #ECFDF5; color: var(--success-green);
            padding: 4px 10px; border-radius: 50px; font-size: 11px; font-weight: 800;
            letter-spacing: 0.5px; border: 1px solid rgba(5, 150, 105, 0.1);
        }
        .live-dot { width: 6px; height: 6px; background: var(--success-green); border-radius: 50%; animation: pulse 1.5s infinite; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .clear-btn {
            color: #EF4444; font-size: 13px; font-weight: 700; cursor: pointer;
            padding: 8px 12px; border-radius: 10px; transition: 0.2s;
        }
        .clear-btn:hover { background: var(--soft-red); }

        /* --- PREMIUM CARDS --- */
        .notif-card {
            background: var(--card-white);
            border-radius: 26px;
            padding: 24px; margin-bottom: 20px;
            display: flex; gap: 20px;
            position: relative; overflow: hidden;
            box-shadow: var(--shadow-lux);
            border: 1px solid rgba(255, 255, 255, 0.8);
            animation: slideUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) backwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .notif-card::after {
            content: ''; position: absolute; top: 0; left: 0; width: 5px; height: 100%;
            background: var(--gold-gradient);
        }

        .icon-wrapper {
            width: 56px; height: 56px; border-radius: 18px;
            background: #FFFBEB; color: var(--gold);
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; flex-shrink: 0;
            border: 1px solid #FEF3C7;
            box-shadow: inset 0 2px 4px rgba(212, 175, 55, 0.1);
        }

        .content-wrapper { flex: 1; }
        .content-wrapper h3 {
            font-family: 'Outfit', sans-serif;
            font-size: 17px; font-weight: 700; color: var(--text-main);
            margin-bottom: 6px;
        }
        .content-wrapper p {
            font-size: 14.5px; color: var(--text-muted);
            line-height: 1.6; font-weight: 500;
        }

        .meta-info {
            margin-top: 16px; display: flex; align-items: center; gap: 12px;
        }
        .time-badge {
            font-size: 11px; font-weight: 800; color: var(--gold);
            background: #FFFBEB; padding: 4px 10px; border-radius: 8px;
            display: flex; align-items: center; gap: 5px;
            text-transform: uppercase;
        }
        .verified-badge { font-size: 11px; font-weight: 700; color: var(--success-green); display: flex; align-items: center; gap: 4px; }

        .delete-icon {
            width: 34px; height: 34px; border-radius: 10px;
            background: var(--soft-red); color: #EF4444;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; border: none; font-size: 14px;
            transition: all 0.2s ease;
        }
        .delete-icon:hover { background: #EF4444; color: white; transform: rotate(10deg); }

        /* --- STATES --- */
        #loader { text-align: center; padding: 60px; color: var(--gold); }
        
        .empty-state {
            text-align: center; padding: 80px 20px; display: none;
            animation: fadeIn 0.5s ease;
        }
        .empty-state i { font-size: 70px; background: var(--gold-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; opacity: 0.3; }
        .empty-state h3 { font-family: 'Outfit'; font-size: 22px; margin-bottom: 10px; }
        .empty-state p { color: var(--text-muted); font-size: 15px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- TOAST --- */
        .premium-toast {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            background: var(--deep-slate); color: white;
            padding: 14px 28px; border-radius: 18px;
            font-size: 14px; font-weight: 700; z-index: 9999;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            display: none; border: 1px solid rgba(255,255,255,0.1);
            animation: toastUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes toastUp { from { bottom: -20px; opacity: 0; } to { bottom: 40px; opacity: 1; } }

    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-brand">
            <div class="back-btn" onclick="window.history.back()">
                <i class="fa-solid fa-arrow-left"></i>
            </div>
            <div class="nav-title">
                <h1>Nemi Mart</h1>
            </div>
        </div>
        <div class="icon-wrapper" style="width:40px; height:40px; font-size: 18px;">
            <i class="fa-solid fa-bell"></i>
        </div>
    </nav>

    <main class="container">
        <div class="feed-header">
            <div class="feed-title-group">
                <div class="live-indicator">
                    <span class="live-dot"></span> LIVE UPDATES
                </div>
                <h2>Exclusive Feed</h2>
            </div>
            <span class="clear-btn" onclick="clearAll()">Clear All</span>
        </div>

        <div id="loader">
            <i class="fas fa-circle-notch fa-spin fa-2x"></i>
            <p style="margin-top: 15px; font-weight: 700; font-size: 13px; letter-spacing: 1px;">SYNCING SECURELY...</p>
        </div>
        
        <div id="notif-list"></div>

        <div id="empty-view" class="empty-state">
            <i class="fa-solid fa-box-open"></i>
            <h3>You're All Caught Up</h3>
            <p>New arrivals and offers will appear here.</p>
        </div>
    </main>

    <div id="toast" class="premium-toast">Action Successful ✨</div>

    <script>
        // 1. Firebase Configuration
        const firebaseConfig = {
            databaseURL: "https://nemi-mart-2-default-rtdb.firebaseio.com/"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // 2. Load Data Logic
        function loadNotifications() {
            const listDiv = document.getElementById('notif-list');
            const loader = document.getElementById('loader');
            const empty = document.getElementById('empty-view');

            database.ref('notifications').on('value', (snapshot) => {
                loader.style.display = 'none';
                listDiv.innerHTML = '';
                
                const data = snapshot.val();

                if (!data) {
                    empty.style.display = 'block';
                    return;
                }

                empty.style.display = 'none';
                
                // Sorting: Latest entries first
                const entries = Object.entries(data).reverse();

                entries.forEach(([id, item], index) => {
                    const card = document.createElement('div');
                    card.className = 'notif-card';
                    card.style.animationDelay = `${index * 0.1}s`; // Staggered Animation
                    
                    // Logic for Icons
                    let icon = 'fa-star';
                    let iconColor = '#D4AF37';
                    if(item.type === 'new') { icon = 'fa-bag-shopping'; }
                    if(item.type === 'sale') { icon = 'fa-bolt'; }
                    if(item.type === 'order') { icon = 'fa-box-open'; }

                    card.innerHTML = `
                        <div class="icon-wrapper">
                            <i class="fa-solid ${icon}"></i>
                        </div>
                        <div class="content-wrapper">
                            <h3>${item.title || 'Special Update'}</h3>
                            <p>${item.message || 'Something exciting is waiting for you at Nemi Mart!'}</p>
                            <div class="meta-info">
                                <span class="time-badge">
                                    <i class="fa-regular fa-clock"></i> 
                                    ${formatTime(item.timestamp)}
                                </span>
                                <span class="verified-badge">
                                    <i class="fa-solid fa-circle-check"></i> Official
                                </span>
                            </div>
                        </div>
                        <button class="delete-icon" onclick="deleteItem('${id}')">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    `;
                    listDiv.appendChild(card);
                });
            }, (error) => {
                console.error("Firebase Sync Error:", error);
                loader.innerHTML = "<p>Connection Lost. Please Refresh.</p>";
            });
        }

        // 3. Helper Functions
        function formatTime(ts) {
            if (!ts) return "Just Now";
            const diff = Math.floor((Date.now() - ts) / 1000);
            if (diff < 60) return "Just now";
            if (diff < 3600) return Math.floor(diff/60) + "m ago";
            if (diff < 86400) return Math.floor(diff/3600) + "h ago";
            return new Date(ts).toLocaleDateString();
        }

        function deleteItem(id) {
            event.stopPropagation();
            database.ref('notifications/' + id).remove()
                .then(() => showToast("Removed from feed"));
        }

        function clearAll() {
            if(confirm("Clear all notifications from your history?")) {
                database.ref('notifications').remove()
                    .then(() => showToast("Inbox Cleared ✨"));
            }
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.display = 'block';
            setTimeout(() => { 
                t.style.animation = 'fadeOut 0.4s forwards';
                setTimeout(() => { 
                    t.style.display = 'none'; 
                    t.style.animation = 'toastUp 0.4s forwards';
                }, 400);
            }, 2500);
        }

        // Initialize App
        window.onload = loadNotifications;
    </script>
</body>
</html>
