 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nemi Mart | Voice-Enabled Discover</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Outfit:wght@600;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #1A3E26;
            --accent: #D4AF37;
            --bg-glass: rgba(255, 255, 255, 0.95);
            --text-main: #0A1F13;
            --text-muted: #64748B;
            --card-shadow: 0 20px 40px rgba(0,0,0,0.06);
            --gold-gradient: linear-gradient(135deg, #D4AF37 0%, #B8860B 100%);
            --wave-color: rgba(212, 175, 55, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            background: #FDFBF7; 
            color: var(--text-main); 
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
        }

        /* --- STICKY NAV --- */
        .nav-container {
            position: sticky; top: 0; z-index: 2000;
            background: var(--bg-glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 20px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
        }

        .search-wrapper {
            display: flex;
            align-items: center;
            background: #f0f2f1;
            padding: 14px 20px;
            border-radius: 24px;
            gap: 12px;
            border: 2px solid transparent;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .search-wrapper:focus-within {
            background: #ffffff;
            border-color: var(--accent);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.15);
            transform: translateY(-2px);
        }

        .search-input {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 16px;
            font-weight: 600;
            outline: none;
            color: var(--text-main);
        }

        .voice-btn {
            background: none;
            border: none;
            color: var(--accent);
            font-size: 18px;
            cursor: pointer;
            padding: 5px;
            transition: 0.3s;
        }

        /* --- VOICE OVERLAY & ANIMATION --- */
        .voice-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(26, 62, 38, 0.98);
            z-index: 3000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            backdrop-filter: blur(10px);
        }

        .listening-text {
            font-family: 'Outfit';
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 40px;
            letter-spacing: 1px;
        }

        .wave-container {
            display: flex;
            align-items: center;
            gap: 8px;
            height: 60px;
        }

        .wave-bar {
            width: 6px;
            height: 20px;
            background: var(--accent);
            border-radius: 10px;
            animation: wave-anim 1s ease-in-out infinite;
        }

        @keyframes wave-anim {
            0%, 100% { height: 20px; }
            50% { height: 60px; }
        }

        .wave-bar:nth-child(2) { animation-delay: 0.1s; }
        .wave-bar:nth-child(3) { animation-delay: 0.2s; }
        .wave-bar:nth-child(4) { animation-delay: 0.3s; }
        .wave-bar:nth-child(5) { animation-delay: 0.4s; }

        .close-voice {
            position: absolute; bottom: 50px;
            background: rgba(255,255,255,0.1);
            padding: 15px 30px; border-radius: 50px;
            font-weight: 700; cursor: pointer;
        }

        /* --- PRODUCT GRID --- */
        .discover-section { padding: 25px 20px; }
        .section-header h2 { font-family: 'Outfit'; font-size: 19px; font-weight: 800; color: var(--primary); margin-bottom: 15px; }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 18px;
        }

        .p-card {
            background: #ffffff;
            border-radius: 30px;
            padding: 10px;
            box-shadow: var(--card-shadow);
            border: 1px solid rgba(0,0,0,0.03);
            text-decoration: none; color: inherit;
            transition: 0.3s;
        }

        .p-card:active { transform: scale(0.96); }

        .p-img-box {
            width: 100%; height: 150px;
            border-radius: 24px; overflow: hidden;
            background: #f4f4f4;
        }
        .p-img-box img { width: 100%; height: 100%; object-fit: cover; }

        .p-info { padding: 12px 5px; }
        .p-title { font-size: 14px; font-weight: 700; color: var(--primary); }
        .p-price { font-size: 16px; font-weight: 800; margin-top: 5px; display: block; }

        #suggestionBox {
            background: white; margin: 10px 20px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: none; flex-direction: column; overflow: hidden;
        }

        .s-item { padding: 15px 20px; font-weight: 600; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; gap: 10px; }

    </style>
</head>
<body>

    <div class="voice-overlay" id="voiceOverlay">
        <div class="listening-text" id="statusText">Listening...</div>
        <div class="wave-container">
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
        </div>
        <div class="close-voice" onclick="stopVoiceSearch()">Cancel</div>
    </div>

    <div class="nav-container">
        <div class="search-wrapper">
            <i class="fa-solid fa-magnifying-glass" style="color: var(--text-muted);"></i>
            <input type="text" id="mainSearch" class="search-input" placeholder="Say 'Honey' or 'Saffron'..." oninput="magicSearch()">
            <button class="voice-btn" onclick="startVoiceSearch()"><i class="fa-solid fa-microphone"></i></button>
        </div>
    </div>

    <div id="suggestionBox"></div>

    <main class="discover-section">
        <div id="defaultTags">
            <div class="section-header"><h2>Popular Searches</h2></div>
            <div style="display: flex; gap: 10px; overflow-x: auto; padding-bottom: 20px;">
                <button onclick="fillSearch('Honey')" style="padding: 10px 20px; border-radius: 50px; border: 1px solid #ddd; background: white; font-weight: 700; white-space: nowrap;">🍯 Wild Honey</button>
                <button onclick="fillSearch('Kesar')" style="padding: 10px 20px; border-radius: 50px; border: 1px solid #ddd; background: white; font-weight: 700; white-space: nowrap;">🌸 Kashmiri Saffron</button>
                <button onclick="fillSearch('Oil')" style="padding: 10px 20px; border-radius: 50px; border: 1px solid #ddd; background: white; font-weight: 700; white-space: nowrap;">💧 Pure Oil</button>
            </div>
        </div>

        <div class="results-grid" id="mainGrid"></div>
    </main>

    <script>
        const database = [
            { id: 1, name: "Pure Kashmiri Kesar", price: "₹499", cat: "Luxury", img: "https://images.unsplash.com/photo-1599307734170-4d372579120a?q=80&w=500" },
            { id: 2, name: "Organic Forest Honey", price: "₹320", cat: "Healthy", img: "https://images.unsplash.com/photo-1587049352846-4a222e784d38?q=80&w=500" },
            { id: 3, name: "California Walnuts", price: "₹750", cat: "Dry Fruit", img: "https://images.unsplash.com/photo-1585241936939-be4099591252?q=80&w=500" },
            { id: 4, name: "Cold Pressed Coconut Oil", price: "₹550", cat: "Oils", img: "https://images.unsplash.com/photo-1620981195759-397753fc801d?q=80&w=500" }
        ];

        // --- VOICE SEARCH LOGIC ---
        const recognition = window.SpeechRecognition || window.webkitSpeechRecognition ? new (window.SpeechRecognition || window.webkitSpeechRecognition)() : null;

        if (recognition) {
            recognition.lang = 'en-US';
            recognition.continuous = false;
            recognition.interimResults = false;

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                document.getElementById('mainSearch').value = transcript;
                stopVoiceSearch();
                magicSearch(); // Auto-search after speaking
            };

            recognition.onerror = () => {
                document.getElementById('statusText').innerText = "Didn't catch that. Try again!";
                setTimeout(stopVoiceSearch, 2000);
            };
        }

        function startVoiceSearch() {
            if (!recognition) return alert("Bhai, aapka browser voice search support nahi karta!");
            document.getElementById('voiceOverlay').style.display = 'flex';
            document.getElementById('statusText').innerText = "Listening...";
            recognition.start();
        }

        function stopVoiceSearch() {
            document.getElementById('voiceOverlay').style.display = 'none';
            if (recognition) recognition.stop();
        }

        // --- SEARCH ENGINE ---
        function magicSearch() {
            const query = document.getElementById('mainSearch').value.toLowerCase();
            const grid = document.getElementById('mainGrid');
            const suggestions = document.getElementById('suggestionBox');

            grid.innerHTML = "";
            suggestions.innerHTML = "";

            if(query.length > 0) {
                const matched = database.filter(p => p.name.toLowerCase().includes(query));
                if(matched.length > 0) {
                    suggestions.style.display = "flex";
                    matched.forEach(p => {
                        suggestions.innerHTML += `<div class="s-item" onclick="fillSearch('${p.name}')"><i class="fa-solid fa-clock-rotate-left"></i> ${p.name}</div>`;
                        grid.innerHTML += `
                            <a href="product.html?id=${p.id}" class="p-card">
                                <div class="p-img-box"><img src="${p.img}"></div>
                                <div class="p-info">
                                    <span class="p-title">${p.name}</span>
                                    <span class="p-price">${p.price}</span>
                                </div>
                            </a>`;
                    });
                }
            } else {
                suggestions.style.display = "none";
                renderInitial();
            }
        }

        function fillSearch(val) {
            document.getElementById('mainSearch').value = val;
            magicSearch();
        }

        function renderInitial() {
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = database.map(p => `
                <a href="product.html?id=${p.id}" class="p-card">
                    <div class="p-img-box"><img src="${p.img}"></div>
                    <div class="p-info">
                        <span class="p-title">${p.name}</span>
                        <span class="p-price">${p.price}</span>
                    </div>
                </a>`).join('');
        }

        renderInitial();
    </script>
</body>
</html>
