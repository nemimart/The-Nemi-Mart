 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nemi Mart | Premium Product</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #1B3022;
            --gold: #D4AF37;
            --accent: #15803d;
            --white: #ffffff;
            --bg: #f3f4f6;
            --radius: 24px;
            --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--primary); overflow-x: hidden; }

        /* --- PRE-LOADER --- */
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .page-content { animation: slideUp 0.8s ease; padding-bottom: 120px; }

        /* --- NAV --- */
        nav {
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px);
            padding: 15px 5%; display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #eee;
        }
        .logo-box { display: flex; align-items: center; gap: 10px; }
        .logo-box img { width: 40px; border-radius: 10px; }
        .logo-box h1 { font-family: 'Outfit'; font-size: 18px; letter-spacing: 1px; }

        /* --- GALLERY ENGINE --- */
        .gallery-container { width: 100%; position: relative; background: var(--white); }
        .slider { 
            display: flex; overflow-x: scroll; scroll-snap-type: x mandatory; 
            scrollbar-width: none; -ms-overflow-style: none;
        }
        .slider::-webkit-scrollbar { display: none; }
        .slider img { 
            min-width: 100%; height: 400px; object-fit: contain; 
            scroll-snap-align: start; cursor: zoom-in; padding: 20px;
        }
        
        /* Fullscreen Overlay */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 2000; display: none;
            justify-content: center; align-items: center;
        }
        #overlay img { max-width: 95%; max-height: 80%; transform: scale(1); transition: 0.3s; }
        .close-overlay { position: absolute; top: 20px; right: 20px; color: white; font-size: 30px; cursor: pointer; }

        /* --- CONTENT WRAPPER --- */
        .content { padding: 25px 6%; max-width: 1200px; margin: 0 auto; }
        .tag { background: var(--gold); color: white; padding: 5px 12px; border-radius: 50px; font-size: 11px; font-weight: 800; text-transform: uppercase; }
        .title { font-size: 28px; font-weight: 800; margin: 15px 0 10px; line-height: 1.2; }
        
        .price-row { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .curr-price { font-size: 32px; font-weight: 800; color: var(--accent); }
        .old-price { text-decoration: line-through; color: #9ca3af; }

        /* --- DYNAMIC ADD TO CART BUTTON --- */
        .cart-wrapper { 
            position: fixed; bottom: 20px; left: 5%; right: 5%; z-index: 1000;
            max-width: 500px; margin: 0 auto;
        }
        .btn-add-cart {
            width: 100%; height: 70px; background: var(--primary); color: white;
            border: none; border-radius: 20px; font-size: 18px; font-weight: 800;
            cursor: pointer; position: relative; overflow: hidden;
            box-shadow: 0 15px 30px rgba(27, 48, 34, 0.3);
            display: flex; justify-content: center; align-items: center; gap: 10px;
        }

        /* Floating Icons Animation */
        .btn-add-cart i.float-icon {
            position: absolute; opacity: 0.2; font-size: 14px;
            animation: rotateIcons 4s linear infinite;
        }
        @keyframes rotateIcons {
            0% { transform: rotate(0deg) translate(80px) rotate(0deg); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: rotate(360deg) translate(80px) rotate(-360deg); opacity: 0; }
        }

        /* --- REVIEW SYSTEM --- */
        .review-section { background: white; padding: 25px; border-radius: var(--radius); margin-top: 30px; }
        .star-input { display: flex; gap: 8px; margin: 15px 0; font-size: 24px; color: #ddd; }
        .star-input i { cursor: pointer; transition: 0.2s; }
        .star-input i.active { color: var(--gold); }
        
        textarea {
            width: 100%; border: 1px solid #eee; border-radius: 15px;
            padding: 15px; background: #f9fafb; resize: none; margin-bottom: 10px;
        }
        .submit-rev {
            background: var(--gold); color: white; border: none;
            padding: 10px 20px; border-radius: 10px; font-weight: 700; cursor: pointer;
        }

        .review-list { margin-top: 25px; }
        .rev-card { border-bottom: 1px solid #f3f4f6; padding-bottom: 15px; margin-bottom: 15px; }

        /* --- SPECS TABLE --- */
        .specs { width: 100%; margin: 25px 0; border-collapse: collapse; }
        .specs td { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; }
        .specs td:first-child { font-weight: 700; color: #6b7280; }

        /* --- LAPTOP RESPONSIVENESS --- */
        @media (min-width: 1024px) {
            .page-content { display: grid; grid-template-columns: 1fr 1fr; gap: 50px; padding: 50px 8%; }
            .gallery-container { position: sticky; top: 100px; border-radius: var(--radius); overflow: hidden; height: 600px; }
            .slider img { height: 600px; }
            .cart-wrapper { position: static; max-width: 100%; margin-top: 30px; }
            .btn-add-cart { height: 80px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo-box">
            <img src="https://raw.githubusercontent.com/nemimart/The-Nemi-Mart/main/logo.png" alt="Logo">
            <h1>NEMI MART</h1>
        </div>
        <div style="display: flex; gap: 20px; font-size: 20px;">
            <i class="fas fa-search"></i>
            <i class="fas fa-shopping-cart"></i>
        </div>
    </nav>

    <div id="overlay">
        <span class="close-overlay">&times;</span>
        <img id="overlayImg" src="">
    </div>

    <div class="page-content">
        <div class="gallery-container">
            <div class="slider" id="slider">
                <img src="https://raw.githubusercontent.com/nemimart/The-Nemi-Mart/main/logo.png" onclick="openFull(this.src)">
                <img src="https://raw.githubusercontent.com/nemimart/The-Nemi-Mart/main/logo.png" onclick="openFull(this.src)">
                <img src="https://raw.githubusercontent.com/nemimart/The-Nemi-Mart/main/logo.png" onclick="openFull(this.src)">
            </div>
            <div style="text-align:center; padding: 10px; color: #aaa; font-size: 12px;"><i class="fas fa-hand-pointer"></i> Tap to Zoom | Swipe to View</div>
        </div>

        <div class="content">
            <span class="tag">Ayurvedic Gold</span>
            <h1 class="title">Amritprash Elite Gold Formula</h1>
            
            <div class="price-row">
                <span class="curr-price">₹850</span>
                <span class="old-price">₹1,499</span>
                <span class="tag" style="background: #fee2e2; color: #ef4444;">-45%</span>
            </div>

            <table class="specs">
                <tr><td>Weight</td><td>500g Premium Pack</td></tr>
                <tr><td>Benefits</td><td>Immunity, Focus, Vitality</td></tr>
                <tr><td>Quality</td><td>24K Gold Bhasma Included</td></tr>
            </table>

            <div class="cart-wrapper">
                <button class="btn-add-cart">
                    <i class="fas fa-cart-plus"></i>
                    ADD TO CART
                    <i class="fas fa-star float-icon" style="animation-delay: 0s;"></i>
                    <i class="fas fa-bolt float-icon" style="animation-delay: 1s;"></i>
                    <i class="fas fa-shopping-bag float-icon" style="animation-delay: 2s;"></i>
                    <i class="fas fa-heart float-icon" style="animation-delay: 3s;"></i>
                </button>
            </div>

            <div class="review-section">
                <h3>Customer Feedback</h3>
                
                <div class="star-input" id="starRating">
                    <i class="fas fa-star" data-v="1"></i>
                    <i class="fas fa-star" data-v="2"></i>
                    <i class="fas fa-star" data-v="3"></i>
                    <i class="fas fa-star" data-v="4"></i>
                    <i class="fas fa-star" data-v="5"></i>
                </div>
                
                <textarea id="revText" placeholder="Write your experience..."></textarea>
                <button class="submit-rev" onclick="addReview()">Post Review</button>

                <div class="review-list" id="reviewList">
                    <div class="rev-card">
                        <div style="color: var(--gold); font-size: 12px;">★★★★★</div>
                        <p style="font-weight: 700; font-size: 14px; margin: 5px 0;">Best Product Ever!</p>
                        <p style="font-size: 13px; color: #666;">Bhai result bahut sahi hai, packaging bhi premium thi.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Gallery Full View
        const overlay = document.getElementById('overlay');
        const overlayImg = document.getElementById('overlayImg');
        
        function openFull(src) {
            overlayImg.src = src;
            overlay.style.display = 'flex';
        }

        document.querySelector('.close-overlay').onclick = () => overlay.style.display = 'none';

        // Star Rating Logic
        const stars = document.querySelectorAll('#starRating i');
        let selectedRating = 0;

        stars.forEach(star => {
            star.onclick = () => {
                selectedRating = star.dataset.v;
                stars.forEach(s => {
                    s.classList.toggle('active', s.dataset.v <= selectedRating);
                });
            }
        });

        // Review Submission
        function addReview() {
            const text = document.getElementById('revText').value;
            if(!text || selectedRating == 0) return alert("Bhai stars aur review dono daalo!");

            const div = document.createElement('div');
            div.className = 'rev-card';
            div.innerHTML = `
                <div style="color: var(--gold); font-size: 12px;">${'★'.repeat(selectedRating)}${'☆'.repeat(5-selectedRating)}</div>
                <p style="font-weight: 700; font-size: 14px; margin: 5px 0;">User Review</p>
                <p style="font-size: 13px; color: #666;">${text}</p>
            `;
            document.getElementById('reviewList').prepend(div);
            document.getElementById('revText').value = '';
            alert("Review Submitted! 🔥");
        }

        // Add to Cart Bounce
        document.querySelector('.btn-add-cart').onclick = function() {
            this.style.transform = 'scale(0.95)';
            setTimeout(() => {
                this.style.transform = 'scale(1)';
                alert("Product Added to Cart! 🛒");
            }, 100);
        };
    </script>
</body>
</html>
