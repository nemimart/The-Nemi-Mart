 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEMI MASTER v10 | BUSINESS SUITE</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --secondary: #f43f5e;
            --dark: #0f172a;
            --accent: #10b981;
            --bg: #f8fafc;
        }

        * { box-sizing: border-box; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); margin: 0; padding-bottom: 100px; color: var(--dark); }

        /* HEAVY LOADER */
        #mainLoader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.95); z-index: 9999; display: none;
            flex-direction: column; justify-content: center; align-items: center; color: white;
        }
        .spinner { width: 60px; height: 60px; border: 6px solid #1e293b; border-top: 6px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* PREMIUM HEADER */
        header {
            background: linear-gradient(135deg, var(--dark), #1e293b);
            padding: 20px; color: white; position: sticky; top: 0; z-index: 1000;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 4px solid var(--primary);
        }
        .brand h1 { margin: 0; font-size: 18px; font-weight: 800; letter-spacing: 1px; }
        .nav-btns { display: flex; gap: 10px; }
        .btn-top { background: var(--primary); color: white; padding: 8px 15px; border-radius: 10px; text-decoration: none; font-size: 11px; font-weight: 700; border: none; cursor: pointer; }
        .btn-order { background: var(--secondary); }

        /* FORM & CARDS */
        .content-section { display: none; padding: 15px; animation: slideIn 0.4s ease-out; }
        .active-section { display: block; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

        .card { background: white; border-radius: 28px; padding: 25px; box-shadow: 0 15px 40px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .tag { font-size: 10px; font-weight: 800; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; display: block; }

        .input-grid { display: grid; gap: 15px; }
        .field { display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 12px; font-weight: 700; color: #64748b; }
        input, textarea, select { background: #f1f5f9; border: 2px solid transparent; padding: 14px; border-radius: 16px; font-size: 15px; transition: 0.3s; }
        input:focus, select:focus { border-color: var(--primary); background: white; outline: none; }

        /* MULTI-PHOTO SYSTEM */
        .photo-container { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .photo-row { display: flex; gap: 10px; align-items: center; }
        .photo-row input { flex: 1; }
        .btn-add-photo { background: #e0e7ff; color: var(--primary); border: none; padding: 12px; border-radius: 14px; font-weight: 800; cursor: pointer; margin-top: 5px; }

        .btn-main { background: var(--dark); color: white; width: 100%; padding: 20px; border-radius: 20px; border: none; font-size: 18px; font-weight: 800; margin-top: 15px; cursor: pointer; box-shadow: 0 10px 25px rgba(15, 23, 42, 0.3); }

        /* HISTORY CARDS */
        .hist-card { background: white; border-radius: 22px; padding: 15px; margin-bottom: 15px; display: flex; gap: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.02); align-items: flex-start; }
        .hist-card img { width: 80px; height: 80px; border-radius: 15px; object-fit: cover; }
        .hist-details { flex: 1; }
        .hist-details h4 { margin: 0 0 5px 0; font-size: 16px; }
        .status-badge { display: inline-block; padding: 4px 10px; border-radius: 8px; font-size: 10px; font-weight: 800; margin-top: 8px; }
        .in-stock { background: #dcfce7; color: #166534; }
        .out-stock { background: #fee2e2; color: #991b1b; }
        .limited-stock { background: #fef9c3; color: #854d0e; }

        .action-btns { display: flex; gap: 10px; margin-top: 10px; }
        .btn-icon { background: #f1f5f9; border: none; padding: 8px; border-radius: 10px; cursor: pointer; }

        /* BOTTOM NAV */
        nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 15px 0 30px; border-top: 1px solid #eee; z-index: 2000; }
        .nav-link { text-decoration: none; color: #94a3b8; font-size: 11px; font-weight: 700; text-align: center; }
        .nav-link.active { color: var(--primary); }
        .nav-link i { font-size: 22px; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

<div id="mainLoader">
    <div class="spinner"></div>
    <p style="margin-top: 20px; font-weight: 800; letter-spacing: 1px;">DEPLOYING TO CLOUD...</p>
    <span id="loadProgress" style="font-size: 12px; color: var(--accent);">Uploading Images: 0/0</span>
</div>

<header>
    <div class="brand"><h1>NEMI MASTER <small style="font-size: 10px; color: var(--accent);">V10</small></h1></div>
    <div class="nav-btns">
        <a href="admin2.html" class="btn-top btn-order">📦 ORDERS</a>
    </div>
</header>

<div id="addPage" class="content-section active-section">
    <span class="tag">Inventory Master Control</span>
    <div class="card">
        <form id="proForm">
            <div class="input-grid">
                <div class="field">
                    <label>Full Product Title</label>
                    <input type="text" id="title" required placeholder="Ex: Pure Ayurvedic Neem Oil">
                </div>

                <div class="field">
                    <label>Product Category</label>
                    <select id="category" required>
                        <option value="">Select Category</option>
                        <option value="Skin Care">Skin Care</option>
                        <option value="Hair Care">Hair Care</option>
                        <option value="Oils">Oils</option>
                        <option value="Health">Health</option>
                        <option value="Personal Care">Personal Care</option>
                    </select>
                </div>

                <div style="display: flex; gap: 10px;">
                    <div class="field" style="flex:1;">
                        <label>Original Price</label>
                        <input type="number" id="price" required>
                    </div>
                    <div class="field" style="flex:1;">
                        <label>Discount %</label>
                        <input type="number" id="disc" value="0">
                    </div>
                </div>

                <div class="field">
                    <label>Unlimited Photos (Telegram Cloud)</label>
                    <div id="photoList" class="photo-container">
                        <div class="photo-row">
                            <input type="file" class="photo-input" accept="image/*" required>
                        </div>
                    </div>
                    <button type="button" class="btn-add-photo" onclick="addNewPhotoField()">+ Add More Photo</button>
                </div>

                <div class="field">
                    <label>Current Stock Count</label>
                    <input type="number" id="stockCount" required placeholder="Total units available">
                </div>

                <div class="field">
                    <label>Marketing Tagline</label>
                    <input type="text" id="hero" placeholder="Ex: Best for glowing skin!">
                </div>

                <div class="field">
                    <label>Detailed Description</label>
                    <textarea id="desc" rows="3" placeholder="Explain the product..."></textarea>
                </div>

                <div class="field">
                    <label>How To Use (Process)</label>
                    <textarea id="usage" rows="2" placeholder="Step 1, Step 2..."></textarea>
                </div>

                <div class="field">
                    <label>Benefits & Saman (Ingredients)</label>
                    <input type="text" id="ing" placeholder="Neem, Tulsi, Aloe Vera...">
                </div>

                <button type="submit" class="btn-main">PUSH LIVE & NOTIFY USERS</button>
            </div>
        </form>
    </div>
</div>

<div id="listPage" class="content-section">
    <span class="tag">Active Inventory Feed</span>
    <div id="masterFeed"></div>
</div>

<nav>
    <a href="#" class="nav-link active" onclick="showTab('addPage', this)"><i>🚀</i><span>Add New</span></a>
    <a href="#" class="nav-link" onclick="showTab('listPage', this)"><i>📊</i><span>History</span></a>
</nav>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // Firebase & Telegram Configs
    const TG_TOKEN = "8675459597:AAH2TsikJaT1PAXfsMQ9Utfzszs8-_TE2bI";
    const CHAT_ID = "8415600127";
    const firebaseConfig = { databaseURL: "https://nemi-mart-2-default-rtdb.firebaseio.com" };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    window.showTab = (id, el) => {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active-section'));
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active-section');
        el.classList.add('active');
        window.scrollTo(0,0);
    };

    window.addNewPhotoField = () => {
        const div = document.createElement('div');
        div.className = 'photo-row';
        div.innerHTML = `<input type="file" class="photo-input" accept="image/*"> <button type="button" class="btn-icon" onclick="this.parentElement.remove()">❌</button>`;
        document.getElementById('photoList').appendChild(div);
    };

    // --- MEGA UPLOAD ENGINE ---
    document.getElementById('proForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const loader = document.getElementById('mainLoader');
        const progressText = document.getElementById('loadProgress');
        const fileInputs = document.querySelectorAll('.photo-input');
        
        loader.style.display = 'flex';
        let uploadedUrls = [];

        try {
            // STEP 1: Image Upload Loop
            for(let i=0; i < fileInputs.length; i++) {
                let file = fileInputs[i].files[0];
                if(file) {
                    progressText.innerText = `Uploading Image: ${i+1}/${fileInputs.length}`;
                    let formData = new FormData();
                    formData.append("chat_id", CHAT_ID);
                    formData.append("photo", file);

                    const tgRes = await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendPhoto`, { method: "POST", body: formData });
                    const tgData = await tgRes.json();
                    
                    const fileId = tgData.result.photo[tgData.result.photo.length - 1].file_id;
                    const fileRes = await fetch(`https://api.telegram.org/bot${TG_TOKEN}/getFile?file_id=${fileId}`);
                    const fileData = await fileRes.json();
                    uploadedUrls.push(`https://api.telegram.org/file/bot${TG_TOKEN}/${fileData.result.file_path}`);
                }
            }

            // STEP 2: Stock Logic
            const sCount = parseInt(document.getElementById('stockCount').value);
            let sStatus = "INSTOCK";
            if(sCount <= 0) sStatus = "OUTOFSTOCK";
            else if(sCount < 5) sStatus = "LIMITED";

            // STEP 3: Pricing Logic
            const p = parseFloat(document.getElementById('price').value);
            const d = parseFloat(document.getElementById('disc').value);
            const final = p - (p * (d/100));

            // STEP 4: Product Data Object
            const prodData = {
                title: document.getElementById('title').value,
                category: document.getElementById('category').value, // Added Category
                price: p,
                discount: d,
                finalPrice: final,
                stock: sCount,
                images: uploadedUrls,
                hero: document.getElementById('hero').value,
                description: document.getElementById('desc').value,
                usage: document.getElementById('usage').value,
                ingredients: document.getElementById('ing').value,
                status: sStatus,
                time: Date.now()
            };

            const newProdRef = push(ref(db, 'products'));
            await set(newProdRef, prodData);

            // STEP 5: Firebase Notification
            const notiRef = push(ref(db, 'notifications'));
            await set(notiRef, {
                title: "Naya Maal Aa Gaya! 🔥",
                message: `${prodData.title} ab store par live hai.`,
                image: uploadedUrls[0],
                time: Date.now()
            });

            alert("Done! Product live ho gaya aur notification bhi chala gaya.");
            document.getElementById('proForm').reset();
            document.getElementById('photoList').innerHTML = `<div class="photo-row"><input type="file" class="photo-input" accept="image/*" required></div>`;
            showTab('listPage', document.querySelectorAll('.nav-link')[1]);

        } catch (err) {
            alert("Error: " + err.message);
        } finally {
            loader.style.display = 'none';
        }
    });

    // --- HISTORY MANAGER ---
    onValue(ref(db, 'products'), (snap) => {
        const feed = document.getElementById('masterFeed');
        feed.innerHTML = "";
        const data = snap.val();
        if(!data) { feed.innerHTML = "<center>No Products Found</center>"; return; }

        Object.keys(data).reverse().forEach(id => {
            const p = data[id];
            const badgeClass = p.status === 'INSTOCK' ? 'in-stock' : (p.status === 'LIMITED' ? 'limited-stock' : 'out-stock');
            const badgeText = p.status === 'LIMITED' ? `${p.stock} Left` : p.status;

            feed.innerHTML += `
                <div class="hist-card">
                    <img src="${p.images[0]}">
                    <div class="hist-details">
                        <small style="color:var(--primary); font-weight:800;">${p.category || 'NO CAT'}</small>
                        <h4>${p.title}</h4>
                        <b>₹${p.finalPrice}</b> <small style="text-decoration:line-through; color:gray;">₹${p.price}</small>
                        <br>
                        <span class="status-badge ${badgeClass}">${badgeText}</span>
                        <div class="action-btns">
                            <button class="btn-icon" onclick="updateStock('${id}', 'INSTOCK')">✅</button>
                            <button class="btn-icon" onclick="updateStock('${id}', 'OUTOFSTOCK')">❌</button>
                            <button class="btn-icon" onclick="delItem('${id}')">🗑️</button>
                        </div>
                    </div>
                </div>
            `;
        });
    });

    window.updateStock = (id, newStatus) => {
        update(ref(db, `products/${id}`), { status: newStatus });
    };

    window.delItem = (id) => {
        if(confirm("Pakka delete karna hai?")) remove(ref(db, `products/${id}`));
    };
</script>
</body>
</html>
