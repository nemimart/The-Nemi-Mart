 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Nemi Mart | Premium Ayurveda</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --creme: #FFFDF5;
            --gold: #D4AF37;
            --dark-green: #1B3022;
            --leaf-green: #2D5A27;
            --white: #ffffff;
            --soft-shadow: 0 10px 40px rgba(0,0,0,0.08);
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--creme); color: var(--dark-green); padding-bottom: 100px; overflow-x: hidden; }

        /* Header Styles */
        header { background: var(--dark-green); padding: 15px 5%; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 30px rgba(0,0,0,0.2); }
        .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
        
        .logo-area { position: relative; width: 55px; height: 55px; display: flex; justify-content: center; align-items: center; text-decoration: none; }
        .main-logo { width: 40px; z-index: 5; filter: drop-shadow(0 0 8px rgba(212,175,55,0.4)); }
        
        .orbit-icons { position: absolute; width: 100%; height: 100%; animation: rotateFull 20s linear infinite; }
        .orbit-icons i { position: absolute; font-size: 8px; color: var(--gold); opacity: 0.6; }
        .oi1 { top: 0; left: 50%; } .oi2 { bottom: 0; left: 50%; } .oi3 { left: 0; top: 50%; } .oi4 { right: 0; top: 50%; }
        @keyframes rotateFull { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .address-box { flex: 1; margin-left: 15px; color: white; cursor: pointer; }
        .address-box p { font-size: 9px; opacity: 0.7; text-transform: uppercase; letter-spacing: 1px; }
        .address-box h4 { font-size: 13px; color: var(--gold); display: flex; align-items: center; gap: 5px; }

        /* Search Bar */
        .search-container { position: relative; margin-top: 10px; }
        .search-fake-input { background: white; border-radius: 12px; height: 48px; display: flex; align-items: center; padding: 0 15px; color: #777; font-size: 14px; cursor: pointer; border: 1px solid transparent; transition: var(--transition); }
        .search-fake-input i { color: var(--gold); margin-right: 10px; }

        /* Category Strip */
        .cat-strip { display: flex; overflow-x: auto; padding: 25px 5%; gap: 20px; background: white; scrollbar-width: none; }
        .cat-strip::-webkit-scrollbar { display: none; }
        .cat-card { text-align: center; min-width: 75px; cursor: pointer; text-decoration: none; color: inherit; }
        .icon-circle { width: 65px; height: 65px; background: #fdfdfd; border-radius: 20px; display: flex; justify-content: center; align-items: center; margin-bottom: 8px; border: 1px solid #eee; transition: var(--transition); }
        .cat-card:hover .icon-circle { transform: translateY(-5px); background: var(--dark-green); color: var(--gold); border-color: var(--gold); }
        .cat-card span { font-size: 11px; font-weight: 600; }

        /* Banner */
        .banner-wrapper { margin: 15px 5%; border-radius: 20px; overflow: hidden; box-shadow: var(--soft-shadow); }
        .banner-container { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; }
        .banner-slide { min-width: 100%; scroll-snap-align: start; }
        .banner-slide img { width: 100%; aspect-ratio: 16/8; object-fit: cover; }

        /* Product Grid */
        .section-header { display: flex; justify-content: space-between; align-items: center; padding: 25px 5% 15px; }
        .section-header h2 { font-size: 18px; font-weight: 700; color: var(--dark-green); }
        .view-all { font-size: 12px; color: var(--leaf-green); font-weight: 600; padding: 5px 12px; background: rgba(45,90,39,0.08); border-radius: 8px; cursor: pointer; }

        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 0 5%; }
        .p-card { background: white; border-radius: 18px; padding: 12px; box-shadow: var(--soft-shadow); position: relative; transition: var(--transition); border: 1px solid rgba(0,0,0,0.03); }
        .p-card:hover { transform: translateY(-5px); border-color: var(--gold); }
        
        .p-img-box { width: 100%; aspect-ratio: 1/1; background: #f9f9f9; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; }
        .p-img-box img { max-width: 85%; max-height: 85%; object-fit: contain; }
        
        .p-tag { font-size: 8px; font-weight: 700; color: var(--gold); text-transform: uppercase; }
        .p-title { font-size: 12px; font-weight: 600; height: 36px; overflow: hidden; margin: 5px 0 10px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        
        .p-price-row { display: flex; justify-content: space-between; align-items: center; }
        .p-price { font-weight: 700; color: var(--leaf-green); font-size: 15px; }
        .p-old { font-size: 10px; color: #aaa; text-decoration: line-through; font-weight: 400; }
        
        .add-btn { width: 32px; height: 32px; background: var(--dark-green); color: white; border: none; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .add-btn:hover { background: var(--gold); }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 10px 0; box-shadow: 0 -5px 25px rgba(0,0,0,0.05); z-index: 2000; border-radius: 20px 20px 0 0; }
        .nav-item { text-align: center; color: #aaa; font-size: 10px; text-decoration: none; flex: 1; }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 4px; }
        .nav-item.active { color: var(--leaf-green); }

        .cart-float { margin-top: -45px; }
        .cart-circle { width: 60px; height: 60px; background: var(--leaf-green); border: 5px solid var(--creme); border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; position: relative; box-shadow: 0 8px 20px rgba(45,90,39,0.3); }
        .badge { position: absolute; top: -2px; right: -2px; background: #ff4444; color: white; font-size: 9px; width: 18px; height: 18px; border-radius: 50%; display: flex; justify-content: center; align-items: center; border: 2px solid white; }

        /* Toast Notifications */
        #toast-container { position: fixed; top: 20px; width: 100%; padding: 0 10%; z-index: 10000; pointer-events: none; }
        .toast { background: var(--dark-green); color: white; padding: 12px 20px; border-radius: 12px; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); animation: slideIn 0.4s forwards; }
        @keyframes slideIn { from { transform: translateY(-100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* Skeleton Loading */
        .skeleton { background: #eee; animation: blink 1.5s infinite; border-radius: 10px; }
        @keyframes blink { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <header>
        <div class="header-top">
            <div class="logo-area">
                <div class="orbit-icons">
                    <i class="fas fa-leaf oi1"></i>
                    <i class="fas fa-plus oi2"></i>
                    <i class="fas fa-star oi3"></i>
                    <i class="fas fa-heart oi4"></i>
                </div>
                <img src="https://raw.githubusercontent.com/nemimart/The-Nemi-Mart/main/logo.png" class="main-logo" alt="Nemi Mart">
            </div>
            <div class="address-box" onclick="location.href='address.html'">
                <p>Deliver to</p>
                <h4>Akash, Patiala - 147001 <i class="fas fa-chevron-down"></i></h4>
            </div>
            <div style="display: flex; gap: 15px; color: white; font-size: 20px;">
                <i class="far fa-heart" onclick="location.href='wishlist.html'"></i>
                <i class="far fa-user-circle" onclick="location.href='profile.html'"></i>
            </div>
        </div>
        <div class="search-container" onclick="location.href='search.html'">
            <div class="search-fake-input">
                <i class="fas fa-search"></i>
                Search Ayurvedic Wellness...
            </div>
        </div>
    </header>

    <div class="cat-strip" id="categoryContainer">
        </div>

    <div class="banner-wrapper">
        <div class="banner-container" id="bannerContainer">
            </div>
    </div>

    <div class="section-header">
        <h2>Top Selling</h2>
        <div class="view-all" onclick="location.href='allproduct.html?filter=top'">View All</div>
    </div>
    <div class="product-grid" id="topSellingGrid"></div>

    <div class="section-header">
        <h2>Premium Collection</h2>
        <div class="view-all" onclick="location.href='allproduct.html?filter=premium'">View All</div>
    </div>
    <div class="product-grid" id="premiumGrid"></div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item active"><i class="fas fa-home"></i>Home</a>
        <a href="allproduct.html" class="nav-item"><i class="fas fa-grid-2"></i>Shop</a>
        <div class="cart-float" onclick="location.href='cart.html'">
            <div class="cart-circle">
                <i class="fas fa-shopping-basket"></i>
                <div class="badge" id="cartBadge">0</div>
            </div>
        </div>
        <a href="notifications.html" class="nav-item"><i class="fas fa-bell"></i>Alerts</a>
        <a href="orders.html" class="nav-item"><i class="fas fa-box"></i>Orders</a>
    </nav>

    <script>
        // ==========================================
        // 1. FIREBASE CONFIGURATION
        // ==========================================
        const firebaseConfig = {
            databaseURL: "YOUR_FIREBASE_DATABASE_URL_HERE" // Yahan apna URL dalna
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ==========================================
        // 2. APP STATE & CORE
        // ==========================================
        const App = {
            cart: JSON.parse(localStorage.getItem('nemi_cart')) || [],
            
            init() {
                this.loadCategories();
                this.loadBanners();
                this.loadProducts();
                this.updateCartUI();
            },

            showToast(msg) {
                const container = document.getElementById('toast-container');
                const t = document.createElement('div');
                t.className = 'toast';
                t.innerHTML = `<i class="fas fa-check-circle" style="color:var(--gold)"></i> <span>${msg}</span>`;
                container.appendChild(t);
                setTimeout(() => t.remove(), 3000);
            },

            updateCartUI() {
                const count = this.cart.reduce((s, i) => s + i.qty, 0);
                document.getElementById('cartBadge').innerText = count;
                localStorage.setItem('nemi_cart', JSON.stringify(this.cart));
            },

            addToCart(product, e) {
                if(e) e.stopPropagation();
                const exist = this.cart.find(item => item.id === product.id);
                if(exist) exist.qty++;
                else this.cart.push({...product, qty: 1});
                this.updateCartUI();
                this.showToast("Product added to cart!");
            }
        };

        // ==========================================
        // 3. DATA LOADING (FIREBASE READY)
        // ==========================================
        
        // Load Categories
        App.loadCategories = () => {
            const cats = [
                { name: "Immunity", icon: "fa-shield-heart", link: "immunity.html" },
                { name: "Hair Care", icon: "fa-pump-soap", link: "hair.html" },
                { name: "Vitality", icon: "fa-bolt", link: "vitality.html" },
                { name: "Digestion", icon: "fa-leaf", link: "digestion.html" },
                { name: "Skin Care", icon: "fa-sparkles", link: "skin.html" }
            ];
            const container = document.getElementById('categoryContainer');
            container.innerHTML = cats.map(c => `
                <a href="${c.link}" class="cat-card">
                    <div class="icon-circle"><i class="fas ${c.icon}"></i></div>
                    <span>${c.name}</span>
                </a>
            `).join('');
        };

        // Load Banners from Firebase or Mock
        App.loadBanners = () => {
            const bannerRef = db.ref('banners');
            bannerRef.on('value', (snapshot) => {
                const data = snapshot.val() || [
                    { img: "https://raw.githubusercontent.com/nemimart/The-Nemi-Mart/main/Amritprash%20(1).png" },
                    { img: "https://raw.githubusercontent.com/nemimart/The-Nemi-Mart/main/Nyala%20Hair%20Oil.png" }
                ];
                document.getElementById('bannerContainer').innerHTML = Object.values(data).map(b => `
                    <div class="banner-slide"><img src="${b.img}"></div>
                `).join('');
            });
        };

        // Load Products from Firebase
        App.loadProducts = () => {
            const productRef = db.ref('products');
            productRef.on('value', (snapshot) => {
                const products = snapshot.val() ? Object.values(snapshot.val()) : [];
                
                // If Firebase is empty, use sample data for Akash
                const displayData = products.length ? products : [
                    { id: 1, name: "Amritprash Power 500g", price: 850, old: 1200, tag: "Best Seller", img: "https://raw.githubusercontent.com/nemimart/The-Nemi-Mart/main/logo.png", type: "top" },
                    { id: 2, name: "Nyala Hair Oil 100ml", price: 350, old: 499, tag: "Premium", img: "https://raw.githubusercontent.com/nemimart/The-Nemi-Mart/main/logo.png", type: "premium" },
                    { id: 3, name: "Panch Tulsi Drops", price: 195, old: 250, tag: "Immunity", img: "https://raw.githubusercontent.com/nemimart/The-Nemi-Mart/main/logo.png", type: "top" },
                    { id: 4, name: "Shilajit Gold Resin", price: 1499, old: 1999, tag: "Pure", img: "https://raw.githubusercontent.com/nemimart/The-Nemi-Mart/main/logo.png", type: "premium" }
                ];

                this.renderGrid('topSellingGrid', displayData.filter(p => p.type === 'top'));
                this.renderGrid('premiumGrid', displayData.filter(p => p.type === 'premium'));
            });
        };

        App.renderGrid = (id, items) => {
            const grid = document.getElementById(id);
            grid.innerHTML = items.map(p => `
                <div class="p-card" onclick="location.href='product.html?id=${p.id}'">
                    <div class="p-img-box"><img src="${p.img}"></div>
                    <span class="p-tag">${p.tag}</span>
                    <div class="p-title">${p.name}</div>
                    <div class="p-price-row">
                        <div class="p-price">₹${p.price} <span class="p-old">₹${p.old}</span></div>
                        <button class="add-btn" onclick="App.addToCart(${JSON.stringify(p).replace(/"/g, '&quot;')}, event)">
                            <i class="fas fa-plus"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        };

        // Initialize App
        document.addEventListener('DOMContentLoaded', () => App.init());

        // ==========================================
        // 4. ADMIN PANEL CONNECTOR (Logic for Akash)
        // ==========================================
        /* Bhai, Admin Panel ke liye ek naya page bana 'admin.html' 
           usme ye function use karna product add karne ke liye:
           
           function addProduct(name, price, oldPrice, tag, imgUrl, type) {
               const newProd = db.ref('products').push();
               newProd.set({
                   id: Date.now(),
                   name: name,
                   price: price,
                   old: oldPrice,
                   tag: tag,
                   img: imgUrl,
                   type: type // 'top' or 'premium'
               });
           }
        */
    </script>
</body>
</html>
