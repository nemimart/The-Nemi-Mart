 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Shop | The Nemi Mart</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

    <style>
        /* ========================================
        1. GLOBAL VARIABLES & RESET
        ========================================
        */
        :root {
            --primary: #1B3022;
            --accent: #D4AF37;
            --accent-light: #E5C76B;
            --success: #2D5A27;
            --bg-creme: #FFFDF5;
            --white: #FFFFFF;
            --text-main: #1B3022;
            --text-muted: #7A8B7E;
            --shimmer: #f0f0f0;
            --shadow-sm: 0 4px 12px rgba(0,0,0,0.05);
            --shadow-lg: 0 15px 45px rgba(0,0,0,0.12);
            --radius-card: 28px;
            --radius-btn: 16px;
            --transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-creme);
            color: var(--text-main);
            min-height: 100vh;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* ========================================
        2. PREMIUM HEADER
        ========================================
        */
        header {
            background: var(--primary);
            height: 85px;
            padding: 0 7%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 9999;
            box-shadow: 0 8px 30px rgba(0,0,0,0.25);
            border-bottom: 3px solid var(--accent);
        }

        .brand-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .back-circle {
            width: 45px;
            height: 45px;
            background: rgba(255,255,255,0.08);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: var(--transition);
        }

        .back-circle:hover {
            background: var(--accent);
            color: var(--primary);
        }

        header h2 {
            font-family: 'Playfair Display', serif;
            color: var(--accent);
            font-size: 24px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .cart-trigger {
            position: relative;
            background: var(--white);
            width: 50px;
            height: 50px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: var(--shadow-sm);
        }

        .cart-trigger i {
            font-size: 22px;
            color: var(--primary);
        }

        .cart-trigger .badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--accent);
            color: var(--primary);
            font-size: 12px;
            font-weight: 800;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--primary);
            animation: bounce 1s infinite alternate;
        }

        @keyframes bounce {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        /* ========================================
        3. SEARCH & FILTERS
        ========================================
        */
        .top-shelf {
            background: var(--white);
            padding: 30px 7% 40px 7%;
            border-radius: 0 0 50px 50px;
            box-shadow: var(--shadow-sm);
        }

        .search-wrapper {
            position: relative;
            max-width: 600px;
            margin: 0 auto;
        }

        .search-wrapper input {
            width: 100%;
            height: 60px;
            padding: 0 65px;
            background: var(--bg-creme);
            border: 2px solid #eee;
            border-radius: 20px;
            font-size: 16px;
            outline: none;
            transition: var(--transition);
        }

        .search-wrapper input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.15);
        }

        .search-wrapper .search-icon {
            position: absolute;
            left: 25px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--accent);
            font-size: 20px;
        }

        .category-bar {
            display: flex;
            overflow-x: auto;
            gap: 15px;
            padding: 25px 7% 10px 7%;
            scrollbar-width: none;
        }

        .category-bar::-webkit-scrollbar { display: none; }

        .cat-pill {
            padding: 12px 28px;
            background: var(--white);
            border: 1px solid #eee;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: var(--shadow-sm);
            color: var(--text-muted);
        }

        .cat-pill.active {
            background: var(--primary);
            color: var(--white);
            border-color: var(--primary);
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(27, 48, 34, 0.2);
        }

        /* ========================================
        4. PRODUCT GRID & CARDS
        ========================================
        */
        .main-container {
            padding: 20px 7% 100px 7%;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--white);
            border-radius: var(--radius-card);
            padding: 15px;
            position: relative;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(0,0,0,0.03);
            transition: var(--transition);
            animation: fadeInUp 0.8s ease forwards;
            opacity: 0;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: var(--shadow-lg);
        }

        .img-container {
            width: 100%;
            aspect-ratio: 1/1;
            background: #F9F9F9;
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
        }

        .img-container img {
            width: 85%;
            height: 85%;
            object-fit: contain;
            transition: transform 0.6s ease;
        }

        .card:hover .img-container img {
            transform: scale(1.15) rotate(3deg);
        }

        .product-badge {
            position: absolute;
            top: 25px;
            left: 25px;
            background: var(--accent);
            color: var(--primary);
            font-size: 10px;
            font-weight: 800;
            padding: 4px 12px;
            border-radius: 50px;
            text-transform: uppercase;
        }

        .product-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 8px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            min-height: 44px;
        }

        .pricing {
            display: flex;
            flex-direction: column;
            margin-bottom: 15px;
        }

        .old-price {
            font-size: 12px;
            text-decoration: line-through;
            color: var(--text-muted);
        }

        .new-price {
            font-size: 20px;
            font-weight: 800;
            color: var(--success);
        }

        .action-area {
            display: flex;
            gap: 10px;
            margin-top: auto;
        }

        .btn-add {
            flex: 1;
            height: 50px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius-btn);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-add:hover {
            background: var(--success);
            box-shadow: 0 5px 15px rgba(45, 90, 39, 0.3);
        }

        .btn-add:active {
            transform: scale(0.95);
        }

        /* ========================================
        5. STATES (LOADING/EMPTY)
        ========================================
        */
        .shimmer-card {
            height: 300px;
            background: linear-gradient(90deg, #f0f0f0 25%, #f8f8f8 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: var(--radius-card);
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 20px;
        }

        .empty-state i {
            font-size: 70px;
            color: var(--accent);
            margin-bottom: 20px;
            opacity: 0.3;
        }

        /* ========================================
        6. NOTIFICATION SYSTEM (TOAST)
        ========================================
        */
        #toast-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 10000;
        }

        .toast {
            background: var(--primary);
            color: white;
            padding: 15px 25px;
            border-radius: 15px;
            margin-top: 10px;
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: 12px;
            border-left: 5px solid var(--accent);
            animation: slideIn 0.4s ease forwards;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>

    <header>
        <div class="brand-container">
            <div class="back-circle" onclick="window.history.back()">
                <i class="fas fa-chevron-left"></i>
            </div>
            <h2>Nemi Mart</h2>
        </div>
        <div class="cart-trigger" onclick="location.href='cart.html'">
            <i class="fas fa-shopping-bag"></i>
            <span class="badge" id="cartBadge">0</span>
        </div>
    </header>

    <div class="top-shelf">
        <div class="search-wrapper">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="searchInput" placeholder="Search for pure ayurvedic products..." onkeyup="filterEngine()">
        </div>
    </div>

    <div class="category-bar" id="catBar">
        <div class="cat-pill active" onclick="setCategory('all', this)">All Items</div>
        <div class="cat-pill" onclick="setCategory('immunity', this)">Immunity</div>
        <div class="cat-pill" onclick="setCategory('vitality', this)">Vitality</div>
        <div class="cat-pill" onclick="setCategory('hair-care', this)">Hair Care</div>
        <div class="cat-pill" onclick="setCategory('skin-care', this)">Skin Care</div>
        <div class="cat-pill" onclick="setCategory('wellness', this)">Wellness</div>
    </div>

    <div class="main-container">
        <div class="product-grid" id="productGrid">
            <div class="shimmer-card"></div>
            <div class="shimmer-card"></div>
            <div class="shimmer-card"></div>
            <div class="shimmer-card"></div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script>
        // CONFIGURATION
        const CONFIG = {
            API_URL: "https://nemi-mart-2-default-rtdb.firebaseio.com/notifications.json",
            DEFAULT_IMG: "https://raw.githubusercontent.com/nemimart/The-Nemi-Mart/main/logo.png"
        };

        let MASTER_DATA = [];
        let CURRENT_CAT = 'all';
        let CART_COUNT = localStorage.getItem('cartCount') || 0;

        // Initialize App
        document.addEventListener('DOMContentLoaded', () => {
            updateCartUI();
            fetchData();
        });

        // 1. DATA ACQUISITION (Advanced Deep Fetch)
        async function fetchData() {
            try {
                const response = await fetch(CONFIG.API_URL);
                const rawData = await response.json();

                if (!rawData) {
                    showEmptyState("No data found in Firebase.");
                    return;
                }

                // Process Complex Firebase Structure
                MASTER_DATA = [];
                Object.keys(rawData).forEach(key => {
                    const item = rawData[key];
                    
                    // Deep extraction: If item is nested, or has data property
                    if (item && typeof item === 'object') {
                        MASTER_DATA.push({
                            id: key,
                            name: item.name || "Nemi Product",
                            price: item.price || 0,
                            oldPrice: item.oldPrice || (parseInt(item.price) + 100),
                            img: item.img || item.image || item.url || CONFIG.DEFAULT_IMG,
                            cat: (item.category || item.cat || "wellness").toLowerCase(),
                            desc: item.desc || ""
                        });
                    }
                });

                renderGrid(MASTER_DATA);
            } catch (error) {
                console.error("Critical Fetch Error:", error);
                showEmptyState("Connection error. Please check your Firebase URL.");
            }
        }

        // 2. RENDER ENGINE
        function renderGrid(dataList) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = "";

            if (dataList.length === 0) {
                showEmptyState("No products match your criteria.");
                return;
            }

            dataList.forEach((product, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.style.animationDelay = `${index * 0.1}s`;

                card.innerHTML = `
                    <div class="product-badge">${product.cat}</div>
                    <div class="img-container">
                        <img src="${product.img}" onerror="this.src='${CONFIG.DEFAULT_IMG}'" alt="${product.name}">
                    </div>
                    <div class="product-title">${product.name}</div>
                    <div class="pricing">
                        <span class="old-price">₹${product.oldPrice}</span>
                        <span class="new-price">₹${product.price}</span>
                    </div>
                    <div class="action-area">
                        <button class="btn-add" onclick="handleAddToCart('${product.id}', '${product.name}')">
                            <i class="fas fa-cart-plus"></i> ADD
                        </button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // 3. FILTERING LOGIC
        function filterEngine() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            
            const filtered = MASTER_DATA.filter(p => {
                const matchSearch = p.name.toLowerCase().includes(query);
                const matchCat = CURRENT_CAT === 'all' || p.cat === CURRENT_CAT;
                return matchSearch && matchCat;
            });

            renderGrid(filtered);
        }

        function setCategory(cat, element) {
            // Update UI
            document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
            element.classList.add('active');
            
            CURRENT_CAT = cat.toLowerCase();
            filterEngine();
        }

        // 4. CART & NOTIFICATION
        function handleAddToCart(id, name) {
            CART_COUNT++;
            localStorage.setItem('cartCount', CART_COUNT);
            updateCartUI();
            
            showToast(`${name} added to your cart!`);
        }

        function updateCartUI() {
            document.getElementById('cartBadge').innerText = CART_COUNT;
        }

        function showToast(msg) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `<i class="fas fa-check-circle"></i> ${msg}`;
            
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(50px)';
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        }

        function showEmptyState(msg) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-leaf"></i>
                    <h3>Bhai, Kuch Nahi Mila!</h3>
                    <p>${msg}</p>
                </div>
            `;
        }
    </script>
</body>
</html>
