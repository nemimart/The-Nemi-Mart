 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nemi Mart | Premium Notifications</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root {
            --primary: #1B3022;    /* Deep Forest Green */
            --accent: #D4AF37;     /* Premium Gold */
            --bg-creme: #FFFDF5;   /* Soft Royal Creme */
            --white: #FFFFFF;
            --text-main: #0A1F13;
            --text-muted: #64748B;
            --success: #2D5A27;
            --glass-border: rgba(212, 175, 55, 0.2);
            --card-shadow: 0 15px 35px rgba(27, 48, 34, 0.08);
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-creme);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* --- Luxury Header --- */
        .app-header {
            background: rgba(255, 253, 245, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 20px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 2px solid var(--accent);
        }

        .header-left { display: flex; align-items: center; gap: 16px; }

        .btn-back {
            width: 45px; height: 45px; border-radius: 15px;
            background: var(--white);
            border: 1px solid var(--glass-border);
            display: flex; align-items: center; justify-content: center;
            color: var(--primary);
            cursor: pointer; transition: var(--transition);
        }

        .btn-back:hover { background: var(--primary); color: var(--accent); transform: rotate(-10deg); }

        .header-title h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 24px; font-weight: 800; color: var(--primary);
        }

        .clear-all {
            font-size: 12px; font-weight: 800; color: #8B0000;
            text-transform: uppercase; cursor: pointer;
            padding: 8px 12px; border-radius: 8px; background: rgba(139, 0, 0, 0.1);
        }

        /* --- Section Info --- */
        .section-status {
            padding: 20px 24px 10px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .status-label {
            font-size: 12px; font-weight: 800; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 1.2px;
        }

        .online-dot {
            padding: 4px 10px; background: var(--success); color: white;
            border-radius: 20px; font-size: 10px; display: flex; align-items: center; gap: 5px;
        }

        /* --- Notification List --- */
        .notifications-wrapper {
            padding: 10px 20px 120px;
            display: flex; flex-direction: column; gap: 15px;
        }

        /* --- Premium Card Styling --- */
        .notif-card {
            background: var(--white);
            border-radius: 24px;
            padding: 20px;
            display: flex; gap: 18px;
            position: relative;
            box-shadow: var(--card-shadow);
            border: 1px solid rgba(212, 175, 55, 0.1);
            transition: var(--transition);
            animation: cardSlideUp 0.6s ease-out both;
            cursor: pointer;
        }

        @keyframes cardSlideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .notif-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 45px rgba(27, 48, 34, 0.15);
            border-color: var(--accent);
        }

        /* Icon Boxes */
        .icon-box {
            width: 60px; height: 60px; border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; flex-shrink: 0;
            transition: var(--transition);
        }

        .notif-card:hover .icon-box { transform: rotate(360deg); }

        /* Color Schemes */
        .type-payment { background: #E8F5E9; color: var(--success); }
        .type-order { background: #FFF9C4; color: #F57F17; }
        .type-promo { background: #FCE4EC; color: #C2185B; }
        .type-system { background: #E3F2FD; color: #1976D2; }

        /* Content */
        .notif-body { flex: 1; }
        .notif-body h3 {
            font-size: 17px; font-weight: 800; margin-bottom: 5px;
            color: var(--primary); display: flex; justify-content: space-between;
        }

        .badge-new {
            background: var(--accent); color: var(--primary);
            font-size: 9px; padding: 2px 8px; border-radius: 5px;
        }

        .notif-body p {
            font-size: 14px; color: var(--text-muted); font-weight: 500;
        }

        .notif-meta {
            margin-top: 12px; font-size: 11px; font-weight: 700;
            color: #A0AEC0; display: flex; gap: 15px;
        }

        /* Delete UI */
        .delete-btn {
            position: absolute; right: 15px; top: 15px;
            color: #EF4444; opacity: 0; transition: 0.3s;
        }
        .notif-card:hover .delete-btn { opacity: 1; }

        /* --- Empty State --- */
        #emptyBox {
            display: none; flex-direction: column; align-items: center;
            padding: 100px 40px; text-align: center;
        }
        #emptyBox i { font-size: 70px; color: var(--accent); opacity: 0.3; margin-bottom: 20px; }

        /* Bottom Navbar */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%;
            background: var(--primary); padding: 15px 0 25px;
            display: flex; justify-content: space-around;
            border-radius: 30px 30px 0 0; border-top: 3px solid var(--accent);
        }
        .nav-link { color: rgba(255,255,255,0.5); text-decoration: none; text-align: center; font-size: 12px; }
        .nav-link.active { color: var(--accent); }
        .nav-link i { font-size: 22px; display: block; margin-bottom: 4px; }

    </style>
</head>
<body>

    <header class="app-header">
        <div class="header-left">
            <div class="btn-back" onclick="window.history.back()">
                <i class="fa-solid fa-chevron-left"></i>
            </div>
            <div class="header-title">
                <h1>Alerts</h1>
            </div>
        </div>
        <div class="clear-all" onclick="clearAllNotifs()">Clear</div>
    </header>

    <div class="section-status">
        <div class="status-label">Recent Updates</div>
        <div class="online-dot"><i class="fas fa-circle"></i> Live Sync</div>
    </div>

    <main class="notifications-wrapper" id="notifList">
        </main>

    <div id="emptyBox">
        <i class="fa-solid fa-wind"></i>
        <h2>No New Messages</h2>
        <p>Aap bilkul up-to-date hain!</p>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-link"><i class="fas fa-home"></i>Home</a>
        <a href="#" class="nav-link active"><i class="fas fa-bell"></i>Alerts</a>
        <a href="orders.html" class="nav-link"><i class="fas fa-shopping-bag"></i>Orders</a>
        <a href="profile.html" class="nav-link"><i class="fas fa-user-circle"></i>Profile</a>
    </nav>

    <script>
        // 1. FIREBASE CONFIGURATION
        // Yahan apni Firebase Console ki details dalo
        const firebaseConfig = {
            databaseURL: "https://nemi-mart-2-default-rtdb.firebaseio.com/" 
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        // Maa ke naam se ya user ID se path setup karein
        const userId = "user_akash"; // Unique User ID

        // 2. LISTEN FOR NOTIFICATIONS (Real-time)
        function syncNotifications() {
            const notifRef = db.ref(`notifications/${userId}`);
            
            notifRef.on('value', (snapshot) => {
                const data = snapshot.val();
                const container = document.getElementById('notifList');
                const empty = document.getElementById('emptyBox');
                
                container.innerHTML = ""; // Clear current list to re-render

                if (data) {
                    empty.style.display = 'none';
                    container.style.display = 'flex';
                    
                    // Object ko array mein badal kar reverse karein (Latest first)
                    Object.keys(data).reverse().forEach(key => {
                        const item = data[key];
                        createNotifCard(key, item);
                    });
                } else {
                    container.style.display = 'none';
                    empty.style.display = 'flex';
                }
            });
        }

        // 3. CREATE PREMIUM CARD HTML
        function createNotifCard(id, data) {
            const container = document.getElementById('notifList');
            
            // Determine Icon and Style based on Type
            let icon = "fa-bell";
            let typeClass = "type-system";
            
            if(data.type === 'payment') { icon = "fa-credit-card"; typeClass = "type-payment"; }
            if(data.type === 'order') { icon = "fa-box-open"; typeClass = "type-order"; }
            if(data.type === 'promo') { icon = "fa-bolt"; typeClass = "type-promo"; }

            const card = `
                <div class="notif-card" id="${id}">
                    <div class="icon-box ${typeClass}">
                        <i class="fa-solid ${icon}"></i>
                    </div>
                    <div class="notif-body">
                        <h3>${data.title} ${data.isNew ? '<span class="badge-new">NEW</span>' : ''}</h3>
                        <p>${data.message}</p>
                        <div class="notif-meta">
                            <span><i class="fa-regular fa-clock"></i> ${data.time || 'Just Now'}</span>
                            <span>•</span>
                            <span>${data.category || 'Nemi Mart'}</span>
                        </div>
                    </div>
                    <div class="delete-btn" onclick="removeSingleNotif('${id}')">
                        <i class="fa-solid fa-xmark"></i>
                    </div>
                </div>
            `;
            container.innerHTML += card;
        }

        // 4. ACTION FUNCTIONS
        function removeSingleNotif(id) {
            db.ref(`notifications/${userId}/${id}`).remove();
        }

        function clearAllNotifs() {
            if(confirm("Sare notifications delete kar dein?")) {
                db.ref(`notifications/${userId}`).remove();
            }
        }

        // Start the engine
        window.onload = syncNotifications;

    </script>
</body>
</html>
