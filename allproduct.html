  <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Nemi Mart | Exclusive Premium Shop</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">

    <style>
        /* ==========================================================================
           1. CSS VARIABLES & THEME CONFIGURATION
           ========================================================================== */
        :root {
            /* Color Palette */
            --primary-dark: #0f1c13;
            --primary: #1B3022;
            --primary-light: #2c4c36;
            --accent-gold: #D4AF37;
            --accent-gold-hover: #f0c946;
            --success-green: #27ae60;
            --danger-red: #e74c3c;
            
            /* Backgrounds */
            --bg-main: #FFFDF5;
            --bg-card: #FFFFFF;
            --bg-shimmer: #f6f7f8;
            
            /* Typography */
            --text-dark: #1a1a1a;
            --text-muted: #8898aa;
            --font-sans: 'Poppins', sans-serif;
            --font-serif: 'Playfair Display', serif;
            
            /* Shadows & Effects */
            --shadow-sm: 0 5px 15px rgba(0,0,0,0.05);
            --shadow-md: 0 12px 35px rgba(0,0,0,0.08);
            --shadow-lg: 0 20px 50px rgba(27, 48, 34, 0.15);
            --shadow-gold: 0 10px 25px rgba(212, 175, 55, 0.2);
            
            /* Radius & Transitions */
            --radius-sm: 12px;
            --radius-md: 20px;
            --radius-lg: 30px;
            --radius-pill: 50px;
            --transition-fast: 0.2s ease;
            --transition-smooth: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            --transition-bounce: 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        /* ==========================================================================
           2. GLOBAL RESET & BASE STYLES
           ========================================================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-main);
            color: var(--text-dark);
            line-height: 1.6;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-main); }
        ::-webkit-scrollbar-thumb { background: var(--accent-gold); border-radius: 10px; }

        /* ==========================================================================
           3. PREMIUM HEADER & NAVIGATION
           ========================================================================== */
        header {
            background: var(--primary);
            height: 90px;
            padding: 0 6%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: var(--shadow-md);
            border-bottom: 3px solid var(--accent-gold);
        }

        .brand-zone {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .back-btn {
            width: 45px;
            height: 45px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white, #fff);
            font-size: 18px;
            cursor: pointer;
            transition: var(--transition-smooth);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .back-btn:hover {
            background: var(--accent-gold);
            color: var(--primary);
            transform: translateX(-3px);
        }

        .brand-zone h1 {
            font-family: var(--font-serif);
            color: var(--accent-gold);
            font-size: 26px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin: 0;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .cart-zone {
            position: relative;
            background: var(--bg-card);
            width: 50px;
            height: 50px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition-smooth);
            box-shadow: var(--shadow-sm);
        }

        .cart-zone:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-gold);
        }

        .cart-zone i {
            font-size: 22px;
            color: var(--primary);
            transition: var(--transition-fast);
        }

        .cart-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--accent-gold);
            color: var(--primary);
            font-size: 13px;
            font-weight: 800;
            min-width: 26px;
            height: 26px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid var(--primary);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: var(--transition-bounce);
        }

        .cart-badge.pop {
            transform: scale(1.4);
            background: var(--success-green);
            color: white;
        }

        /* ==========================================================================
           4. SEARCH & INTELLIGENT FILTERS
           ========================================================================== */
        .hero-section {
            background: linear-gradient(180deg, #ffffff 0%, var(--bg-main) 100%);
            padding: 30px 6% 10px;
            border-radius: 0 0 40px 40px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.02);
            position: relative;
            z-index: 10;
        }

        .search-container {
            position: relative;
            max-width: 800px;
            margin: 0 auto;
        }

        .search-container input {
            width: 100%;
            height: 65px;
            padding: 0 25px 0 65px;
            background: var(--bg-card);
            border: 2px solid transparent;
            border-radius: var(--radius-lg);
            font-size: 16px;
            font-family: var(--font-sans);
            font-weight: 500;
            color: var(--text-dark);
            box-shadow: var(--shadow-md);
            transition: var(--transition-smooth);
            outline: none;
        }

        .search-container input:focus {
            border-color: var(--accent-gold);
            box-shadow: var(--shadow-gold);
            transform: translateY(-2px);
        }

        .search-container input::placeholder { color: var(--text-muted); }

        .search-icon {
            position: absolute;
            left: 25px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--accent-gold);
            font-size: 22px;
            pointer-events: none;
        }

        /* Dynamic Category Scroll */
        .filter-wrapper {
            margin-top: 25px;
            display: flex;
            overflow-x: auto;
            gap: 12px;
            padding-bottom: 15px;
            scrollbar-width: none;
            scroll-behavior: smooth;
        }
        .filter-wrapper::-webkit-scrollbar { display: none; }

        .cat-btn {
            padding: 12px 26px;
            background: var(--bg-card);
            border: 1px solid rgba(0,0,0,0.05);
            border-radius: var(--radius-pill);
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            white-space: nowrap;
            cursor: pointer;
            transition: var(--transition-smooth);
            box-shadow: var(--shadow-sm);
            text-transform: capitalize;
        }

        .cat-btn:hover {
            color: var(--primary);
            border-color: var(--accent-gold);
        }

        .cat-btn.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
            box-shadow: 0 8px 20px rgba(27, 48, 34, 0.3);
            transform: translateY(-2px);
        }

        /* ==========================================================================
           5. PRODUCT GRID & 3D CARDS
           ========================================================================== */
        .shop-container {
            padding: 40px 6% 100px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 25px;
        }

        .product-card {
            background: var(--bg-card);
            border-radius: var(--radius-md);
            padding: 18px;
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow-sm);
            border: 1px solid rgba(0,0,0,0.02);
            transition: var(--transition-smooth);
            opacity: 0;
            transform: translateY(30px);
            animation: fadeUp 0.6s ease forwards;
            overflow: hidden;
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: var(--shadow-lg);
            border-color: rgba(212, 175, 55, 0.3);
        }

        /* Badges */
        .badge-container {
            position: absolute;
            top: 15px;
            left: 15px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            z-index: 2;
        }

        .badge {
            background: var(--accent-gold);
            color: var(--primary);
            font-size: 11px;
            font-weight: 800;
            padding: 5px 12px;
            border-radius: var(--radius-pill);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: var(--shadow-sm);
        }

        .badge-discount {
            background: var(--danger-red);
            color: white;
        }

        /* Image Display */
        .image-box {
            width: 100%;
            height: 220px;
            background: #fdfdfd;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 18px;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .image-box img {
            width: 85%;
            height: 85%;
            object-fit: contain;
            transition: transform 0.8s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .product-card:hover .image-box img {
            transform: scale(1.15) translateY(-5px);
        }

        /* Product Info */
        .product-info {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .product-category {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 600;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .product-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 15px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            cursor: pointer;
            transition: var(--transition-fast);
        }

        .product-title:hover {
            color: var(--accent-gold);
        }

        /* Pricing & Action */
        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-top: auto;
            border-top: 1px solid #f0f0f0;
            padding-top: 15px;
        }

        .price-wrapper {
            display: flex;
            flex-direction: column;
        }

        .price-old {
            font-size: 13px;
            color: var(--text-muted);
            text-decoration: line-through;
            font-weight: 500;
        }

        .price-new {
            font-size: 22px;
            font-weight: 800;
            color: var(--success-green);
        }

        .add-btn {
            width: 45px;
            height: 45px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 18px;
            cursor: pointer;
            transition: var(--transition-smooth);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .add-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: var(--transition-smooth);
        }

        .add-btn:hover {
            background: var(--accent-gold);
            color: var(--primary);
            transform: scale(1.05);
            box-shadow: var(--shadow-gold);
        }

        .add-btn:hover::before {
            left: 100%;
        }

        .add-btn:active {
            transform: scale(0.95);
        }

        /* ==========================================================================
           6. LOADERS, SHIMMER & EMPTY STATES
           ========================================================================== */
        .shimmer-card {
            background: var(--bg-card);
            border-radius: var(--radius-md);
            padding: 18px;
            height: 380px;
            border: 1px solid rgba(0,0,0,0.02);
            position: relative;
            overflow: hidden;
        }

        .shimmer-element {
            background: linear-gradient(90deg, #f0f0f0 25%, #fafafa 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite linear;
            border-radius: 8px;
        }

        .s-img { width: 100%; height: 220px; border-radius: var(--radius-sm); margin-bottom: 15px; }
        .s-line { height: 15px; margin-bottom: 10px; width: 80%; }
        .s-line-short { height: 15px; width: 50%; }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .empty-state {
            grid-column: 1 / -1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
            text-align: center;
        }

        .empty-state i {
            font-size: 80px;
            color: var(--accent-gold);
            opacity: 0.5;
            margin-bottom: 20px;
        }

        .empty-state h3 {
            font-size: 24px;
            color: var(--primary);
            margin-bottom: 10px;
            font-family: var(--font-serif);
        }

        .empty-state p {
            color: var(--text-muted);
            max-width: 400px;
        }

        /* ==========================================================================
           7. TOAST NOTIFICATIONS
           ========================================================================== */
        #toast-zone {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            background: var(--primary);
            color: white;
            padding: 16px 25px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: var(--shadow-lg);
            border-left: 5px solid var(--accent-gold);
            font-weight: 500;
            animation: slideInRight 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
            opacity: 0;
            transform: translateX(100%);
        }

        .toast i { color: var(--success-green); font-size: 20px; }

        @keyframes slideInRight {
            to { opacity: 1; transform: translateX(0); }
        }
        
        .toast.fade-out {
            animation: fadeOutRight 0.5s ease forwards;
        }
        
        @keyframes fadeOutRight {
            to { opacity: 0; transform: translateX(100%); }
        }

        /* ==========================================================================
           8. RESPONSIVE DESIGN
           ========================================================================== */
        @media (max-width: 768px) {
            header { padding: 0 4%; height: 75px; }
            .brand-zone h1 { font-size: 20px; }
            .product-grid { grid-template-columns: repeat(2, 1fr); gap: 15px; }
            .product-card { padding: 12px; }
            .image-box { height: 160px; }
            .price-new { font-size: 18px; }
            .add-btn { width: 40px; height: 40px; font-size: 16px; }
            #toast-zone { bottom: 20px; right: 20px; left: 20px; }
        }

        @media (max-width: 480px) {
            .product-grid { grid-template-columns: repeat(1, 1fr); }
            .image-box { height: 200px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="brand-zone">
            <div class="back-btn" onclick="window.history.back()" title="Go Back">
                <i class="fas fa-arrow-left"></i>
            </div>
            <h1>Nemi Mart</h1>
        </div>
        <div class="cart-zone" onclick="location.href='cart.html'" title="View Cart">
            <i class="fas fa-shopping-bag"></i>
            <span class="cart-badge" id="cartBadge">0</span>
        </div>
    </header>

    <section class="hero-section">
        <div class="search-container">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="searchInput" placeholder="Search for premium ayurvedic & wellness products..." autocomplete="off">
        </div>
        
        <div class="filter-wrapper" id="categoryContainer">
            <div class="cat-btn active">All Products</div>
            <div class="cat-btn">Loading...</div>
        </div>
    </section>

    <main class="shop-container">
        <div class="product-grid" id="productGrid">
            <div class="shimmer-card">
                <div class="shimmer-element s-img"></div>
                <div class="shimmer-element s-line"></div>
                <div class="shimmer-element s-line-short"></div>
            </div>

                <div class="shimmer-element s-img"></div>
                <div class="shimmer-element s-line"></div>
                <div class="shimmer-element s-line-short"></div>
            </div>
            <div class="shimmer-card">
                <div class="shimmer-element s-img"></div>
                <div class="shimmer-element s-line"></div>
                <div class="shimmer-element s-line-short"></div>
            </div>
            <div class="shimmer-card">
                <div class="shimmer-element s-img"></div>
                <div class="shimmer-element s-line"></div>
                <div class="shimmer-element s-line-short"></div>
            </div>
        </div>
    </main>

    <div id="toast-zone"></div>

    <script>
        /**
         * The Nemi Mart - Core Engine
         * Handles dynamic data extraction from Firebase, intelligent filtering, and UI state.
         */
        
        const APP_CONFIG = {
            DB_URL: "https://nemi-mart-2-default-rtdb.firebaseio.com/notifications.json",
            DEFAULT_IMG: "https://raw.githubusercontent.com/nemimart/The-Nemi-Mart/main/logo.png",
            CURRENCY: "₹"
        };

        // Application State
        const AppState = {
            rawProducts: [],      // All valid products from DB
            categories: new Set(),// Unique categories extracted
            activeCategory: 'All',// Currently selected filter
            cartCount: parseInt(localStorage.getItem('nemi_cart_count')) || 0,
            searchQuery: ""
        };

        // Initialize App
        document.addEventListener('DOMContentLoaded', () => {
            initCart();
            fetchDatabase();
            setupSearchListener();
        });

        /* --------------------------------------------------------------------------
           1. DATA ACQUISITION & SMART EXTRACTION
           -------------------------------------------------------------------------- */
        async function fetchDatabase() {
            try {
                const response = await fetch(APP_CONFIG.DB_URL);
                if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
                
                const data = await response.json();
                console.log("🔥 Raw Firebase Data:", data);

                if (!data) {
                    renderEmpty("Database is completely empty. Add products via Admin.");
                    return;
                }

                extractValidProducts(data);

            } catch (error) {
                console.error("❌ Fetch failed:", error);
                renderEmpty("Network error or invalid database URL.");
            }
        }

        /**
         * Advanced Deep Extractor
         * Loops through ANY nested Firebase structure to find actual product nodes.
         * Ensures "old dummy data" doesn't show if it doesn't match the valid schema.
         */
        function extractValidProducts(dataObj) {
            AppState.rawProducts = [];
            AppState.categories.clear();
            AppState.categories.add("All"); // Always have 'All'

            // Function to deeply scan objects
            function scanNode(node, nodeId) {
                if (!node || typeof node !== 'object') return;

                // Condition for a valid product: Must have a name and price
                if (node.name && node.price) {
                    const priceVal = parseInt(node.price) || 0;
                    const oldPriceVal = parseInt(node.oldPrice) || (priceVal + Math.floor(priceVal * 0.2)); // 20% markup if missing
                    const catName = node.category || node.cat || "General";

                    AppState.rawProducts.push({
                        id: node.id || nodeId,
                        name: node.name,
                        price: priceVal,
                        oldPrice: oldPriceVal,
                        img: node.img || node.image || node.url || APP_CONFIG.DEFAULT_IMG,
                        category: catName,
                        discount: Math.round(((oldPriceVal - priceVal) / oldPriceVal) * 100)
                    });
                    
                    // Add to unique categories list
                    AppState.categories.add(catName);
                    return; // Found a product, stop digging deeper in this branch
                }

                // If not a product, dig deeper into nested keys
                Object.keys(node).forEach(key => {
                    scanNode(node[key], key);
                });
            }

            // Start scanning from root
            scanNode(dataObj, 'root');

            console.log("✅ Extracted Clean Products:", AppState.rawProducts);
            
            // Build UI
            buildCategoryFilters();
            processFiltersAndRender();
        }

        /* --------------------------------------------------------------------------
           2. DYNAMIC UI GENERATORS
           -------------------------------------------------------------------------- */
        
        // Auto-creates top buttons based on Admin Data
        function buildCategoryFilters() {
            const container = document.getElementById('categoryContainer');
            container.innerHTML = ""; // Clear skeletons

            AppState.categories.forEach(cat => {
                const btn = document.createElement('div');
                btn.className = `cat-btn ${cat === AppState.activeCategory ? 'active' : ''}`;
                btn.textContent = cat;
                
                // Add click listener
                btn.onclick = () => {
                    // UI Update
                    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    
                    // State Update
                    AppState.activeCategory = cat;
                    processFiltersAndRender();
                };

                container.appendChild(btn);
            });
        }

        // Handles both Search Typing and Category Clicking
        function setupSearchListener() {
            const input = document.getElementById('searchInput');
            input.addEventListener('input', (e) => {
                AppState.searchQuery = e.target.value.toLowerCase().trim();
                processFiltersAndRender();
            });
        }

        // The Brains: Filters the raw array and sends to render
        function processFiltersAndRender() {
            let filtered = AppState.rawProducts;

            // 1. Filter by Category
            if (AppState.activeCategory !== 'All') {
                filtered = filtered.filter(p => 
                    p.category.toLowerCase() === AppState.activeCategory.toLowerCase()
                );
            }

            // 2. Filter by Search Text
            if (AppState.searchQuery !== "") {
                filtered = filtered.filter(p => 
                    p.name.toLowerCase().includes(AppState.searchQuery) ||
                    p.category.toLowerCase().includes(AppState.searchQuery)
                );
            }

            renderProducts(filtered);
        }

        /* --------------------------------------------------------------------------
           3. RENDER ENGINE (DOM MANIPULATION)
           -------------------------------------------------------------------------- */
        function renderProducts(products) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = "";

            if (products.length === 0) {
                renderEmpty("No products found for this category or search.");
                return;
            }

            products.forEach((prod, index) => {
                // Calculate animation delay for cascading effect
                const animDelay = (index * 0.05) + 's';
                
                const card = document.createElement('article');
                card.className = 'product-card';
                card.style.animationDelay = animDelay;

                // Create inner HTML structure safely
                card.innerHTML = `
                    <div class="badge-container">
                        ${prod.discount > 0 ? `<span class="badge badge-discount">${prod.discount}% OFF</span>` : ''}
                    </div>
                    
                    <div class="image-box" onclick="quickView('${prod.name}')">
                        <img src="${prod.img}" alt="${prod.name}" loading="lazy" 
                             onerror="this.src='${APP_CONFIG.DEFAULT_IMG}'">
                    </div>
                    
                    <div class="product-info">
                        <span class="product-category">${prod.category}</span>
                        <h3 class="product-title" onclick="quickView('${prod.name}')">${prod.name}</h3>
                        
                        <div class="card-footer">
                            <div class="price-wrapper">
                                <span class="price-old">${APP_CONFIG.CURRENCY}${prod.oldPrice}</span>
                                <span class="price-new">${APP_CONFIG.CURRENCY}${prod.price}</span>
                            </div>
                            
                            <button class="add-btn" onclick="addToCart('${prod.id}', '${prod.name.replace(/'/g, "\\'")}')" aria-label="Add to Cart">
                                <i class="fas fa-plus"></i>
                            </button>
                        </div>
                    </div>
                `;

                grid.appendChild(card);
            });
        }

        function renderEmpty(message) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-box-open"></i>
                    <h3>Oops! Nothing here.</h3>
                    <p>${message}</p>
                </div>
            `;
        }

        /* --------------------------------------------------------------------------
           4. CART & INTERACTION LOGIC
           -------------------------------------------------------------------------- */
        function initCart() {
            document.getElementById('cartBadge').innerText = AppState.cartCount;
        }

        function addToCart(id, name) {
            // Update Data
            AppState.cartCount++;
            localStorage.setItem('nemi_cart_count', AppState.cartCount);
            
            // Animate Badge
            const badge = document.getElementById('cartBadge');
            badge.innerText = AppState.cartCount;
            badge.classList.remove('pop');
            void badge.offsetWidth; // Trigger reflow
            badge.classList.add('pop');
            
            // Show Notification
            fireToast(`${name} added to bag!`);
        }

        function quickView(name) {
            // Placeholder for premium modal popup
            console.log(`User viewing details for: ${name}`);
        }

        // Custom Toast Notification System
        function fireToast(msg) {
            const zone = document.getElementById('toast-zone');
            
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `<i class="fas fa-check-circle"></i> <span>${msg}</span>`;
            
            zone.appendChild(toast);
            
            // Auto remove
            setTimeout(() => {
                toast.classList.add('fade-out');
                setTimeout(() => toast.remove(), 500); // Wait for fadeOut anim to finish
            }, 3000);
        }
    </script>
