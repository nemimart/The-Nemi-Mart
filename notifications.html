<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nemi Mart | Premium Feed</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root {
            --p-green: #0F5132;
            --p-gold: #C5A059;
            --p-cream: #FCFBF7;
            --white: #FFFFFF;
            --glass: rgba(255, 255, 255, 0.7);
            --border: rgba(197, 160, 89, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--p-cream);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #1a1a1a;
            overflow-x: hidden;
        }

        /* --- CLEAN HEADER --- */
        .top-bar {
            padding: 20px 25px;
            display: flex; align-items: center;
            position: sticky; top: 0; z-index: 100;
            background: rgba(252, 251, 247, 0.8);
            backdrop-filter: blur(20px);
        }

        .btn-back {
            width: 45px; height: 45px; border-radius: 15px;
            background: var(--white); border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; color: var(--p-green);
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: 0.3s;
        }
        .btn-back:active { transform: scale(0.9); }

        .main-title {
            flex: 1; text-align: center; margin-right: 45px;
            font-family: 'Outfit', sans-serif; font-size: 20px;
            font-weight: 900; letter-spacing: 1px; color: var(--p-green);
        }

        /* --- FEED AREA --- */
        .content-area { max-width: 500px; margin: 0 auto; padding: 20px; }

        .section-label {
            font-family: 'Outfit', sans-serif; font-size: 32px; font-weight: 900;
            margin-bottom: 30px; padding-left: 10px; color: #1a1a1a;
        }

        /* --- THE ORBITAL CARD --- */
        .notif-wrapper { position: relative; margin-bottom: 25px; list-style: none; }

        .notif-card {
            background: var(--white);
            border-radius: 35px;
            padding: 25px;
            display: flex; align-items: center; gap: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 15px 35px rgba(197, 160, 89, 0.1);
            position: relative; overflow: hidden;
            animation: slideIn 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) backwards;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- ORBIT ANIMATION --- */
        .icon-container {
            width: 80px; height: 80px; position: relative;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }

        .main-icon {
            width: 50px; height: 50px; border-radius: 50%;
            background: var(--p-cream); color: var(--p-gold);
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; border: 1px solid var(--border);
            z-index: 2;
        }

        .orbit-line {
            position: absolute; width: 100%; height: 100%;
            border: 1px dashed var(--p-gold);
            border-radius: 50%; opacity: 0.3;
            animation: rotate 8s linear infinite;
        }

        /* Floating Products around icon */
        .floating-item {
            position: absolute; font-size: 10px; color: var(--p-green);
            animation: rotate 5s linear infinite;
        }
        .item-1 { top: 0; left: 50%; transform: translateX(-50%); }
        .item-2 { bottom: 10px; right: 0; }
        .item-3 { bottom: 10px; left: 0; }

        @keyframes rotate { 
            from { transform: rotate(0deg) translateX(35px) rotate(0deg); }
            to { transform: rotate(360deg) translateX(35px) rotate(-360deg); }
        }

        .card-text { flex: 1; }
        .card-text h3 { font-family: 'Outfit', sans-serif; font-size: 18px; margin-bottom: 5px; }
        .card-text p { font-size: 13.5px; color: #666; line-height: 1.5; font-weight: 500; }

        .card-time {
            font-size: 10px; font-weight: 800; color: var(--p-gold);
            margin-top: 12px; display: block; text-transform: uppercase;
        }

        .btn-del {
            width: 35px; height: 35px; border-radius: 12px;
            background: #fff0f0; color: #ff4d4d; border: none;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; cursor: pointer; transition: 0.3s;
        }
        .btn-del:hover { background: #ff4d4d; color: #fff; }

        /* --- LOADER --- */
        #loader {
            position: fixed; inset: 0; background: var(--p-cream);
            display: flex; align-items: center; justify-content: center; z-index: 1000;
        }
        .spinner {
            width: 40px; height: 40px; border: 3px solid var(--border);
            border-top: 3px solid var(--p-green); border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* --- TOAST --- */
        #toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #1a1a1a; color: #fff; padding: 12px 25px;
            border-radius: 50px; font-size: 13px; font-weight: 600;
            display: none; z-index: 2000; box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div id="loader"><div class="spinner"></div></div>

    <nav class="top-bar">
        <div class="btn-back" onclick="window.history.back()">
            <i class="fa-solid fa-chevron-left"></i>
        </div>
        <div class="main-title">NOTIFICATIONS</div>
    </nav>

    <main class="content-area">
        <h2 class="section-label">Feed</h2>
        <div id="feed"></div>

        <div id="empty" style="text-align: center; padding-top: 50px; display: none;">
            <i class="fa-solid fa-cloud-moon" style="font-size: 50px; color: var(--p-gold); opacity: 0.3;"></i>
            <p style="margin-top: 15px; font-weight: 600; color: #888;">No new updates</p>
        </div>
    </main>

    <div id="toast">Update Removed</div>

    <script>
        const firebaseConfig = { databaseURL: "https://nemi-mart-2-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function loadFeed() {
            const feed = document.getElementById('feed');
            const loader = document.getElementById('loader');
            const empty = document.getElementById('empty');

            db.ref('notifications').on('value', (snap) => {
                loader.style.display = 'none';
                feed.innerHTML = '';
                const data = snap.val();

                if (!data) {
                    empty.style.display = 'block';
                    return;
                }
                empty.style.display = 'none';

                const keys = Object.keys(data).reverse();
                keys.forEach((key, i) => {
                    const item = data[key];
                    const card = document.createElement('div');
                    card.className = 'notif-wrapper';

                    // Dynamic Icons
                    let icon = 'fa-crown';
                    if(item.type === 'sale') icon = 'fa-tag';
                    if(item.type === 'order') icon = 'fa-box';

                    card.innerHTML = `
                        <div class="notif-card" style="animation-delay: ${i * 0.1}s">
                            <div class="icon-container">
                                <div class="orbit-line"></div>
                                <div class="floating-item item-1"><i class="fa-solid fa-bag-shopping"></i></div>
                                <div class="floating-item item-2"><i class="fa-solid fa-gift"></i></div>
                                <div class="floating-item item-3"><i class="fa-solid fa-star"></i></div>
                                <div class="main-icon">
                                    <i class="fa-solid ${icon}"></i>
                                </div>
                            </div>
                            <div class="card-text">
                                <h3>${item.title || 'Nemi Mart'}</h3>
                                <p>${item.message || 'Discover our premium collections today.'}</p>
                                <span class="card-time">${getTime(item.timestamp)}</span>
                            </div>
                            <button class="btn-del" onclick="deleteMe('${key}')">
                                <i class="fa-solid fa-trash-can"></i>
                            </button>
                        </div>
                    `;
                    feed.appendChild(card);
                });
            });
        }

        function getTime(ts) {
            if (!ts) return "Just Now";
            const diff = Math.floor((Date.now() - ts) / 1000);
            if (diff < 60) return "Just Now";
            if (diff < 3600) return Math.floor(diff/60) + "m ago";
            return new Date(ts).toLocaleDateString();
        }

        function deleteMe(id) {
            db.ref('notifications/' + id).remove().then(() => {
                const toast = document.getElementById('toast');
                toast.style.display = 'block';
                setTimeout(() => toast.style.display = 'none', 2000);
            });
        }

        window.onload = loadFeed;
    </script>
</body>
</html>
