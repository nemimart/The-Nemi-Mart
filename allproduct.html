<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Nemi Mart | Exclusive Premium Shop</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-dark: #0f1c13;
            --primary: #1B3022;
            --primary-light: #2c4c36;
            --accent-gold: #D4AF37;
            --accent-gold-hover: #f0c946;
            --success-green: #27ae60;
            --danger-red: #e74c3c;
            --bg-main: #FFFDF5;
            --bg-card: #FFFFFF;
            --text-dark: #1a1a1a;
            --text-muted: #8898aa;
            --font-sans: 'Poppins', sans-serif;
            --font-serif: 'Playfair Display', serif;
            --shadow-sm: 0 5px 15px rgba(0,0,0,0.05);
            --shadow-md: 0 12px 35px rgba(0,0,0,0.08);
            --shadow-lg: 0 20px 50px rgba(27, 48, 34, 0.15);
            --radius-sm: 12px;
            --radius-md: 20px;
            --radius-lg: 30px;
            --radius-pill: 50px;
            --transition-smooth: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: var(--font-sans); background-color: var(--bg-main); color: var(--text-dark); line-height: 1.5; overflow-x: hidden; }

        header {
            background: var(--primary); height: 70px; padding: 0 5%;
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 1000; border-bottom: 3px solid var(--accent-gold);
        }

        .brand-zone { display: flex; align-items: center; gap: 10px; }
        .back-btn { width: 35px; height: 35px; background: rgba(255,255,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; cursor: pointer; }

        .brand-zone h1 { font-family: var(--font-serif); color: var(--accent-gold); font-size: 20px; text-transform: uppercase; margin: 0; }

        .cart-zone { position: relative; background: var(--bg-card); width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .cart-badge { position: absolute; top: -5px; right: -5px; background: var(--accent-gold); color: var(--primary); font-size: 11px; font-weight: 800; min-width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid var(--primary); }

        /* SEARCH & FILTERS - COMPACT FOR MOBILE */
        .hero-section { background: white; padding: 15px 5%; border-radius: 0 0 25px 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.03); }
        .search-container { position: relative; margin-bottom: 12px; }
        .search-container input { width: 100%; height: 50px; padding: 0 15px 0 45px; background: #f8fafc; border: 1.5px solid #eee; border-radius: 15px; font-size: 14px; outline: none; }
        .search-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--accent-gold); }

        .filter-wrapper { display: flex; overflow-x: auto; gap: 8px; padding-bottom: 5px; scrollbar-width: none; }
        .filter-wrapper::-webkit-scrollbar { display: none; }
        .cat-btn { padding: 8px 18px; background: #f1f5f9; border-radius: 50px; font-size: 12px; font-weight: 600; color: var(--text-muted); white-space: nowrap; cursor: pointer; }
        .cat-btn.active { background: var(--primary); color: white; }

        /* PRODUCT GRID - OPTIMIZED ZOOM OUT */
        .shop-container { padding: 20px 4% 100px; max-width: 1200px; margin: 0 auto; }
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }

        .product-card {
            background: white; border-radius: 15px; padding: 12px;
            display: flex; flex-direction: column; box-shadow: var(--shadow-sm);
            border: 1px solid rgba(0,0,0,0.03); position: relative;
            animation: fadeUp 0.5s ease forwards;
        }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .badge-container { position: absolute; top: 8px; left: 8px; z-index: 2; display: flex; flex-direction: column; gap: 4px; }
        .badge { font-size: 9px; font-weight: 800; padding: 3px 8px; border-radius: 50px; text-transform: uppercase; }
        .badge-discount { background: var(--danger-red); color: white; }
        .badge-out { background: #333; color: white; }

        .image-box { width: 100%; height: 140px; background: #fafafa; border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; overflow: hidden; }
        .image-box img { width: 90%; height: 90%; object-fit: contain; }

        .product-category { font-size: 10px; color: var(--text-muted); font-weight: 700; text-transform: uppercase; margin-bottom: 2px; }
        .product-title { font-size: 13px; font-weight: 700; color: var(--primary); margin-bottom: 8px; height: 38px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        .card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: auto; padding-top: 8px; border-top: 1px solid #f8fafc; }
        .price-new { font-size: 16px; font-weight: 800; color: var(--success-green); }
        .price-old { font-size: 11px; color: var(--text-muted); text-decoration: line-through; display: block; }

        .add-btn { width: 35px; height: 35px; background: var(--primary); color: white; border: none; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .add-btn:disabled { background: #ccc; cursor: not-allowed; }

        /* Loading */
        .shimmer-card { background: #fff; height: 250px; border-radius: 15px; animation: shimmer 1.5s infinite linear; background: linear-gradient(90deg, #f0f0f0 25%, #f9f9f9 50%, #f0f0f0 75%); background-size: 200% 100%; }
        @keyframes shimmer { to { background-position: -200% 0; } }

        #toast-zone { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 8px; width: 90%; }
        .toast { background: var(--primary); color: white; padding: 12px 20px; border-radius: 10px; font-size: 13px; display: flex; align-items: center; gap: 10px; box-shadow: var(--shadow-lg); animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        @media (min-width: 768px) {
            .product-grid { grid-template-columns: repeat(4, 1fr); }
            .image-box { height: 200px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="brand-zone">
            <div class="back-btn" onclick="window.history.back()">
                <i class="fas fa-arrow-left"></i>
            </div>
            <h1>Nemi Mart</h1>
        </div>
        <div class="cart-zone" onclick="location.href='cart.html'">
            <i class="fas fa-shopping-bag"></i>
            <span class="cart-badge" id="cartBadge">0</span>
        </div>
    </header>

    <section class="hero-section">
        <div class="search-container">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="searchInput" placeholder="Search products...">
        </div>
        <div class="filter-wrapper" id="categoryContainer">
            <div class="cat-btn active">All</div>
        </div>
    </section>

    <main class="shop-container">
        <div class="product-grid" id="productGrid">
            <div class="shimmer-card"></div>
            <div class="shimmer-card"></div>
            <div class="shimmer-card"></div>
            <div class="shimmer-card"></div>
        </div>
    </main>

    <div id="toast-zone"></div>

    <script>
        const APP_CONFIG = {
            // DATABASE LINK CHANGED TO 'products'
            DB_URL: "https://nemi-mart-2-default-rtdb.firebaseio.com/products.json",
            DEFAULT_IMG: "https://raw.githubusercontent.com/nemimart/The-Nemi-Mart/main/logo.png",
            CURRENCY: "₹"
        };

        const AppState = {
            rawProducts: [],
            categories: new Set(),
            activeCategory: 'All',
            cartCount: parseInt(localStorage.getItem('nemi_cart_count')) || 0,
            searchQuery: ""
        };

        document.addEventListener('DOMContentLoaded', () => {
            initCart();
            fetchDatabase();
            setupSearchListener();
        });

        async function fetchDatabase() {
            try {
                const response = await fetch(APP_CONFIG.DB_URL);
                const data = await response.json();
                if (!data) return renderEmpty("No products live yet.");
                
                // Convert Firebase Object to Array
                AppState.rawProducts = Object.keys(data).map(key => {
                    const p = data[key];
                    return {
                        id: key,
                        name: p.title || "Untitled Product", // Admin use 'title'
                        price: p.finalPrice || p.price || 0,
                        oldPrice: p.price || 0,
                        // Admin use 'images' array
                        img: (p.images && p.images.length > 0) ? p.images[0] : APP_CONFIG.DEFAULT_IMG,
                        category: p.category || "General",
                        discount: p.discount || 0,
                        stock: p.stock !== undefined ? p.stock : 1 // Stock control
                    };
                }).reverse();

                // Extract Categories
                AppState.categories.clear();
                AppState.categories.add("All");
                AppState.rawProducts.forEach(p => AppState.categories.add(p.category));

                buildCategoryFilters();
                processFiltersAndRender();
            } catch (error) {
                console.error(error);
                renderEmpty("Connection error.");
            }
        }

        function buildCategoryFilters() {
            const container = document.getElementById('categoryContainer');
            container.innerHTML = "";
            AppState.categories.forEach(cat => {
                const btn = document.createElement('div');
                btn.className = `cat-btn ${cat === AppState.activeCategory ? 'active' : ''}`;
                btn.textContent = cat;
                btn.onclick = () => {
                    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    AppState.activeCategory = cat;
                    processFiltersAndRender();
                };
                container.appendChild(btn);
            });
        }

        function setupSearchListener() {
            document.getElementById('searchInput').addEventListener('input', (e) => {
                AppState.searchQuery = e.target.value.toLowerCase().trim();
                processFiltersAndRender();
            });
        }

        function processFiltersAndRender() {
            let filtered = AppState.rawProducts;
            if (AppState.activeCategory !== 'All') {
                filtered = filtered.filter(p => p.category === AppState.activeCategory);
            }
            if (AppState.searchQuery) {
                filtered = filtered.filter(p => p.name.toLowerCase().includes(AppState.searchQuery));
            }
            renderProducts(filtered);
        }

        function renderProducts(products) {
            const grid = document.getElementById('productGrid');
            if(!products.length) { grid.innerHTML = renderEmpty("No match found."); return; }
            
            grid.innerHTML = "";
            products.forEach((prod) => {
                const isOutOfStock = prod.stock <= 0;
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <div class="badge-container">
                        ${prod.discount > 0 ? `<span class="badge badge-discount">${prod.discount}% OFF</span>` : ''}
                        ${isOutOfStock ? `<span class="badge badge-out">Sold Out</span>` : ''}
                    </div>
                    <div class="image-box">
                        <img src="${prod.img}" alt="product" loading="lazy">
                    </div>
                    <div class="product-info">
                        <span class="product-category">${prod.category}</span>
                        <h3 class="product-title">${prod.name}</h3>
                        <div class="card-footer">
                            <div class="price-wrapper">
                                <span class="price-old">${APP_CONFIG.CURRENCY}${prod.oldPrice}</span>
                                <span class="price-new">${APP_CONFIG.CURRENCY}${prod.price}</span>
                            </div>
                            <button class="add-btn" 
                                onclick="addToCart('${prod.id}', '${prod.name.replace(/'/g, "\\'")}')" 
                                ${isOutOfStock ? 'disabled' : ''}>
                                <i class="fas ${isOutOfStock ? 'fa-ban' : 'fa-plus'}"></i>
                            </button>
                        </div>
                    </div>`;
                grid.appendChild(card);
            });
        }

        function initCart() {
            document.getElementById('cartBadge').innerText = AppState.cartCount;
        }

        function addToCart(id, name) {
            AppState.cartCount++;
            localStorage.setItem('nemi_cart_count', AppState.cartCount);
            document.getElementById('cartBadge').innerText = AppState.cartCount;
            
            // Optional: LocalStorage mein items add karne ka logic yahan daal sakte ho
            fireToast(`${name} added to cart!`);
        }

        function fireToast(msg) {
            const zone = document.getElementById('toast-zone');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `<i class="fas fa-shopping-cart"></i> <span>${msg}</span>`;
            zone.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 400);
            }, 2500);
        }

        function renderEmpty(msg) {
            return `<div style="grid-column:1/-1; text-align:center; padding:50px; color:#94a3b8;">
                <i class="fas fa-box-open" style="font-size:40px; margin-bottom:10px;"></i>
                <p>${msg}</p>
            </div>`;
        }
    </script>
</body>
</html>
