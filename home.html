 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Nemi Mart | Premium Ayurveda v4.5</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --creme: #FFFDF5;
            --gold: #D4AF37;
            --dark-green: #1B3022;
            --leaf-green: #2D5A27;
            --white: #ffffff;
            --soft-shadow: 0 15px 45px rgba(0,0,0,0.08);
            --inner-shadow: inset 0 2px 10px rgba(0,0,0,0.05);
            --premium-gradient: linear-gradient(135deg, #1B3022 0%, #2D5A27 100%);
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        /* Base Setup */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--creme); color: var(--dark-green); padding-bottom: 120px; overflow-x: hidden; scroll-behavior: smooth; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }

        /* ==========================================
           PREMIUM HEADER & SEARCH
        ========================================== */
        header { background: var(--dark-green); padding: 18px 5%; position: sticky; top: 0; z-index: 1000; box-shadow: 0 5px 35px rgba(0,0,0,0.25); border-bottom: 2px solid var(--gold); }
        .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; }
        
        .logo-area { position: relative; width: 65px; height: 65px; cursor: pointer; }
        .main-logo { width: 50px; z-index: 5; position: relative; filter: drop-shadow(0 0 10px rgba(212,175,55,0.4)); }
        
        .orbit-icons { position: absolute; width: 100%; height: 100%; animation: rotateFull 15s linear infinite; }
        .orbit-icons i { position: absolute; font-size: 10px; color: var(--gold); }
        .oi1 { top: 0; left: 50%; } .oi2 { bottom: 0; left: 50%; } .oi3 { left: 0; top: 50%; } .oi4 { right: 0; top: 50%; }
        @keyframes rotateFull { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .address-box { flex: 1; margin-left: 20px; color: white; }
        .address-box p { font-size: 10px; opacity: 0.8; letter-spacing: 1.2px; text-transform: uppercase; font-weight: 300; }
        .address-box h4 { font-size: 14px; font-weight: 600; color: var(--gold); display: flex; align-items: center; gap: 6px; }

        .search-container { position: relative; max-width: 900px; margin: 10px auto 0; }
        .search-bar { background: white; border-radius: 15px; height: 52px; display: flex; align-items: center; padding: 0 20px; box-shadow: var(--inner-shadow); border: 2px solid transparent; transition: var(--transition); }
        .search-bar input { border: none; outline: none; width: 100%; font-size: 14px; color: var(--dark-green); margin-left: 10px; }
        .search-bar:focus-within { border-color: var(--gold); transform: scale(1.02); }

        /* ==========================================
           CATEGORIES & BANNERS
        ========================================== */
        .cat-strip { display: flex; overflow-x: auto; padding: 25px 5%; gap: 25px; background: white; scrollbar-width: none; border-bottom: 1px solid #f0f0f0; }
        .cat-strip::-webkit-scrollbar { display: none; }
        .cat-card { text-align: center; min-width: 80px; transition: var(--transition); cursor: pointer; }
        .icon-circle { width: 70px; height: 70px; background: #f9f9f9; border-radius: 22px; display: flex; justify-content: center; align-items: center; margin-bottom: 10px; border: 1.5px solid #eee; transition: var(--transition); }
        .cat-card i { font-size: 26px; color: var(--leaf-green); transition: 0.3s; }
        .cat-card span { font-size: 12px; font-weight: 600; color: #555; }
        .cat-card:hover .icon-circle { background: var(--premium-gradient); border-color: var(--gold); transform: translateY(-8px); }
        .cat-card:hover i { color: var(--gold); }
        .cat-card.active .icon-circle { background: var(--premium-gradient); border-color: var(--gold); }
        .cat-card.active i { color: var(--gold); }

        .banner-wrapper { margin: 25px auto; width: 92%; overflow: hidden; border-radius: 25px; box-shadow: var(--soft-shadow); position: relative; }
        .banner-container { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; }
        .banner-slide { min-width: 100%; scroll-snap-align: start; }
        .banner-slide img { width: 100%; aspect-ratio: 16/7; object-fit: cover; }

        /* ==========================================
           PRODUCT GRID SYSTEM
        ========================================== */
        .section-header { display: flex; justify-content: space-between; align-items: center; padding: 40px 5% 20px; }
        .section-header h2 { font-size: 22px; font-weight: 700; color: var(--dark-green); position: relative; }
        .section-header h2::after { content: ''; position: absolute; bottom: -5px; left: 0; width: 40px; height: 3px; background: var(--gold); border-radius: 2px; }

        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 0 5%; }
        @media (min-width: 768px) { .product-grid { grid-template-columns: repeat(4, 1fr); gap: 25px; } }

        .p-card { background: white; border-radius: 22px; padding: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.03); transition: var(--transition); position: relative; border: 1px solid rgba(0,0,0,0.04); display: flex; flex-direction: column; }
        .p-card:hover { transform: translateY(-10px); border-color: var(--gold); box-shadow: 0 15px 40px rgba(212,175,55,0.12); }
        
        .p-img-box { width: 100%; aspect-ratio: 1/1; background: #fdfdfd; border-radius: 15px; display: flex; align-items: center; justify-content: center; margin-bottom: 12px; position: relative; overflow: hidden; }
        .p-img-box img { max-width: 90%; max-height: 90%; transition: 0.5s; }
        .p-card:hover img { transform: scale(1.1); }

        .off-badge { position: absolute; top: 10px; left: 10px; background: #ff4444; color: white; padding: 4px 10px; border-radius: 8px; font-size: 10px; font-weight: 700; z-index: 2; }

        .p-tag { font-size: 9px; font-weight: 700; color: var(--gold); text-transform: uppercase; margin-bottom: 6px; }
        .p-title { font-size: 14px; font-weight: 600; color: var(--dark-green); height: 42px; overflow: hidden; margin-bottom: 12px; }
        
        .p-price-row { display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
        .p-price { font-weight: 700; color: var(--leaf-green); font-size: 18px; }
        .p-price span { font-size: 11px; color: #bbb; text-decoration: line-through; margin-left: 5px; }
        
        .add-btn { background: var(--dark-green); color: white; border: none; width: 38px; height: 38px; border-radius: 12px; cursor: pointer; transition: 0.3s; }
        .add-btn:hover { background: var(--gold); transform: rotate(90deg); }

        /* ==========================================
           ADMIN PANEL (HIDDEN)
        ========================================== */
        #adminPanel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--creme); z-index: 5000; padding: 25px; overflow-y: auto; }
        .admin-box { background: white; padding: 25px; border-radius: 20px; box-shadow: var(--soft-shadow); border: 2px solid var(--gold); }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; color: var(--dark-green); }
        .form-group input, .form-group select { width: 100%; padding: 14px; border: 1.5px solid #eee; border-radius: 12px; background: #f9f9f9; outline: none; transition: 0.3s; }
        .form-group input:focus { border-color: var(--leaf-green); background: white; }
        .submit-btn { background: var(--premium-gradient); color: white; width: 100%; padding: 18px; border: none; border-radius: 15px; font-weight: 700; letter-spacing: 1px; cursor: pointer; }

        /* ==========================================
           NOTIFICATIONS & BOTTOM NAV
        ========================================== */
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 10000; }
        .nemi-toast { background: var(--dark-green); color: white; padding: 15px 25px; border-radius: 15px; border-left: 5px solid var(--gold); margin-bottom: 10px; animation: slideIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55); box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px 0; box-shadow: 0 -10px 30px rgba(0,0,0,0.08); border-radius: 25px 25px 0 0; z-index: 2000; }
        .nav-item { text-align: center; color: #bbb; font-size: 11px; text-decoration: none; flex: 1; transition: 0.3s; }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 5px; }
        .nav-item.active { color: var(--leaf-green); }

        .cart-float { margin-top: -60px; }
        .cart-circle { width: 70px; height: 70px; background: var(--premium-gradient); border: 6px solid var(--creme); border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; position: relative; box-shadow: 0 10px 25px rgba(45,90,39,0.4); }
        .badge { position: absolute; top: -2px; right: -2px; background: #ff4444; color: white; font-size: 11px; width: 22px; height: 22px; border-radius: 50%; display: flex; justify-content: center; align-items: center; border: 2px solid white; font-weight: 800; }

        /* Skeleton Loading */
        .skeleton { background: #eee; background: linear-gradient(110deg, #ececec 8%, #f5f5f5 18%, #ececec 33%); border-radius: 15px; background-size: 200% 100%; animation: 1.5s shine linear infinite; height: 250px; }
        @keyframes shine { to { background-position-x: -200%; } }
    </style>
</head>
<body>

    <div id="adminPanel">
        <div class="admin-box">
            <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                <h2 style="color: var(--dark-green);">Nemi Store Management</h2>
                <i class="fas fa-times-circle" style="font-size: 28px; color: #ff4444; cursor: pointer;" onclick="toggleAdmin()"></i>
            </div>
            
            <div class="form-group">
                <label>Product Name</label>
                <input type="text" id="admName" placeholder="e.g. Shilajit Resin Gold">
            </div>
            <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div>
                    <label>Selling Price (₹)</label>
                    <input type="number" id="admPrice" placeholder="999">
                </div>
                <div>
                    <label>Old Price (₹)</label>
                    <input type="number" id="admOldPrice" placeholder="1499">
                </div>
            </div>
            <div class="form-group">
                <label>Category (e.g. Immunity, Vitality)</label>
                <input type="text" id="admTag" placeholder="Vitality">
            </div>
            <div class="form-group">
                <label>Image URL (Direct Link)</label>
                <input type="text" id="admImg" placeholder="https://image-link.com/photo.png">
            </div>
            <div class="form-group">
                <label>Store Section</label>
                <select id="admSection">
                    <option value="top">Top Selling (Featured)</option>
                    <option value="premium">Premium Collection</option>
                    <option value="all">General Store</option>
                </select>
            </div>
            <button class="submit-btn" onclick="FirebaseEngine.addProduct()">🚀 MAKE IT LIVE</button>
        </div>
    </div>

    <div id="toast-container"></div>

    <header>
        <div class="header-top">
            <div class="logo-area" id="mainLogoTrigger">
                <div class="orbit-icons">
                    <i class="fas fa-leaf oi1"></i>
                    <i class="fas fa-bahai oi2"></i>
                    <i class="fas fa-plus oi3"></i>
                    <i class="fas fa-spa oi4"></i>
                </div>
                <img src="https://raw.githubusercontent.com/nemimart/The-Nemi-Mart/main/logo.png" class="main-logo" alt="Nemi Mart">
            </div>

            <div class="address-box">
                <p>Deliver to</p>
                <h4>Akash, Patiala - 147001 <i class="fas fa-chevron-down" style="font-size: 10px;"></i></h4>
            </div>

            <div style="display: flex; gap: 20px; font-size: 24px; color: white;">
                <i class="far fa-heart"></i>
                <i class="far fa-user"></i>
            </div>
        </div>

        <div class="search-container">
            <div class="search-bar">
                <i class="fas fa-search" style="color: var(--gold);"></i>
                <input type="text" id="storeSearch" placeholder="Search Ayurveda, Health, Wellness..." onkeyup="UIManager.searchProducts()">
            </div>
        </div>
    </header>

    <div class="cat-strip" id="catStrip"></div>

    <div class="banner-wrapper">
        <div class="banner-container">
            <div class="banner-slide"><img src="https://img.freepik.com/free-photo/ayurvedic-medicine-concept-with-herbs_23-2148825556.jpg" alt="B1"></div>
            <div class="banner-slide"><img src="https://img.freepik.com/free-vector/realistic-ayurveda-horizontal-banner-template_23-2149463564.jpg" alt="B2"></div>
        </div>
    </div>

    <div id="mainContent">
        <div class="section-header"><h2>Top Selling</h2></div>
        <div class="product-grid" id="topSellingGrid">
            <div class="skeleton"></div>
            <div class="skeleton"></div>
        </div>

        <div class="section-header"><h2>Premium Collection</h2></div>
        <div class="product-grid" id="premiumGrid">
            <div class="skeleton"></div>
            <div class="skeleton"></div>
        </div>

        <div class="section-header"><h2>Our Full Store</h2></div>
        <div class="product-grid" id="fullStoreGrid"></div>
    </div>

    <nav class="bottom-nav">
        <a href="#" class="nav-item active"><i class="fas fa-home"></i>Home</a>
        <a href="#" class="nav-item"><i class="fas fa-leaf"></i>Ayurveda</a>
        <div class="cart-float">
            <div class="cart-circle">
                <i class="fas fa-shopping-basket" style="font-size: 24px;"></i>
                <div class="badge" id="cartBadge">0</div>
            </div>
        </div>
        <a href="#" class="nav-item"><i class="fas fa-gift"></i>Offers</a>
        <a href="#" class="nav-item"><i class="fas fa-history"></i>Orders</a>
    </nav>

    <script>
        // 1. FIREBASE INITIALIZATION
        const firebaseConfig = {
            databaseURL: "https://nemi-mart-2-default-rtdb.firebaseio.com/",
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 2. APP STATE
        let storeData = {};
        let cartCount = 0;

        // 3. FIREBASE ENGINE
        const FirebaseEngine = {
            addProduct: function() {
                const btn = document.querySelector('.submit-btn');
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> UPLOADING...';
                
                const id = Date.now();
                const p = {
                    id: id,
                    name: document.getElementById('admName').value,
                    price: document.getElementById('admPrice').value,
                    oldPrice: document.getElementById('admOldPrice').value,
                    tag: document.getElementById('admTag').value,
                    img: document.getElementById('admImg').value || 'https://raw.githubusercontent.com/nemimart/The-Nemi-Mart/main/logo.png',
                    section: document.getElementById('admSection').value
                };

                db.ref('products/' + id).set(p).then(() => {
                    UIManager.showToast(p.name + " is now LIVE! ✨");
                    toggleAdmin();
                    btn.innerHTML = '🚀 MAKE IT LIVE';
                    this.clearForm();
                });
            },
            clearForm: function() {
                document.querySelectorAll('.admin-box input').forEach(i => i.value = '');
            },
            initSync: function() {
                // Real-time listener
                db.ref('products').on('value', (snap) => {
                    storeData = snap.val() || {};
                    UIManager.render(storeData);
                });
            }
        };

        // 4. UI MANAGER
        const UIManager = {
            render: function(data) {
                const grids = {
                    top: document.getElementById('topSellingGrid'),
                    premium: document.getElementById('premiumGrid'),
                    all: document.getElementById('fullStoreGrid')
                };

                // Clear previous
                Object.values(grids).forEach(g => g.innerHTML = '');

                Object.values(data).reverse().forEach(p => {
                    const html = this.createCard(p);
                    if(p.section === 'top') grids.top.innerHTML += html;
                    else if(p.section === 'premium') grids.premium.innerHTML += html;
                    grids.all.innerHTML += html;
                });
            },
            createCard: function(p) {
                const off = Math.round(((p.oldPrice - p.price) / p.oldPrice) * 100);
                return `
                <div class="p-card" data-name="${p.name.toLowerCase()}">
                    ${off > 0 ? `<div class="off-badge">${off}% OFF</div>` : ''}
                    <div class="p-img-box">
                        <img src="${p.img}" onerror="this.src='https://raw.githubusercontent.com/nemimart/The-Nemi-Mart/main/logo.png'">
                    </div>
                    <span class="p-tag">${p.tag}</span>
                    <div class="p-title">${p.name}</div>
                    <div class="p-price-row">
                        <div class="p-price">₹${p.price} <span>₹${p.oldPrice}</span></div>
                        <button class="add-btn" onclick="UIManager.addToCart('${p.name}')">
                            <i class="fas fa-plus"></i>
                        </button>
                    </div>
                </div>`;
            },
            renderCategories: function() {
                const cats = [
                    {n: 'All', i: 'fa-border-all'},
                    {n: 'Immunity', i: 'fa-shield-heart'},
                    {n: 'Vitality', i: 'fa-bolt-lightning'},
                    {n: 'Digestion', i: 'fa-leaf'},
                    {n: 'Skin', i: 'fa-sparkles'}
                ];
                document.getElementById('catStrip').innerHTML = cats.map(c => `
                    <div class="cat-card" onclick="UIManager.filterByCat('${c.n}')">
                        <div class="icon-circle"><i class="fas ${c.i}"></i></div>
                        <span>${c.n}</span>
                    </div>
                `).join('');
            },
            searchProducts: function() {
                const val = document.getElementById('storeSearch').value.toLowerCase();
                document.querySelectorAll('.p-card').forEach(card => {
                    const name = card.getAttribute('data-name');
                    card.style.display = name.includes(val) ? 'flex' : 'none';
                });
            },
            addToCart: function(name) {
                cartCount++;
                document.getElementById('cartBadge').innerText = cartCount;
                this.showToast(name + " added to basket! 🛒");
                // Haptic Feedback simulation
                if(window.navigator.vibrate) window.navigator.vibrate(50);
            },
            showToast: function(msg) {
                const t = document.createElement('div');
                t.className = 'nemi-toast';
                t.innerHTML = `<i class="fas fa-check-circle" style="color:var(--gold)"></i> ${msg}`;
                document.getElementById('toast-container').appendChild(t);
                setTimeout(() => t.remove(), 3000);
            }
        };

        // 5. UTILITIES
        let clicks = 0;
        document.getElementById('mainLogoTrigger').onclick = () => {
            clicks++;
            if(clicks === 3) { toggleAdmin(); clicks = 0; }
            setTimeout(() => clicks = 0, 2000);
        };

        function toggleAdmin() {
            const p = document.getElementById('adminPanel');
            p.style.display = (p.style.display === 'block') ? 'none' : 'block';
        }

        // INIT
        window.onload = () => {
            UIManager.renderCategories();
            FirebaseEngine.initSync();
        };
    </script>
</body>
</html>
