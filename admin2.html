 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEMI COMMAND v12 | ORDER & USER MASTER</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --pending: #fbbf24;
            --confirm: #10b981;
            --deliver: #3b82f6;
            --danger: #f43f5e;
            --dark: #0f172a;
            --card-bg: #ffffff;
            --body-bg: #f8fafc;
        }

        * { box-sizing: border-box; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--body-bg); margin: 0; padding-bottom: 120px; color: var(--dark); overflow-x: hidden; }

        /* PREMIUM HEADER */
        header {
            background: linear-gradient(135deg, var(--dark), #1e293b);
            padding: 25px 20px; color: white; position: sticky; top: 0; z-index: 1000;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            border-bottom: 3px solid var(--primary);
        }
        .logo-box h1 { margin: 0; font-size: 20px; font-weight: 800; letter-spacing: 0.5px; }
        .logo-box span { font-size: 10px; opacity: 0.6; text-transform: uppercase; display: block; }
        .live-stat { background: rgba(255,255,255,0.1); padding: 6px 14px; border-radius: 12px; font-size: 11px; font-weight: 700; border: 1px solid rgba(255,255,255,0.1); }

        /* TABS LOGIC */
        .content-section { display: none; padding: 15px; animation: slideIn 0.3s ease-out; }
        .active-section { display: block; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* ORDER CARDS - ULTRA MOBILE */
        .order-card {
            background: var(--card-bg); border-radius: 28px; padding: 22px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04); margin-bottom: 20px;
            border: 1px solid rgba(0,0,0,0.03); position: relative;
        }
        .status-strip { position: absolute; left: 0; top: 30px; width: 6px; height: 60px; border-radius: 0 10px 10px 0; }
        .strip-pending { background: var(--pending); }
        .strip-confirm { background: var(--confirm); }
        .strip-deliver { background: var(--deliver); }

        .ord-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 18px; padding-left: 10px; }
        .ord-meta { display: flex; flex-direction: column; }
        .ord-id { font-size: 11px; font-weight: 800; color: #94a3b8; }
        .utr-chip { background: #f1f5f9; color: var(--dark); padding: 5px 12px; border-radius: 10px; font-size: 11px; font-weight: 800; margin-top: 4px; border: 1px solid #e2e8f0; }

        .client-info { background: #f8fafc; padding: 16px; border-radius: 20px; margin-bottom: 15px; }
        .client-info h3 { margin: 0; font-size: 17px; font-weight: 800; color: var(--dark); }
        .client-info p { margin: 4px 0 0 0; font-size: 13px; color: #64748b; line-height: 1.4; }

        .items-box { padding: 10px 5px; border-bottom: 1px dashed #e2e8f0; margin-bottom: 15px; }
        .item-line { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 6px; font-weight: 600; }
        .item-line small { color: #94a3b8; }

        .total-strip { display: flex; justify-content: space-between; align-items: center; }
        .total-strip span { font-size: 12px; color: #94a3b8; font-weight: 700; }
        .total-strip b { font-size: 22px; color: var(--dark); font-weight: 800; }

        /* QUICK ACTIONS */
        .actions { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 20px; }
        .btn-act { border: none; padding: 14px 5px; border-radius: 16px; font-size: 10px; font-weight: 800; color: white; cursor: pointer; transition: 0.2s; text-transform: uppercase; }
        .btn-confirm { background: var(--confirm); box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2); }
        .btn-deliver { background: var(--deliver); box-shadow: 0 4px 12px rgba(59, 130, 246, 0.2); }
        .btn-trash { background: #f1f5f9; color: var(--danger); }

        /* USER CRM CARDS */
        .user-card {
            background: white; border-radius: 24px; padding: 18px;
            display: flex; align-items: center; gap: 15px; margin-bottom: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
        }
        .u-img { width: 55px; height: 55px; background: var(--primary); border-radius: 18px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 800; font-size: 20px; }
        .u-data { flex: 1; }
        .u-data h4 { margin: 0; font-size: 16px; }
        .u-data p { margin: 2px 0; font-size: 11px; color: #64748b; }
        .btn-ban-toggle { border: none; padding: 10px 16px; border-radius: 12px; font-weight: 800; font-size: 11px; cursor: pointer; }
        .ban-red { background: #fee2e2; color: var(--danger); }
        .unban-green { background: #dcfce7; color: var(--confirm); }

        /* BOTTOM NAVIGATION */
        nav {
            position: fixed; bottom: 0; width: 100%; background: rgba(255,255,255,0.9);
            backdrop-filter: blur(15px); display: flex; justify-content: space-around;
            padding: 15px 0 35px; border-top: 1px solid #e2e8f0; z-index: 2000;
        }
        .nav-item { text-decoration: none; color: #94a3b8; font-size: 11px; font-weight: 800; text-align: center; }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 24px; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

<header>
    <div class="logo-box">
        <span>Administration v12</span>
        <h1>NEMI COMMAND</h1>
    </div>
    <div class="live-stat" id="liveCounter">Orders: 0</div>
</header>

<div id="orderTab" class="content-section active-section">
    <div id="ordersContainer">
        <center style="margin-top: 100px; opacity: 0.5;">Connecting to Secure Cloud...</center>
    </div>
</div>

<div id="userTab" class="content-section">
    <div id="usersContainer">
        </div>
</div>

<nav>
    <a href="#" class="nav-item active" onclick="switchNav('orderTab', this)"><i>🛒</i>Orders</a>
    <a href="#" class="nav-item" onclick="switchNav('userTab', this)"><i>👤</i>Customers</a>
    <a href="admin.html" class="nav-item"><i>📦</i>Products</a>
</nav>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, update, remove, set, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // --- SECOND FIREBASE (FOR ORDERS & USERS) ---
    const firebaseConfig = { databaseURL: "https://nemi-mart-1-b22fd-default-rtdb.firebaseio.com/" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    window.switchNav = (id, el) => {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active-section'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active-section');
        el.classList.add('active');
        window.scrollTo(0,0);
    };

    // --- ORDER REALTIME LISTENER ---
    onValue(ref(db, 'orders'), (snapshot) => {
        const container = document.getElementById('ordersContainer');
        const counter = document.getElementById('liveCounter');
        container.innerHTML = "";
        const data = snapshot.val();

        if(!data) {
            container.innerHTML = `<div style="text-align:center; padding:50px; opacity:0.3;">
                <img src="https://cdn-icons-png.flaticon.com/512/11329/11329073.png" width="80"><br>
                Abhi koi orders nahi hain.
            </div>`;
            counter.innerText = "Orders: 0";
            return;
        }

        const keys = Object.keys(data).reverse();
        counter.innerText = `Orders: ${keys.length}`;

        keys.forEach(id => {
            const o = data[id];
            let stripClass = "strip-pending";
            if(o.status === 'CONFIRMED') stripClass = "strip-confirm";
            if(o.status === 'DELIVERED') stripClass = "strip-deliver";

            container.innerHTML += `
                <div class="order-card">
                    <div class="status-strip ${stripClass}"></div>
                    <div class="ord-head">
                        <div class="ord-meta">
                            <span class="ord-id">ORDER #${id.slice(-6)}</span>
                            <span class="utr-chip">UTR: ${o.utr || 'NOT PAID'}</span>
                        </div>
                        <div style="font-size:10px; font-weight:800; color:var(--primary);">${new Date(o.time || Date.now()).toLocaleTimeString()}</div>
                    </div>

                    <div class="client-info">
                        <h3>${o.userName}</h3>
                        <p>📞 ${o.phone}</p>
                        <p>📍 ${o.address}</p>
                    </div>

                    <div class="items-box">
                        ${o.items.map(i => `
                            <div class="item-line">
                                <span>${i.title} <small>x${i.qty}</small></span>
                                <span>₹${i.price * i.qty}</span>
                            </div>
                        `).join('')}
                    </div>

                    <div class="total-strip">
                        <span>BILL TOTAL</span>
                        <b>₹${o.totalAmount}</b>
                    </div>

                    <div class="actions">
                        <button class="btn-act btn-confirm" onclick="updateOrd('${id}', 'CONFIRMED', '${o.userId}')">Confirm</button>
                        <button class="btn-act btn-deliver" onclick="updateOrd('${id}', 'DELIVERED', '${o.userId}')">Deliver</button>
                        <button class="btn-act btn-trash" onclick="delOrd('${id}')">🗑️</button>
                    </div>
                </div>
            `;
        });
    });

    // --- UPDATE STATUS & NOTIFY USER ---
    window.updateOrd = async (oid, status, uid) => {
        try {
            await update(ref(db, `orders/${oid}`), { status: status });
            
            // Push notification to user's node in nemi-mart-1
            const notiRef = push(ref(db, `notifications/${uid}`));
            await set(notiRef, {
                title: `Order ${status}!`,
                message: `Order #${oid.slice(-6)} status: ${status.toLowerCase()}. Check your app!`,
                time: Date.now(),
                read: false
            });
            
            alert(`Order #${oid.slice(-6)} updated to ${status}`);
        } catch (e) { console.error(e); }
    };

    // --- USER CRM ENGINE ---
    onValue(ref(db, 'users'), (snapshot) => {
        const container = document.getElementById('usersContainer');
        container.innerHTML = "";
        const data = snapshot.val();

        if(!data) return;

        Object.keys(data).forEach(uid => {
            const u = data[uid];
            const banned = u.isBanned === true;

            container.innerHTML += `
                <div class="user-card" style="${banned ? 'border:1px solid var(--danger); opacity:0.6;' : ''}">
                    <div class="u-img">${u.name ? u.name[0] : 'U'}</div>
                    <div class="u-data">
                        <h4>${u.name || 'Unknown User'}</h4>
                        <p>${u.phone || 'No Phone'}</p>
                        <p style="font-weight:800; color:var(--primary);">Total Orders: ${u.orderCount || 0}</p>
                    </div>
                    <button class="btn-ban-toggle ${banned ? 'unban-green' : 'ban-red'}" onclick="toggleBan('${uid}', ${banned})">
                        ${banned ? 'UNBAN' : 'BAN'}
                    </button>
                </div>
            `;
        });
    });

    window.toggleBan = (uid, current) => {
        if(confirm(`User ko ${current ? 'UNBAN' : 'BAN'} kardein?`)) {
            update(ref(db, `users/${uid}`), { isBanned: !current });
        }
    };

    window.delOrd = (id) => {
        if(confirm("Order permanently delete kardein?")) remove(ref(db, `orders/${id}`));
    };
</script>
</body>
</html>
