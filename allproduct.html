 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Nemi Mart | Exclusive Premium Shop</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">

    <style>
        /* ==========================================================================
           1. CSS VARIABLES & THEME CONFIGURATION
           ========================================================================== */
        :root {
            --primary-dark: #0f1c13;
            --primary: #1B3022;
            --primary-light: #2c4c36;
            --accent-gold: #D4AF37;
            --accent-gold-hover: #f0c946;
            --success-green: #27ae60;
            --danger-red: #e74c3c;
            --bg-main: #FFFDF5;
            --bg-card: #FFFFFF;
            --text-dark: #1a1a1a;
            --text-muted: #8898aa;
            --font-sans: 'Poppins', sans-serif;
            --font-serif: 'Playfair Display', serif;
            --shadow-sm: 0 5px 15px rgba(0,0,0,0.05);
            --shadow-md: 0 12px 35px rgba(0,0,0,0.08);
            --shadow-lg: 0 20px 50px rgba(27, 48, 34, 0.15);
            --shadow-gold: 0 10px 25px rgba(212, 175, 55, 0.2);
            --radius-sm: 12px;
            --radius-md: 20px;
            --radius-lg: 30px;
            --radius-pill: 50px;
            --transition-fast: 0.2s ease;
            --transition-smooth: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            --transition-bounce: 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-main);
            color: var(--text-dark);
            line-height: 1.6;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-main); }
        ::-webkit-scrollbar-thumb { background: var(--accent-gold); border-radius: 10px; }

        /* ==========================================================================
           3. PREMIUM HEADER & NAVIGATION
           ========================================================================== */
        header {
            background: var(--primary);
            height: 90px;
            padding: 0 6%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: var(--shadow-md);
            border-bottom: 3px solid var(--accent-gold);
        }

        .brand-zone { display: flex; align-items: center; gap: 15px; }

        .back-btn {
            width: 45px; height: 45px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 18px; cursor: pointer;
            transition: var(--transition-smooth);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .back-btn:hover { background: var(--accent-gold); color: var(--primary); transform: translateX(-3px); }

        .brand-zone h1 {
            font-family: var(--font-serif);
            color: var(--accent-gold);
            font-size: 26px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .cart-zone {
            position: relative; background: var(--bg-card);
            width: 50px; height: 50px; border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: var(--transition-smooth);
            box-shadow: var(--shadow-sm);
        }

        .cart-zone:hover { transform: translateY(-3px); box-shadow: var(--shadow-gold); }

        .cart-zone i { font-size: 22px; color: var(--primary); }

        .cart-badge {
            position: absolute; top: -8px; right: -8px;
            background: var(--accent-gold); color: var(--primary);
            font-size: 13px; font-weight: 800;
            min-width: 26px; height: 26px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            border: 3px solid var(--primary);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .cart-badge.pop { transform: scale(1.4); background: var(--success-green); color: white; }

        /* ==========================================================================
           4. SEARCH & FILTERS
           ========================================================================== */
        .hero-section {
            background: linear-gradient(180deg, #ffffff 0%, var(--bg-main) 100%);
            padding: 30px 6% 10px;
            border-radius: 0 0 40px 40px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.02);
        }

        .search-container { position: relative; max-width: 800px; margin: 0 auto; }

        .search-container input {
            width: 100%; height: 65px; padding: 0 25px 0 65px;
            background: var(--bg-card); border: 2px solid transparent;
            border-radius: var(--radius-lg); font-size: 16px; font-weight: 500;
            box-shadow: var(--shadow-md); transition: var(--transition-smooth); outline: none;
        }

        .search-container input:focus { border-color: var(--accent-gold); box-shadow: var(--shadow-gold); transform: translateY(-2px); }

        .search-icon { position: absolute; left: 25px; top: 50%; transform: translateY(-50%); color: var(--accent-gold); font-size: 22px; }

        .filter-wrapper {
            margin-top: 25px; display: flex; overflow-x: auto;
            gap: 12px; padding-bottom: 15px; scrollbar-width: none;
        }
        .filter-wrapper::-webkit-scrollbar { display: none; }

        .cat-btn {
            padding: 12px 26px; background: var(--bg-card);
            border-radius: var(--radius-pill); font-size: 14px; font-weight: 600;
            color: var(--text-muted); white-space: nowrap; cursor: pointer;
            transition: var(--transition-smooth); box-shadow: var(--shadow-sm);
        }

        .cat-btn.active { background: var(--primary); color: #fff; box-shadow: 0 8px 20px rgba(27, 48, 34, 0.3); }

        /* ==========================================================================
           5. PRODUCT GRID
           ========================================================================== */
        .shop-container { padding: 40px 6% 100px; max-width: 1400px; margin: 0 auto; }

        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 25px; }

        .product-card {
            background: var(--bg-card); border-radius: var(--radius-md); padding: 18px;
            position: relative; display: flex; flex-direction: column;
            box-shadow: var(--shadow-sm); transition: var(--transition-smooth);
            opacity: 0; transform: translateY(30px); animation: fadeUp 0.6s ease forwards;
        }

        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

        .product-card:hover { transform: translateY(-10px); box-shadow: var(--shadow-lg); }

        .badge-container { position: absolute; top: 15px; left: 15px; display: flex; flex-direction: column; gap: 5px; z-index: 2; }

        .badge { background: var(--accent-gold); color: var(--primary); font-size: 11px; font-weight: 800; padding: 5px 12px; border-radius: var(--radius-pill); }

        .badge-discount { background: var(--danger-red); color: white; }

        .image-box {
            width: 100%; height: 220px; background: #fdfdfd;
            border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center;
            margin-bottom: 18px; overflow: hidden; cursor: pointer;
        }

        .image-box img { width: 85%; height: 85%; object-fit: contain; transition: transform 0.8s cubic-bezier(0.165, 0.84, 0.44, 1); }

        .product-card:hover .image-box img { transform: scale(1.15) translateY(-5px); }

        .product-title { font-size: 16px; font-weight: 700; color: var(--primary); margin-bottom: 15px; }

        .card-footer { display: flex; justify-content: space-between; align-items: flex-end; border-top: 1px solid #f0f0f0; padding-top: 15px; }

        .price-new { font-size: 22px; font-weight: 800; color: var(--success-green); }

        .add-btn {
            width: 45px; height: 45px; background: var(--primary); color: white;
            border: none; border-radius: var(--radius-sm); cursor: pointer;
            transition: var(--transition-smooth); display: flex; align-items: center; justify-content: center;
        }

        .add-btn:hover { background: var(--accent-gold); color: var(--primary); box-shadow: var(--shadow-gold); }

        /* ==========================================================================
           6. LOADERS & TOASTS
           ========================================================================== */
        .shimmer-card { background: var(--bg-card); border-radius: var(--radius-md); padding: 18px; height: 380px; }

        .shimmer-element { background: linear-gradient(90deg, #f0f0f0 25%, #fafafa 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite linear; border-radius: 8px; }

        .s-img { width: 100%; height: 220px; margin-bottom: 15px; }
        .s-line { height: 15px; margin-bottom: 10px; width: 80%; }

        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        #toast-zone { position: fixed; bottom: 30px; right: 30px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }

        .toast {
            background: var(--primary); color: white; padding: 16px 25px; border-radius: var(--radius-sm);
            display: flex; align-items: center; gap: 15px; box-shadow: var(--shadow-lg);
            border-left: 5px solid var(--accent-gold); animation: slideInRight 0.5s forwards;
        }

        @keyframes slideInRight { to { opacity: 1; transform: translateX(0); } }

        @media (max-width: 768px) {
            .product-grid { grid-template-columns: repeat(2, 1fr); gap: 15px; }
            .image-box { height: 160px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="brand-zone">
            <div class="back-btn" onclick="window.history.back()">
                <i class="fas fa-arrow-left"></i>
            </div>
            <h1>Nemi Mart</h1>
        </div>
        <div class="cart-zone" onclick="location.href='cart.html'">
            <i class="fas fa-shopping-bag"></i>
            <span class="cart-badge" id="cartBadge">0</span>
        </div>
    </header>

    <section class="hero-section">
        <div class="search-container">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="searchInput" placeholder="Search for wellness products...">
        </div>
        <div class="filter-wrapper" id="categoryContainer">
            <div class="cat-btn active">All Products</div>
        </div>
    </section>

    <main class="shop-container">
        <div class="product-grid" id="productGrid">
            <div class="shimmer-card"><div class="shimmer-element s-img"></div><div class="shimmer-element s-line"></div></div>
            <div class="shimmer-card"><div class="shimmer-element s-img"></div><div class="shimmer-element s-line"></div></div>
        </div>
    </main>

    <div id="toast-zone"></div>

    <script>
        const APP_CONFIG = {
            DB_URL: "https://nemi-mart-2-default-rtdb.firebaseio.com/notifications.json",
            DEFAULT_IMG: "https://raw.githubusercontent.com/nemimart/The-Nemi-Mart/main/logo.png",
            CURRENCY: "₹"
        };

        const AppState = {
            rawProducts: [],
            categories: new Set(),
            activeCategory: 'All',
            cartCount: parseInt(localStorage.getItem('nemi_cart_count')) || 0,
            searchQuery: ""
        };

        document.addEventListener('DOMContentLoaded', () => {
            initCart();
            fetchDatabase();
            setupSearchListener();
        });

        async function fetchDatabase() {
            try {
                const response = await fetch(APP_CONFIG.DB_URL);
                const data = await response.json();
                if (!data) { renderEmpty("No products available."); return; }
                extractValidProducts(data);
            } catch (error) {
                renderEmpty("Connection error.");
            }
        }

        /**
         * Cloudinary Integration
         * Prioritizes 'cloudinaryUrl' from your admin panel.
         */
        function extractValidProducts(dataObj) {
            AppState.rawProducts = [];
            AppState.categories.clear();
            AppState.categories.add("All");

            function scanNode(node, nodeId) {
                if (!node || typeof node !== 'object') return;

                if (node.name && node.price) {
                    const priceVal = parseInt(node.price) || 0;
                    const oldPriceVal = parseInt(node.oldPrice) || (priceVal + 50);
                    const catName = node.category || "General";

                    // CLOUDINARY LOGIC: Use cloudinaryUrl if exists, else fallback to img
                    let finalImg = node.cloudinaryUrl || node.img || node.image || APP_CONFIG.DEFAULT_IMG;

                    AppState.rawProducts.push({
                        id: node.id || nodeId,
                        name: node.name,
                        price: priceVal,
                        oldPrice: oldPriceVal,
                        img: finalImg,
                        category: catName,
                        discount: Math.round(((oldPriceVal - priceVal) / oldPriceVal) * 100)
                    });
                    
                    AppState.categories.add(catName);
                    return;
                }

                Object.keys(node).forEach(key => scanNode(node[key], key));
            }

            scanNode(dataObj, 'root');
            buildCategoryFilters();
            processFiltersAndRender();
        }

        function buildCategoryFilters() {
            const container = document.getElementById('categoryContainer');
            container.innerHTML = "";
            AppState.categories.forEach(cat => {
                const btn = document.createElement('div');
                btn.className = `cat-btn ${cat === AppState.activeCategory ? 'active' : ''}`;
                btn.textContent = cat;
                btn.onclick = () => {
                    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    AppState.activeCategory = cat;
                    processFiltersAndRender();
                };
                container.appendChild(btn);
            });
        }

        function setupSearchListener() {
            document.getElementById('searchInput').addEventListener('input', (e) => {
                AppState.searchQuery = e.target.value.toLowerCase().trim();
                processFiltersAndRender();
            });
        }

        function processFiltersAndRender() {
            let filtered = AppState.rawProducts;
            if (AppState.activeCategory !== 'All') {
                filtered = filtered.filter(p => p.category === AppState.activeCategory);
            }
            if (AppState.searchQuery !== "") {
                filtered = filtered.filter(p => p.name.toLowerCase().includes(AppState.searchQuery));
            }
            renderProducts(filtered);
        }

        function renderProducts(products) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = "";
            products.forEach((prod, index) => {
                const card = document.createElement('article');
                card.className = 'product-card';
                card.style.animationDelay = (index * 0.05) + 's';
                card.innerHTML = `
                    <div class="badge-container">${prod.discount > 0 ? `<span class="badge badge-discount">${prod.discount}% OFF</span>` : ''}</div>
                    <div class="image-box"><img src="${prod.img}" alt="${prod.name}" onerror="this.src='${APP_CONFIG.DEFAULT_IMG}'"></div>
                    <div class="product-info">
                        <span class="product-category">${prod.category}</span>
                        <h3 class="product-title">${prod.name}</h3>
                        <div class="card-footer">
                            <div class="price-wrapper"><span class="price-new">${APP_CONFIG.CURRENCY}${prod.price}</span></div>
                            <button class="add-btn" onclick="addToCart('${prod.id}', '${prod.name}')"><i class="fas fa-plus"></i></button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function initCart() { document.getElementById('cartBadge').innerText = AppState.cartCount; }

        function addToCart(id, name) {
            AppState.cartCount++;
            localStorage.setItem('nemi_cart_count', AppState.cartCount);
            document.getElementById('cartBadge').innerText = AppState.cartCount;
            fireToast(`${name} added!`);
        }

        function fireToast(msg) {
            const zone = document.getElementById('toast-zone');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `<i class="fas fa-check-circle"></i> <span>${msg}</span>`;
            zone.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function renderEmpty(msg) { document.getElementById('productGrid').innerHTML = `<p style="text-align:center;width:100%">${msg}</p>`; }
    </script>
</body>
</html>
