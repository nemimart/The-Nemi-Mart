<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Nemi Mart | Welcome</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --creme: #FFFDF5; --gold: #D4AF37; --dark-green: #1B3022; }
        body { margin: 0; background: var(--creme); overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Poppins', sans-serif; }

        /* Animation Container */
        .logo-wrapper {
            text-align: center;
            transition: all 1s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }

        /* Logo / Icon Style */
        .logo-icon {
            font-size: 80px;
            color: var(--leaf-green);
            margin-bottom: 10px;
            transition: 0.8s;
        }

        /* Text Style */
        .logo-text {
            font-size: 24px;
            font-weight: bold;
            color: var(--dark-green);
            letter-spacing: 2px;
        }

        /* Flying Effect */
        .fly-up {
            transform: scale(0.3) translateY(-800px);
            opacity: 0;
        }
    </style>
</head>
<body>

    <div class="logo-wrapper" id="loader">
        <div class="logo-icon"><i class="fas fa-leaf"></i></div> 
        <div class="logo-text">THE NEMI MART</div>
    </div>

    <script>
        // 2 second baad animation shuru hoga
        setTimeout(() => {
            document.getElementById('loader').classList.add('fly-up');
            
            // Animation khatam hote hi home.html khulegi
            setTimeout(() => {
                window.location.href = "home.html";
            }, 900);
        }, 2000);
    </script>
</body>
</html>
