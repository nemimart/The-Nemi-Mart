<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Explore Products | The Nemi Mart</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --creme: #FFFDF5; --gold: #D4AF37; --dark-green: #1B3022;
            --leaf-green: #2D5A27; --white: #ffffff;
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body { background-color: var(--creme); color: var(--dark-green); padding-bottom: 100px; }

        /* --- HEADER --- */
        header {
            background: var(--dark-green);
            padding: 15px 5%;
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
        }
        header a { color: white; text-decoration: none; font-size: 20px; transition: var(--transition); }
        header h2 { color: var(--gold); font-size: 18px; font-weight: 600; }

        /* --- FILTER BAR --- */
        .filter-container {
            background: white;
            padding: 15px 5%;
            display: flex;
            gap: 12px;
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: none;
            position: sticky;
            top: 60px;
            z-index: 999;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }
        .filter-container::-webkit-scrollbar { display: none; }

        .f-tag {
            padding: 8px 18px;
            background: #f1f1f1;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid transparent;
        }
        .f-tag.active {
            background: var(--dark-green);
            color: white;
            border-color: var(--gold);
        }

        /* --- PRODUCT GRID --- */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 20px 5%;
        }

        @media (min-width: 1024px) {
            .product-grid { grid-template-columns: repeat(4, 1fr); gap: 25px; }
        }

        .p-card {
            background: white;
            border-radius: 20px;
            padding: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            transition: var(--transition);
            animation: fadeIn 0.5s ease forwards;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .p-img-box {
            width: 100%;
            aspect-ratio: 1/1;
            background: #f9f9f9;
            border-radius: 15px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .p-img-box img { max-width: 85%; max-height: 85%; object-fit: contain; }

        .p-cat-name { font-size: 10px; color: var(--gold); font-weight: 700; text-transform: uppercase; margin-bottom: 4px; }
        .p-name { font-size: 13px; font-weight: 600; color: var(--dark-green); height: 38px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; margin-bottom: 10px; }
        
        .p-footer { display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
        .p-price { font-weight: 700; color: var(--leaf-green); font-size: 16px; }
        
        .add-btn {
            background: var(--dark-green);
            color: white;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
        }
        .add-btn:hover { background: var(--gold); transform: scale(1.1); }

        /* --- EMPTY STATE --- */
        .no-products { text-align: center; padding: 50px 20px; display: none; }
        .no-products i { font-size: 50px; color: #ccc; margin-bottom: 15px; }

        /* --- BOTTOM NAV (SIMPLIFIED) --- */
        .bottom-nav { 
            position: fixed; bottom: 0; width: 100%; background: white; 
            display: flex; justify-content: space-around; padding: 12px 0;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.05); border-radius: 20px 20px 0 0;
        }
        .nav-item { text-decoration: none; color: #bbb; font-size: 10px; text-align: center; }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 2px; }
        .nav-item.active { color: var(--leaf-green); }
    </style>
</head>
<body>

    <header>
        <a href="home.html"><i class="fas fa-chevron-left"></i></a>
        <h2 id="category-title">All Products</h2>
    </header>

    <div class="filter-container" id="filter-bar">
        <div class="f-tag active" onclick="filterProducts('all', this)">All</div>
        <div class="f-tag" onclick="filterProducts('immunity', this)">Immunity</div>
        <div class="f-tag" onclick="filterProducts('hair-care', this)">Hair Care</div>
        <div class="f-tag" onclick="filterProducts('gum-care', this)">Gum Care</div>
        <div class="f-tag" onclick="filterProducts('vitality', this)">Vitality</div>
        <div class="f-tag" onclick="filterProducts('wellness', this)">Wellness</div>
    </div>

    <div class="product-grid" id="product-list">
        </div>

    <div class="no-products" id="empty-state">
        <i class="fas fa-box-open"></i>
        <p>No products found in this category.</p>
    </div>

    <nav class="bottom-nav">
        <a href="home.html" class="nav-item"><i class="fas fa-home"></i>Home</a>
        <a href="all-products.html" class="nav-item active"><i class="fas fa-th-large"></i>Shop</a>
        <a href="cart.html" class="nav-item"><i class="fas fa-shopping-cart"></i>Cart</a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user"></i>Profile</a>
    </nav>

    <script>
        // Ye tera main database hai (Abhi ke liye)
        const products = [
            { id: 1, name: "Amritprash Power Booster 250gm", price: 850, cat: "vitality", img: "https://raw.githubusercontent.com/nemimart/The-Nemi-Mart/main/logo.png" },
            { id: 2, name: "Nyala Herbal Hair Fall Oil", price: 350, cat: "hair-care", img: "https://raw.githubusercontent.com/nemimart/The-Nemi-Mart/main/logo.png" },
            { id: 3, name: "Panch Tulsi Pure Extract", price: 195, cat: "immunity", img: "https://raw.githubusercontent.com/nemimart/The-Nemi-Mart/main/logo.png" },
            { id: 4, name: "Dantvam Herbal Toothpaste", price: 95, cat: "gum-care", img: "https://raw.githubusercontent.com/nemimart/The-Nemi-Mart/main/logo.png" },
            { id: 5, name: "Immunity & Vitality Duo Pack", price: 1050, cat: "immunity", img: "https://raw.githubusercontent.com/nemimart/The-Nemi-Mart/main/logo.png" },
            { id: 6, name: "Nyala Hair Oil Pack of 2", price: 650, cat: "hair-care", img: "https://raw.githubusercontent.com/nemimart/The-Nemi-Mart/main/logo.png" },
            { id: 7, name: "Ashwagandha Wellness Kit", price: 450, cat: "wellness", img: "https://raw.githubusercontent.com/nemimart/The-Nemi-Mart/main/logo.png" },
            { id: 8, name: "Dantvam Family Kit", price: 280, cat: "gum-care", img: "https://raw.githubusercontent.com/nemimart/The-Nemi-Mart/main/logo.png" }
        ];

        function renderProducts(filter = 'all') {
            const list = document.getElementById('product-list');
            const empty = document.getElementById('empty-state');
            list.innerHTML = "";
            
            const filteredProducts = filter === 'all' 
                ? products 
                : products.filter(p => p.cat === filter);

            if (filteredProducts.length === 0) {
                empty.style.display = 'block';
            } else {
                empty.style.display = 'none';
                filteredProducts.forEach(p => {
                    list.innerHTML += `
                        <div class="p-card">
                            <div class="p-img-box">
                                <img src="${p.img}" alt="${p.name}">
                            </div>
                            <span class="p-cat-name">${p.cat.replace('-', ' ')}</span>
                            <div class="p-name">${p.name}</div>
                            <div class="p-footer">
                                <span class="p-price">₹${p.price}</span>
                                <button class="add-btn"><i class="fas fa-plus"></i></button>
                            </div>
                        </div>
                    `;
                });
            }
            
            // Title update
            document.getElementById('category-title').innerText = 
                filter === 'all' ? 'All Products' : filter.replace('-', ' ').toUpperCase();
        }

        function filterProducts(cat, element) {
            // UI Active Class
            document.querySelectorAll('.f-tag').forEach(tag => tag.classList.remove('active'));
            if(element) element.classList.add('active');

            renderProducts(cat);
            
            // URL update (taaki refresh pe wahi category rahe)
            const newurl = window.location.protocol + "//" + window.location.host + window.location.pathname + '?category=' + cat;
            window.history.pushState({path:newurl},'',newurl);
        }

        // Initialize on load
        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const cat = urlParams.get('category') || 'all';
            
            // Set active tag based on URL
            const tags = document.querySelectorAll('.f-tag');
            tags.forEach(tag => {
                if(tag.innerText.toLowerCase().replace(' ', '-') === cat) {
                    tag.classList.add('active');
                } else if (cat === 'all') {
                    tags[0].classList.add('active');
                } else {
                    tag.classList.remove('active');
                }
            });

            renderProducts(cat);
        };
    </script>
</body>
</html>
