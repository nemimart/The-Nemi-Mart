<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEMI ADMIN v3.0 | INSTANT CLOUD INJECTION</title>
    <style>
        /* MINIMALIST INDUSTRIAL WHITE THEME */
        :root {
            --b: #000000;
            --w: #ffffff;
            --g: #f2f2f2;
            --s: #00ff00;
            --d: #ff0000;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { 
            background-color: var(--w); 
            color: var(--b); 
            font-family: 'Courier New', Courier, monospace; 
            margin: 0; 
            padding: 15px; 
            font-weight: 500;
        }

        .container { 
            max-width: 100%; 
            margin: 0 auto; 
            border: 4px solid var(--b); 
            padding: 20px;
        }

        header { 
            border-bottom: 4px solid var(--b); 
            padding-bottom: 20px; 
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        h1 { font-size: 28px; text-transform: uppercase; margin: 0; letter-spacing: -2px; line-height: 1; }
        
        .nav-btn { 
            display: inline-block; 
            background: var(--b); 
            color: var(--w); 
            padding: 12px 20px; 
            text-decoration: none; 
            font-size: 14px;
            font-weight: 900;
            text-align: center;
            text-transform: uppercase;
        }

        .section-tag { 
            background: var(--b); 
            color: var(--w); 
            padding: 5px 12px; 
            font-weight: bold; 
            text-transform: uppercase; 
            display: inline-block;
            font-size: 12px;
            margin-bottom: 20px;
        }

        /* INPUT SYSTEM */
        .master-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        .input-group { display: flex; flex-direction: column; }
        label { font-weight: 900; text-transform: uppercase; font-size: 12px; margin-bottom: 8px; }
        
        input, textarea, select { 
            border: 3px solid var(--b); 
            padding: 15px; 
            font-size: 16px; 
            font-family: inherit;
            width: 100%;
            background: var(--w);
            border-radius: 0;
        }

        input:focus, textarea:focus { background: var(--g); }

        /* PHOTO ENGINE */
        .photo-engine-box { 
            border: 3px dashed var(--b); 
            padding: 20px; 
            background: var(--g);
            margin-top: 10px;
        }
        .slot-row { margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #000; }
        .add-slot-cmd { 
            background: var(--w); 
            border: 2px solid var(--b); 
            padding: 10px; 
            font-size: 12px; 
            cursor: pointer; 
            font-weight: 900;
            text-transform: uppercase;
            width: 100%;
        }

        /* EXECUTION BUTTON */
        #executeCmd { 
            background: var(--b); 
            color: var(--w); 
            border: none; 
            padding: 25px; 
            font-size: 22px; 
            font-weight: 900; 
            width: 100%; 
            margin-top: 40px; 
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.1s;
        }
        #executeCmd:active { transform: scale(0.98); }
        #executeCmd:disabled { background: #666; cursor: wait; }

        /* CLOUD PROGRESS */
        .sync-container { width: 100%; border: 3px solid var(--b); height: 20px; margin-top: 15px; display: none; }
        .sync-bar { height: 100%; background: var(--b); width: 0%; transition: 0.2s; }

        /* REAL-TIME LOGS (HISTORY) */
        .logs-wrapper { margin-top: 60px; }
        .log-card { 
            border: 3px solid var(--b); 
            margin-bottom: 20px; 
            padding: 15px; 
            position: relative;
            background: var(--w);
        }
        .log-card img { width: 80px; height: 80px; object-fit: cover; border: 2px solid var(--b); margin-bottom: 10px; }
        
        .status-tag { 
            position: absolute; top: 15px; right: 15px; 
            padding: 4px 10px; font-size: 10px; font-weight: 900; 
            text-transform: uppercase; border: 2px solid var(--b);
        }
        .tag-active { background: var(--s); color: #000; }
        .tag-out { background: var(--d); color: #fff; }

        .control-panel { display: flex; gap: 10px; margin-top: 15px; }
        .ctrl-btn { 
            padding: 12px; border: 2px solid var(--b); font-size: 12px; 
            cursor: pointer; background: var(--w); flex: 1; 
            text-transform: uppercase; font-weight: 900; 
        }
        .ctrl-del { background: var(--b); color: var(--w); }

        #alertBox { 
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: var(--b); color: var(--w); padding: 15px 30px;
            font-weight: 900; z-index: 10000; display: none; text-transform: uppercase;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.2);
        }

        @media (min-width: 768px) {
            .master-grid { grid-template-columns: 1fr 1fr; }
            .span-full { grid-column: span 2; }
            h1 { font-size: 45px; }
        }
    </style>
</head>
<body>

<div id="alertBox">SYSTEM SYNC COMPLETE</div>

<div class="container">
    <header>
        <h1>NEMI_MASTER_ADMIN_v3</h1>
        <a href="admin2.html" class="nav-btn">GO TO ORDERS (NEMI MART 3) -></a>
    </header>

    <div class="section-tag">Target Database: Nemi Mart 2 (Products)</div>

    <form id="injectionForm">
        <div class="master-grid">
            <div class="input-group">
                <label>Product Name / Identity</label>
                <input type="text" id="m_title" required placeholder="Ex: Premium Raw Honey">
            </div>

            <div class="input-group">
                <label>Inventory Category</label>
                <select id="m_cat">
                    <option value="organic-food">Organic Food</option>
                    <option value="wellness">Wellness & Health</option>
                    <option value="farming">Farming Seeds</option>
                    <option value="skincare">Natural Skincare</option>
                </select>
            </div>

            <div class="input-group">
                <label>Listing Price (₹)</label>
                <input type="number" id="m_price" required placeholder="0.00">
            </div>

            <div class="input-group">
                <label>Markdown Discount (%)</label>
                <input type="number" id="m_disc" value="0">
            </div>

            <div class="input-group">
                <label>Stock Available</label>
                <input type="number" id="m_stock" required placeholder="100">
            </div>

            <div class="input-group">
                <label>Media Injection (Multi-Photo)</label>
                <div class="photo-engine-box" id="slotZone">
                    <div class="slot-row">
                        <input type="file" class="cloud-file" accept="image/*" required>
                    </div>
                </div>
                <button type="button" class="add-slot-cmd" onclick="injectNewSlot()">+ Add Media Slot</button>
            </div>

            <div class="input-group span-full">
                <label>Product Hero Line</label>
                <input type="text" id="m_hero" placeholder="A single line impact statement...">
            </div>

            <div class="input-group span-full">
                <label>Detailed Specifications (Full Story)</label>
                <textarea id="m_long" rows="7" placeholder="Write everything about the product here..."></textarea>
            </div>

            <div class="input-group span-full">
                <label>Ingredients (Split by comma ',')</label>
                <textarea id="m_ing" rows="2" placeholder="Item 1, Item 2, Item 3..."></textarea>
            </div>

            <div class="input-group span-full">
                <label>Usage Manual</label>
                <textarea id="m_use" rows="2" placeholder="Step-by-step instructions..."></textarea>
            </div>
        </div>

        <div class="sync-container" id="syncBox"><div class="sync-bar" id="syncBar"></div></div>
        <button type="submit" id="executeCmd">EXECUTE DATABASE UPLOAD</button>
    </form>

    <div class="logs-wrapper">
        <div class="section-tag">Real-Time Inventory Stream</div>
        <div id="realtimeLogs" style="margin-top: 20px;">
            </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

    // PROJECT 2 CONFIG (NEMI MART 2)
    const firebaseConfig = {
        apiKey: "AIzaSyDVIz9_OlUcxl-Dy5oFa_yV6LPPNLp1M80",
        authDomain: "nemi-mart-2.firebaseapp.com",
        projectId: "nemi-mart-2",
        storageBucket: "nemi-mart-2.firebasestorage.app",
        messagingSenderId: "787406811321",
        appId: "1:787406811321:web:c2306258fccb0bb171eb68"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);

    // DYNAMIC MEDIA SLOTS
    window.injectNewSlot = () => {
        const zone = document.getElementById('slotZone');
        const div = document.createElement('div');
        div.className = 'slot-row';
        div.innerHTML = '<input type="file" class="cloud-file" accept="image/*">';
        zone.appendChild(div);
    };

    // SYSTEM ALERTS
    function sysAlert(msg) {
        const box = document.getElementById('alertBox');
        box.innerText = msg;
        box.style.display = 'block';
        setTimeout(() => box.style.display = 'none', 3000);
    }

    // MAIN UPLOAD ENGINE
    document.getElementById('injectionForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('executeCmd');
        const sBar = document.getElementById('syncBar');
        const sBox = document.getElementById('syncBox');
        
        btn.disabled = true;
        btn.innerText = "UPLOADING MEDIA...";
        sBox.style.display = 'block';

        const fileInputs = document.querySelectorAll('.cloud-file');
        const photoUrls = [];

        try {
            // 1. Upload Loop
            for(let input of fileInputs) {
                const file = input.files[0];
                if(!file) continue;

                const storageRef = ref(storage, `nemi_products/${Date.now()}_${file.name}`);
                const uploadTask = uploadBytesResumable(storageRef, file);

                await new Promise((resolve, reject) => {
                    uploadTask.on('state_changed', 
                        (snap) => {
                            let p = (snap.bytesTransferred / snap.totalBytes) * 100;
                            sBar.style.width = p + '%';
                        }, 
                        reject, 
                        async () => {
                            const url = await getDownloadURL(uploadTask.snapshot.ref);
                            photoUrls.push(url);
                            resolve();
                        }
                    );
                });
            }

            // 2. Firestore Injection
            const p = parseFloat(document.getElementById('m_price').value);
            const d = parseFloat(document.getElementById('m_disc').value);

            await addDoc(collection(db, "products"), {
                title: document.getElementById('m_title').value,
                category: document.getElementById('m_cat').value,
                price: p,
                discount: d,
                finalPrice: p - (p * (d/100)),
                stock: parseInt(document.getElementById('m_stock').value),
                images: photoUrls,
                hero: document.getElementById('m_hero').value,
                description: document.getElementById('m_long').value,
                ingredients: document.getElementById('m_ing').value.split(','),
                usage: document.getElementById('m_use').value,
                status: 'in-stock',
                createdAt: serverTimestamp()
            });

            sysAlert("DATABASE UPDATED SUCCESSFULLY");
            document.getElementById('injectionForm').reset();
            
        } catch (err) {
            alert("SYSTEM CRITICAL: " + err.message);
        } finally {
            btn.disabled = false;
            btn.innerText = "EXECUTE DATABASE UPLOAD";
            sBox.style.display = 'none';
        }
    });

    // REAL-TIME FETCH ENGINE (SNAPSHOT LISTENER)
    const q = query(collection(db, "products"), orderBy("createdAt", "desc"));
    onSnapshot(q, (snapshot) => {
        const list = document.getElementById('realtimeLogs');
        list.innerHTML = "";
        
        if(snapshot.empty) {
            list.innerHTML = "<p style='font-weight:900;'>- DATABASE EMPTY -</p>";
            return;
        }

        snapshot.forEach((docSnap) => {
            const p = docSnap.data();
            const id = docSnap.id;
            const isOut = p.status === 'out-of-stock';

            list.innerHTML += `
                <div class="log-card">
                    <span class="status-tag ${isOut ? 'tag-out' : 'tag-active'}">${p.status}</span>
                    <div style="display:flex; flex-direction:column;">
                        <img src="${p.images[0] || 'https://via.placeholder.com/80'}">
                        <div>
                            <strong style="font-size:16px;">${p.title}</strong><br>
                            <span style="font-size:12px;">Price: ₹${p.finalPrice} | Stock: ${p.stock}</span>
                        </div>
                    </div>
                    <div class="control-panel">
                        <button class="ctrl-btn" onclick="toggleCloudStock('${id}', '${p.status}')">Flip Status</button>
                        <button class="ctrl-btn ctrl-del" onclick="wipeFromCloud('${id}')">Wipe Data</button>
                    </div>
                </div>
            `;
        });
    });

    // CLOUD CONTROLS
    window.toggleCloudStock = async (id, current) => {
        const next = current === 'in-stock' ? 'out-of-stock' : 'in-stock';
        await updateDoc(doc(db, "products", id), { status: next });
    };

    window.wipeFromCloud = async (id) => {
        if(confirm("PERMANENTLY WIPE THIS PRODUCT FROM CLOUD?")) {
            await deleteDoc(doc(db, "products", id));
            sysAlert("PRODUCT WIPED");
        }
    };

</script>
</body>
</html>
