<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Nemi Mart | Welcome</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --creme: #FFFDF5; 
            --gold: #D4AF37; 
            --dark-green: #1B3022; 
            --leaf-green: #2D5A27;
        }
        
        body { 
            margin: 0; 
            background: var(--creme); 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            font-family: 'Poppins', sans-serif; 
        }

        /* Container for everything */
        .scene {
            position: relative;
            width: 300px;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- LOGO STYLE --- */
        .logo-wrapper {
            position: z-index: 10;
            text-align: center;
            transition: all 1.5s cubic-bezier(0.4, 0, 0.2, 1); /* Slower movement */
        }

        .logo-wrapper img {
            width: 120px;
            display: block;
            margin: 0 auto;
        }

        .logo-text {
            font-size: 20px;
            font-weight: bold;
            color: var(--dark-green);
            margin-top: 10px;
            white-space: nowrap;
        }

        /* --- ORBITING ICONS --- */
        .icons-orbit {
            position: absolute;
            width: 100%;
            height: 100%;
            animation: rotateOrbit 4s linear infinite;
            transition: opacity 0.5s ease;
        }

        .floating-icon {
            position: absolute;
            color: var(--gold);
            font-size: 24px;
            opacity: 0.7;
        }

        /* Positioning icons in a circle */
        .icon-1 { top: 0; left: 50%; transform: translateX(-50%); }
        .icon-2 { bottom: 0; left: 50%; transform: translateX(-50%); }
        .icon-3 { left: 0; top: 50%; transform: translateY(-50%); }
        .icon-4 { right: 0; top: 50%; transform: translateY(-50%); }

        @keyframes rotateOrbit {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* --- FLYING ANIMATION (Top Left) --- */
        .fly-to-top-left {
            position: fixed;
            transform: scale(0.4);
            /* Moving to top left corner */
            top: 20px !important;
            left: 20px !important;
            margin: 0 !important;
            /* Resetting center alignment */
            transform-origin: top left;
        }

        .hide-orbit {
            opacity: 0;
            visibility: hidden;
        }
    </style>
</head>
<body>

    <div class="scene">
        <div class="icons-orbit" id="orbit">
            <i class="fas fa-shopping-cart floating-icon icon-1"></i>
            <i class="fas fa-leaf floating-icon icon-2"></i>
            <i class="fas fa-shopping-bag floating-icon icon-3"></i>
            <i class="fas fa-heart floating-icon icon-4"></i>
        </div>

        <div class="logo-wrapper" id="loader">
            <img src="https://via.placeholder.com/150?text=LOGO" alt="Logo" id="logo-img">
            <div class="logo-text" id="logo-txt">THE NEMI MART</div>
        </div>
    </div>

    <script>
        setTimeout(() => {
            const loader = document.getElementById('loader');
            const orbit = document.getElementById('orbit');
            const logoText = document.getElementById('logo-txt');

            // 1. Orbit gayab karo
            orbit.classList.add('hide-orbit');
            
            // 2. Logo text ko chhota ya gayab kar sakte hain agar sirf logo fly karna hai
            // logoText.style.opacity = "0"; 

            // 3. Logo fly karke top-left jayega
            loader.style.position = "fixed";
            loader.classList.add('fly-to-top-left');
            
            // 4. Smooth Redirect to home.html
            setTimeout(() => {
                window.location.href = "home.html";
            }, 1600); // Redirect timing matching the slow animation
        }, 3000); // 3 second tak center mein animation chalega
    </script>
</body>
</html>
