 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Nemi Mart | Exclusive Entry</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --creme: #FFFDF5; 
            --gold: #D4AF37; 
            --dark-green: #1B3022; 
            --leaf-green: #2D5A27;
        }
        
        body { 
            margin: 0; background: var(--creme); overflow: hidden; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; font-family: 'Poppins', sans-serif; 
        }

        /* Background Soft Glow */
        .bg-glow {
            position: absolute; width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(212,175,55,0.15) 0%, rgba(255,253,245,0) 70%);
            border-radius: 50%; z-index: 1;
        }

        /* --- ORBIT SYSTEM --- */
        .orbit-container {
            position: absolute; width: 400px; height: 400px;
            display: flex; justify-content: center; align-items: center;
            z-index: 2; transition: 1s ease;
        }

        .float-icon {
            position: absolute; color: var(--gold); font-size: 22px;
            animation: floatAnim 3s ease-in-out infinite; opacity: 0.8;
        }

        /* Position Icons in a wide circle */
        .i1 { top: 10%; left: 50%; animation-delay: 0s; }
        .i2 { top: 30%; right: 10%; animation-delay: 0.5s; }
        .i3 { bottom: 30%; right: 10%; animation-delay: 1s; }
        .i4 { bottom: 10%; left: 50%; animation-delay: 1.5s; }
        .i5 { bottom: 30%; left: 10%; animation-delay: 2s; }
        .i6 { top: 30%; left: 10%; animation-delay: 2.5s; }
        .i7 { top: 50%; right: 0%; animation-delay: 0.2s; }
        .i8 { top: 50%; left: 0%; animation-delay: 1.2s; }

        @keyframes floatAnim {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        .orbit-rotate { animation: rotateFull 10s linear infinite; }
        @keyframes rotateFull { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* --- LOGO WRAPPER --- */
        .logo-box {
            position: relative; z-index: 10; text-align: center;
            transition: all 1.8s cubic-bezier(0.45, 0.05, 0.55, 0.95); /* Super Smooth */
        }

        .logo-box img {
            width: 160px; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1));
            transition: 1.5s;
        }

        .tagline {
            color: var(--dark-green); font-weight: 600; font-size: 18px;
            margin-top: 15px; letter-spacing: 3px; opacity: 0;
            animation: fadeIn 1s forwards 0.5s;
        }

        @keyframes fadeIn { to { opacity: 1; } }

        /* --- THE FINAL FLIGHT --- */
        .fly-active {
            position: fixed;
            top: 25px !important;
            left: 25px !important;
            transform: translate(0, 0) scale(0.35) !important;
            margin: 0 !important;
            transform-origin: top left;
        }

        .hidden { opacity: 0; transform: scale(0); transition: 0.8s; }

    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="orbit-container orbit-rotate" id="orbit-box">
        <i class="fas fa-leaf float-icon i1"></i>
        <i class="fas fa-shopping-basket float-icon i2"></i>
        <i class="fas fa-spa float-icon i3"></i>
        <i class="fas fa-hand-holding-heart float-icon i4"></i>
        <i class="fas fa-mortar-pestle float-icon i5"></i>
        <i class="fas fa-seedling float-icon i6"></i>
        <i class="fas fa-shopping-bag float-icon i7"></i>
        <i class="fas fa-briefcase-medical float-icon i8"></i>
    </div>

    <div class="logo-box" id="main-logo">
        <img src="https://raw.githubusercontent.com/nemimart/The-Nemi-Mart/main/logo.png" alt="Nemi Mart">
        <div class="tagline" id="tag">THE NEMI MART</div>
    </div>

    <script>
        window.onload = () => {
            const logo = document.getElementById('main-logo');
            const orbit = document.getElementById('orbit-box');
            const tag = document.getElementById('tag');

            // 1. Pehle 2.5 second animation dikhao
            setTimeout(() => {
                
                // 2. Icons aur tagline ko gayab karo
                orbit.classList.add('hidden');
                tag.style.opacity = "0";

                // 3. Logo ko fly karwao (Top-Left)
                // Hum center se absolute position calculate karke move karenge
                const rect = logo.getBoundingClientRect();
                logo.style.position = 'fixed';
                logo.style.top = rect.top + 'px';
                logo.style.left = rect.left + 'px';
                
                setTimeout(() => {
                    logo.classList.add('fly-active');
                }, 10);

                // 4. Finally Home Page par redirect
                setTimeout(() => {
                    window.location.href = "home.html";
                }, 1800); // Slower redirect for smooth feel

            }, 3000); 
        };
    </script>
</body>
</html>
