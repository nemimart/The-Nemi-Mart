<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nemi Mart | Elite Updates</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root {
            /* Luxury Color Palette */
            --gold: #C5A059;
            --gold-light: #E8D5B5;
            --premium-green: #0F5132;
            --soft-green: #D1E7DD;
            --cream-white: #FCFBF7;
            --pure-white: #FFFFFF;
            --dark-onyx: #121212;
            --glass-border: rgba(197, 160, 89, 0.15);
            --shadow-subtle: 0 10px 40px -10px rgba(0,0,0,0.05);
            --shadow-elevated: 0 20px 50px -12px rgba(197, 160, 89, 0.12);
        }

        /* Base Reset */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body {
            background-color: var(--cream-white);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--dark-onyx);
            min-height: 100vh;
            overflow-x: hidden;
            letter-spacing: -0.01em;
        }

        /* --- LUXURY SCROLLBAR --- */
        ::-webkit-scrollbar { width: 0px; }

        /* --- MASKED BACKGROUND --- */
        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 10% 10%, rgba(197, 160, 89, 0.04) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(15, 81, 50, 0.04) 0%, transparent 40%);
            z-index: -1;
        }

        /* --- MINIMALIST NAV --- */
        .premium-nav {
            background: rgba(252, 251, 247, 0.8);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            position: sticky; top: 0; z-index: 2000;
            padding: 20px 24px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--glass-border);
        }

        .back-circle {
            width: 48px; height: 48px; border-radius: 50%;
            background: var(--pure-white); border: 1px solid var(--glass-border);
            display: flex; align-items: center; justify-content: center;
            color: var(--dark-onyx); font-size: 16px;
            box-shadow: var(--shadow-subtle);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .back-circle:active { transform: scale(0.85) rotate(-15deg); }

        .brand-section { text-align: center; flex: 1; }
        .brand-section h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 18px; font-weight: 800;
            text-transform: uppercase; letter-spacing: 4px;
            color: var(--premium-green);
        }
        .brand-section span { font-size: 9px; font-weight: 700; color: var(--gold); letter-spacing: 2px; }

        /* --- MAIN FEED CONTAINER --- */
        .feed-wrapper { max-width: 600px; margin: 0 auto; padding: 40px 20px 120px; }

        .header-meta {
            margin-bottom: 40px; display: flex; justify-content: space-between; align-items: flex-end;
            padding: 0 10px;
        }

        .title-reveal h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 36px; font-weight: 900; line-height: 1;
            background: linear-gradient(to bottom, var(--dark-onyx), #444);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .status-pill {
            display: inline-flex; align-items: center; gap: 8px;
            background: var(--soft-green); color: var(--premium-green);
            padding: 6px 14px; border-radius: 100px;
            font-size: 10px; font-weight: 800; letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(15, 81, 50, 0.1);
        }
        .pulse-dot { width: 6px; height: 6px; background: var(--premium-green); border-radius: 50%; animation: pulse-core 2s infinite; }
        @keyframes pulse-core { 0% { transform: scale(0.95); opacity: 1; } 50% { transform: scale(1.5); opacity: 0.3; } 100% { transform: scale(0.95); opacity: 1; } }

        .action-clear {
            color: #E63946; font-size: 11px; font-weight: 800; text-transform: uppercase;
            letter-spacing: 1px; cursor: pointer; opacity: 0.6; transition: 0.3s;
        }
        .action-clear:hover { opacity: 1; text-decoration: underline; }

        /* --- THE NOTIFICATION CARD (MASTERPIECE) --- */
        .card-anchor { position: relative; margin-bottom: 25px; list-style: none; }

        .nemi-card {
            background: var(--pure-white);
            border-radius: 32px;
            padding: 28px;
            display: flex; gap: 20px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-subtle);
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            animation: card-reveal 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) backwards;
        }

        @keyframes card-reveal {
            from { opacity: 0; transform: translateY(50px) scale(0.9); filter: blur(10px); }
            to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }

        .nemi-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: var(--shadow-elevated);
            border-color: var(--gold-light);
        }

        .icon-accent {
            width: 64px; height: 64px; border-radius: 24px;
            background: var(--cream-white);
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; color: var(--gold);
            border: 1px solid var(--glass-border);
            flex-shrink: 0; position: relative;
        }

        .icon-accent::before {
            content: ''; position: absolute; inset: -2px; border-radius: 26px;
            background: linear-gradient(135deg, var(--gold), transparent, var(--premium-green));
            z-index: -1; opacity: 0.3;
        }

        .card-body { flex: 1; }
        .card-body h3 {
            font-family: 'Outfit', sans-serif; font-size: 19px; font-weight: 800;
            color: var(--dark-onyx); margin-bottom: 8px;
        }
        .card-body p {
            font-size: 14px; color: #555; line-height: 1.7;
            font-weight: 500; opacity: 0.8;
        }

        .card-footer {
            margin-top: 20px; display: flex; align-items: center; justify-content: space-between;
        }

        .time-label {
            font-size: 10px; font-weight: 800; color: var(--gold);
            text-transform: uppercase; letter-spacing: 1px;
            display: flex; align-items: center; gap: 6px;
        }

        .premium-tag {
            background: #F8F9FA; color: var(--dark-onyx);
            padding: 4px 10px; border-radius: 8px;
            font-size: 9px; font-weight: 900; letter-spacing: 0.5px;
            border: 1px solid #EEE;
        }

        .del-surface {
            width: 38px; height: 38px; border-radius: 14px;
            background: #FFF5F5; color: #FF4D4D;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s; border: none;
        }
        .del-surface:hover { background: #FF4D4D; color: white; transform: rotate(90deg); }

        /* --- EMPTY STATE --- */
        .empty-void {
            text-align: center; padding: 100px 40px; display: none;
        }
        .empty-void i {
            font-size: 80px; color: var(--gold-light); margin-bottom: 25px;
            display: block; opacity: 0.5;
        }
        .empty-void h3 { font-family: 'Outfit'; font-size: 24px; color: var(--dark-onyx); margin-bottom: 10px; }
        .empty-void p { font-size: 14px; color: var(--text-muted); max-width: 250px; margin: 0 auto; }

        /* --- LOADER --- */
        #master-loader {
            position: fixed; inset: 0; background: var(--cream-white);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999;
        }
        .gold-loader {
            width: 50px; height: 50px; border: 3px solid var(--gold-light);
            border-top: 3px solid var(--gold); border-radius: 50%;
            animation: spin 1s infinite cubic-bezier(0.5, 0.1, 0.4, 0.9);
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* --- TOAST RE-IMAGINED --- */
        .haptic-toast {
            position: fixed; top: 30px; left: 50%; transform: translateX(-50%);
            background: var(--dark-onyx); color: white;
            padding: 12px 24px; border-radius: 100px;
            font-size: 13px; font-weight: 700; z-index: 5000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            display: none; border: 1px solid rgba(255,255,255,0.1);
            animation: slideDown 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards;
        }
        @keyframes slideDown { from { top: -50px; opacity: 0; } to { top: 30px; opacity: 1; } }

    </style>
</head>
<body>

    <div id="master-loader">
        <div class="gold-loader"></div>
        <p style="margin-top: 20px; font-weight: 800; font-size: 10px; letter-spacing: 3px; color: var(--gold);">VERIFYING ENCRYPTION</p>
    </div>

    <nav class="premium-nav">
        <button class="back-circle" onclick="window.history.back()">
            <i class="fa-solid fa-arrow-left-long"></i>
        </button>
        <div class="brand-section">
            <h1>NEMI MART</h1>
            <span>PRIVATE UPDATES</span>
        </div>
        <div style="width: 48px;"></div> </nav>

    <main class="feed-wrapper">
        <div class="header-meta">
            <div class="title-reveal">
                <div class="status-pill">
                    <span class="pulse-dot"></span> SECURE FEED
                </div>
                <h2>The Inbox</h2>
            </div>
            <div class="action-clear" onclick="clearAll()">Wipe All</div>
        </div>

        <div id="notif-feed"></div>

        <div id="empty-state" class="empty-void">
            <i class="fa-solid fa-wind"></i>
            <h3>Silent for now.</h3>
            <p>We'll notify you as soon as something premium drops.</p>
        </div>
    </main>

    <div id="toast-ui" class="haptic-toast">Action Confirmed</div>

    <script>
        // 1. Firebase Initializer
        const firebaseConfig = {
            databaseURL: "https://nemi-mart-2-default-rtdb.firebaseio.com/"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 2. Data Synchronization
        function syncInbox() {
            const feedContainer = document.getElementById('notif-feed');
            const loader = document.getElementById('master-loader');
            const emptyState = document.getElementById('empty-state');

            db.ref('notifications').on('value', (snap) => {
                // Smoothly remove loader
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);

                feedContainer.innerHTML = '';
                const items = snap.val();

                if (!items) {
                    emptyState.style.display = 'block';
                    return;
                }

                emptyState.style.display = 'none';
                
                // Show newest at the top
                const keys = Object.keys(items).reverse();

                keys.forEach((key, idx) => {
                    const data = items[key];
                    const card = document.createElement('div');
                    card.className = 'card-anchor';
                    
                    // Logic for Dynamic Luxury Icons
                    let iconType = 'fa-crown';
                    if(data.type === 'new') iconType = 'fa-spa';
                    if(data.type === 'sale') iconType = 'fa-gem';
                    if(data.type === 'order') iconType = 'fa-cube';

                    card.innerHTML = `
                        <div class="nemi-card" style="animation-delay: ${idx * 0.1}s">
                            <div class="icon-accent">
                                <i class="fa-solid ${iconType}"></i>
                            </div>
                            <div class="card-body">
                                <h3>${data.title || 'Exclusive Update'}</h3>
                                <p>${data.message || 'Unlock new possibilities with Nemi Mart latest premium selection.'}</p>
                                <div class="card-footer">
                                    <div class="time-label">
                                        <i class="fa-solid fa-bolt-lightning"></i> 
                                        ${calculateRelativeTime(data.timestamp)}
                                    </div>
                                    <div style="display: flex; align-items: center; gap: 12px;">
                                        <span class="premium-tag">OFFICIAL</span>
                                        <button class="del-surface" onclick="wipeSingle('${key}')">
                                            <i class="fa-solid fa-xmark"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                    feedContainer.appendChild(card);
                });
            }, (err) => {
                console.error("Database Breach:", err);
                showHapticToast("Network Error ⚠️");
            });
        }

        // 3. Functional Engines
        function calculateRelativeTime(timestamp) {
            if (!timestamp) return "Presently";
            const now = Date.now();
            const gap = Math.floor((now - timestamp) / 1000);
            
            if (gap < 60) return "Moments ago";
            if (gap < 3600) return `${Math.floor(gap / 60)}m ago`;
            if (gap < 86400) return `${Math.floor(gap / 3600)}h ago`;
            return new Date(timestamp).toLocaleDateString();
        }

        function wipeSingle(id) {
            event.stopPropagation();
            db.ref('notifications/' + id).remove()
                .then(() => showHapticToast("Update Discarded"));
        }

        function clearAll() {
            if(confirm("Permanently wipe all inbox records?")) {
                db.ref('notifications').remove()
                    .then(() => showHapticToast("Inbox Flushed"));
            }
        }

        function showHapticToast(msg) {
            const toast = document.getElementById('toast-ui');
            toast.innerText = msg;
            toast.style.display = 'block';
            
            setTimeout(() => {
                toast.style.animation = 'fadeOut 0.5s forwards';
                setTimeout(() => {
                    toast.style.display = 'none';
                    toast.style.animation = 'slideDown 0.5s forwards';
                }, 500);
            }, 3000);
        }

        // Boot
        window.onload = syncInbox;

    </script>
</body>
</html>
