<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN PANEL 1 - PRODUCT MANAGEMENT (NEMI MART 2)</title>
    <style>
        /* Black & White Industrial Design */
        body { background-color: #000; color: #fff; font-family: monospace; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; border: 2px solid #fff; padding: 30px; }
        header { border-bottom: 2px solid #fff; padding-bottom: 20px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        
        h1 { margin: 0; font-size: 28px; text-transform: uppercase; letter-spacing: 2px; }
        .nav-link { color: #000; background: #fff; padding: 10px 20px; text-decoration: none; font-weight: bold; }
        .nav-link:hover { background: #ccc; }

        .section-title { background: #fff; color: #000; padding: 5px 10px; display: inline-block; margin-bottom: 20px; font-weight: bold; }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .form-group { margin-bottom: 20px; display: flex; flex-direction: column; }
        
        label { margin-bottom: 8px; text-transform: uppercase; font-size: 14px; color: #aaa; }
        input, textarea, select { 
            background: #000; border: 1px solid #fff; padding: 12px; color: #fff; font-family: monospace; font-size: 16px; outline: none;
        }
        input:focus, textarea:focus { background: #111; border-color: #aaa; }
        
        .full-width { grid-column: 1 / span 2; }
        
        button#submitBtn { 
            width: 100%; padding: 20px; background: #fff; color: #000; border: none; font-size: 20px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 30px; transition: 0.3s;
        }
        button#submitBtn:hover { background: #00ff00; color: #000; }
        button#submitBtn:disabled { background: #444; cursor: not-allowed; }

        #progressContainer { width: 100%; border: 1px solid #fff; height: 20px; margin-top: 10px; display: none; }
        #progressBar { height: 100%; background: #fff; width: 0%; }

        .status-msg { margin-top: 20px; padding: 15px; border: 1px dashed #fff; display: none; }
        
        /* Table for live inventory */
        .inventory-table { width: 100%; border-collapse: collapse; margin-top: 50px; }
        .inventory-table th, .inventory-table td { border: 1px solid #fff; padding: 12px; text-align: left; }
        .inventory-table th { background: #fff; color: #000; }
        .prod-img-preview { width: 50px; height: 50px; object-fit: cover; border: 1px solid #fff; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Admin Control 01 [Products]</h1>
        <a href="admin2.html" class="nav-link">GO TO ADMIN 02 (ORDERS) -></a>
    </header>

    <div class="section-title">Nemi Mart 2 - Database Injection</div>

    <form id="productForm">
        <div class="form-grid">
            <div class="form-group">
                <label>Product Title / Name</label>
                <input type="text" id="title" required placeholder="Ex: Pure Organic Ghee">
            </div>

            <div class="form-group">
                <label>Category</label>
                <select id="category">
                    <option value="organic-food">Organic Food</option>
                    <option value="herbal">Herbal</option>
                    <option value="skincare">Skincare</option>
                    <option value="seeds">Seeds</option>
                </select>
            </div>

            <div class="form-group">
                <label>Actual Price (INR)</label>
                <input type="number" id="price" required placeholder="999">
            </div>

            <div class="form-group">
                <label>Discount Percentage (%)</label>
                <input type="number" id="discount" value="0" placeholder="10">
            </div>

            <div class="form-group">
                <label>Current Stock (Quantity)</label>
                <input type="number" id="stock" required placeholder="50">
            </div>

            <div class="form-group">
                <label>Upload Product Image</label>
                <input type="file" id="imageInput" accept="image/*" required>
                <div id="progressContainer"><div id="progressBar"></div></div>
            </div>

            <div class="form-group full-width">
                <label>Short Description (Hero Text)</label>
                <input type="text" id="shortDesc" placeholder="Brief catchline for the product...">
            </div>

            <div class="form-group full-width">
                <label>Main Description (Full Details)</label>
                <textarea id="longDesc" rows="8" placeholder="Enter everything about the product here..."></textarea>
            </div>

            <div class="form-group full-width">
                <label>Ingredients (Separate with commas ',')</label>
                <textarea id="ingredients" rows="3" placeholder="Ingredient 1, Ingredient 2, Ingredient 3..."></textarea>
            </div>
            
            <div class="form-group full-width">
                <label>How to Use / Instructions</label>
                <textarea id="usage" rows="3" placeholder="Instructions for the customer..."></textarea>
            </div>
        </div>

        <button type="submit" id="submitBtn">EXECUTE DATABASE UPLOAD</button>
    </form>

    <div id="status" class="status-msg"></div>

    <div class="section-title" style="margin-top: 60px;">Live Catalog Preview</div>
    <table class="inventory-table">
        <thead>
            <tr>
                <th>Image</th>
                <th>Name</th>
                <th>Price</th>
                <th>Stock</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="inventoryBody">
            </tbody>
    </table>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

    // PROJECT 2 CONFIG (Nemi Mart 2)
    const firebaseConfig = {
        apiKey: "AIzaSyDVIz9_OlUcxl-Dy5oFa_yV6LPPNLp1M80",
        authDomain: "nemi-mart-2.firebaseapp.com",
        projectId: "nemi-mart-2",
        storageBucket: "nemi-mart-2.firebasestorage.app",
        messagingSenderId: "787406811321",
        appId: "1:787406811321:web:c2306258fccb0bb171eb68"
    };

    // Initialize
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);

    const form = document.getElementById('productForm');
    const statusDiv = document.getElementById('status');

    // --- FUNCTION: Upload & Save ---
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = "UPLOADING TO CLOUD...";

        const file = document.getElementById('imageInput').files[0];
        const title = document.getElementById('title').value;
        const price = document.getElementById('price').value;
        const discount = document.getElementById('discount').value;
        const stock = document.getElementById('stock').value;
        const category = document.getElementById('category').value;
        const shortDesc = document.getElementById('shortDesc').value;
        const longDesc = document.getElementById('longDesc').value;
        const ingredients = document.getElementById('ingredients').value.split(',');
        const usage = document.getElementById('usage').value;

        try {
            // 1. Storage Upload
            const storageRef = ref(storage, `nemi_products/${Date.now()}_${file.name}`);
            const uploadTask = uploadBytesResumable(storageRef, file);

            document.getElementById('progressContainer').style.display = 'block';

            uploadTask.on('state_changed', 
                (snapshot) => {
                    const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                    document.getElementById('progressBar').style.width = progress + '%';
                }, 
                (error) => { throw error; }, 
                async () => {
                    const downloadURL = await getDownloadURL(uploadTask.snapshot.ref);

                    // 2. Firestore Save
                    await addDoc(collection(db, "products"), {
                        title,
                        category,
                        price: parseFloat(price),
                        discount: parseFloat(discount),
                        finalPrice: price - (price * (discount / 100)),
                        stock: parseInt(stock),
                        image: downloadURL,
                        shortDesc,
                        longDesc,
                        ingredients: ingredients.map(i => i.trim()),
                        usage,
                        createdAt: new Date().toISOString()
                    });

                    statusDiv.style.display = 'block';
                    statusDiv.style.color = '#00ff00';
                    statusDiv.innerText = "SUCCESS: PRODUCT INJECTED INTO NEMI-MART-2 DATABASE.";
                    form.reset();
                    btn.disabled = false;
                    btn.innerText = "EXECUTE DATABASE UPLOAD";
                    document.getElementById('progressContainer').style.display = 'none';
                    fetchInventory();
                }
            );

        } catch (err) {
            statusDiv.style.display = 'block';
            statusDiv.style.color = '#ff0000';
            statusDiv.innerText = "ERROR: " + err.message;
            btn.disabled = false;
        }
    });

    // --- FUNCTION: Fetch Inventory ---
    async function fetchInventory() {
        const tbody = document.getElementById('inventoryBody');
        tbody.innerHTML = "<tr><td colspan='5'>Loading...</td></tr>";
        
        const snap = await getDocs(collection(db, "products"));
        tbody.innerHTML = "";
        
        snap.forEach(docSnap => {
            const p = docSnap.data();
            tbody.innerHTML += `
                <tr>
                    <td><img src="${p.image}" class="prod-img-preview"></td>
                    <td>${p.title}</td>
                    <td>₹${p.price}</td>
                    <td>${p.stock}</td>
                    <td><button onclick="deleteProd('${docSnap.id}')" style="background:red; color:white; border:none; padding:5px; cursor:pointer;">DELETE</button></td>
                </tr>
            `;
        });
    }

    // --- FUNCTION: Delete Product ---
    window.deleteProd = async (id) => {
        if(confirm("Confirm Destruction of Product ID: " + id + "?")) {
            await deleteDoc(doc(db, "products", id));
            fetchInventory();
        }
    };

    // Init
    fetchInventory();

</script>
</body>
</html>
