<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEMI ADMIN PRO </title>
    <style>
        /* NEU-BRUTALISM INDUSTRIAL DESIGN */
        :root {
            --bg: #ffffff;
            --main: #000000;
            --surface: #f0f0f0;
            --accent: #2bff00;
            --err: #ff003c;
            --border-thk: 5px;
        }

        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); 
            color: var(--main); 
            font-family: 'Inter', -apple-system, sans-serif; 
            margin: 0; 
            padding: 10px; 
            font-weight: 800;
        }

        /* CUSTOM SCROLLBAR */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--main); border: 2px solid var(--bg); }

        .app-container { 
            max-width: 1400px; 
            margin: 0 auto; 
            border: var(--border-thk) solid var(--main); 
            padding: 30px;
            min-height: 98vh;
        }

        header { 
            border-bottom: var(--border-thk) solid var(--main); 
            padding-bottom: 30px; 
            margin-bottom: 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .logo-text { font-size: 40px; text-transform: uppercase; letter-spacing: -3px; line-height: 0.9; }
        .logo-sub { font-size: 12px; letter-spacing: 2px; margin-top: 5px; background: var(--main); color: var(--bg); display: inline-block; padding: 2px 8px; }

        .btn-nav { 
            background: var(--main); 
            color: var(--bg); 
            padding: 18px 30px; 
            text-decoration: none; 
            font-size: 14px;
            border: 3px solid var(--main);
            transition: 0.2s;
            text-transform: uppercase;
        }
        .btn-nav:hover { background: var(--bg); color: var(--main); }

        /* INPUT GRID */
        .form-engine { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 40px; }
        .control-group { display: flex; flex-direction: column; gap: 12px; }
        .full-width { grid-column: 1 / -1; }
        
        label { text-transform: uppercase; font-size: 14px; letter-spacing: 1px; }
        
        input, textarea, select { 
            border: var(--border-thk) solid var(--main); 
            padding: 20px; 
            font-size: 18px; 
            font-weight: 800;
            background: var(--bg);
            border-radius: 0;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        input:focus { transform: translate(-5px, -5px); box-shadow: 8px 8px 0px var(--main); background: var(--surface); }

        /* IMAGE SLOT SYSTEM */
        .media-vault { 
            border: 4px dashed var(--main); 
            padding: 30px; 
            background: var(--surface);
        }
        .file-input-row { margin-bottom: 15px; border-bottom: 2px solid var(--main); padding-bottom: 10px; }
        .btn-add-slot { 
            background: var(--surface); 
            border: 3px solid var(--main); 
            padding: 15px; 
            cursor: pointer; 
            font-weight: 900;
            width: 100%;
            text-transform: uppercase;
        }

        /* EXECUTE BUTTON */
        #btnInject { 
            background: var(--main); 
            color: var(--bg); 
            border: none; 
            padding: 35px; 
            font-size: 28px; 
            font-weight: 900; 
            width: 100%; 
            margin-top: 60px; 
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 5px;
            box-shadow: 12px 12px 0px #ccc;
        }
        #btnInject:active { transform: translate(4px, 4px); box-shadow: 4px 4px 0px #ccc; }
        #btnInject:disabled { background: #999; cursor: not-allowed; }

        /* PROGRESS LOGIC */
        .progress-box { width: 100%; border: var(--border-thk) solid var(--main); height: 30px; margin-top: 25px; display: none; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--accent); width: 0%; transition: 0.2s; }

        /* LIVE DATABASE FEED */
        .inventory-logs { margin-top: 100px; }
        .section-title { background: var(--main); color: var(--bg); padding: 15px 25px; text-transform: uppercase; font-size: 20px; display: inline-block; margin-bottom: 30px; }
        
        .product-card { 
            border: var(--border-thk) solid var(--main); 
            margin-bottom: 25px; 
            padding: 25px; 
            display: grid; 
            grid-template-columns: auto 1fr auto; 
            align-items: center; 
            gap: 30px;
            transition: 0.3s;
        }
        .product-card:hover { background: var(--surface); }
        .product-card img { width: 120px; height: 120px; object-fit: cover; border: 4px solid var(--main); }
        
        .product-info h3 { margin: 0; font-size: 24px; text-transform: uppercase; }
        .product-info p { margin: 10px 0 0 0; font-size: 14px; opacity: 0.6; }

        .badge { padding: 8px 15px; font-size: 12px; border: 3px solid var(--main); text-transform: uppercase; display: inline-block; margin-bottom: 10px; }
        .in-stock { background: var(--accent); }
        .out-stock { background: var(--err); color: #fff; }

        .btn-group { display: flex; gap: 15px; }
        .action-btn { padding: 15px 20px; border: 3px solid var(--main); font-size: 12px; cursor: pointer; background: var(--bg); font-weight: 900; text-transform: uppercase; }
        .btn-wipe { background: var(--main); color: var(--bg); }

        /* NOTIFICATION TOAST */
        #notifier { 
            position: fixed; top: 30px; right: 30px; z-index: 99999;
            display: flex; flex-direction: column; gap: 15px;
        }
        .toast-msg {
            background: var(--main); color: var(--bg); padding: 25px 50px;
            border: 4px solid var(--main); font-weight: 900; text-transform: uppercase;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.1);
            animation: slideIn 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        @media (max-width: 900px) {
            .product-card { grid-template-columns: 1fr; text-align: center; justify-items: center; }
            .btn-group { width: 100%; flex-direction: column; }
        }
    </style>
</head>
<body>

<div id="notifier"></div>

<div class="app-container">
    <header>
        <div class="brand">
            <div class="logo-text">NEMI_PRO_v5</div>
            <div class="logo-sub">SYSTEM: RTDB_LINK_ACTIVE</div>
        </div>
        <a href="admin2.html" class="btn-nav">Switch to Orders Console -></a>
    </header>

    <form id="injectionForm">
        <div class="form-engine">
            <div class="control-group">
                <label>Product Title [Master Name]</label>
                <input type="text" id="title" required placeholder="Ex: Organic Almond Oil">
            </div>

            <div class="control-group">
                <label>Inventory Category</label>
                <select id="cat">
                    <option value="organic">Organic Essentials</option>
                    <option value="health">Healthcare & Wellness</option>
                    <option value="seeds">Agriculture Seeds</option>
                    <option value="skincare">Natural Skincare</option>
                </select>
            </div>

            <div class="control-group">
                <label>Price [Base INR]</label>
                <input type="number" id="price" required placeholder="0.00">
            </div>

            <div class="control-group">
                <label>Current Discount (%)</label>
                <input type="number" id="disc" value="0">
            </div>

            <div class="control-group">
                <label>Stock Count</label>
                <input type="number" id="stock" required placeholder="100">
            </div>

            <div class="control-group">
                <label>Media Payload [Multi-Image]</label>
                <div class="media-vault" id="photoZone">
                    <div class="file-input-row">
                        <input type="file" class="p-files" accept="image/*" required>
                    </div>
                </div>
                <button type="button" class="btn-add-slot" onclick="addNewSlot()">+ Add Another Photo</button>
            </div>

            <div class="control-group full-width">
                <label>Product One-Liner [Hero]</label>
                <input type="text" id="hero" placeholder="Short description for the home page...">
            </div>

            <div class="control-group full-width">
                <label>Full Content Story</label>
                <textarea id="longDesc" rows="6" placeholder="Deep details about the product benefits..."></textarea>
            </div>

            <div class="control-group full-width">
                <label>Ingredients / Specifications (Comma Separated)</label>
                <textarea id="ing" rows="2" placeholder="Item 1, Item 2, Item 3..."></textarea>
            </div>

            <div class="control-group full-width">
                <label>Usage Instructions</label>
                <textarea id="usage" rows="2" placeholder="How to use this product for best results..."></textarea>
            </div>
        </div>

        <div class="progress-box" id="pBox"><div class="progress-bar" id="pBar"></div></div>
        <button type="submit" id="btnInject">Infect Cloud Database</button>
    </form>

    <div class="inventory-logs">
        <div class="section-title">Live RTDB Product Stream</div>
        <div id="liveStream">
            <div style="padding:50px; text-align:center;">SCANNING DATABASE PROTOCOLS...</div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getStorage, ref as sRef, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDVIz9_OlUcxl-Dy5oFa_yV6LPPNLp1M80",
        authDomain: "nemi-mart-2.firebaseapp.com",
        databaseURL: "https://nemi-mart-2-default-rtdb.firebaseio.com",
        projectId: "nemi-mart-2",
        storageBucket: "nemi-mart-2.firebasestorage.app",
        messagingSenderId: "787406811321",
        appId: "1:787406811321:web:c2306258fccb0bb171eb68"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const storage = getStorage(app);

    // DYNAMIC MEDIA SLOTS
    window.addNewSlot = () => {
        const zone = document.getElementById('photoZone');
        const div = document.createElement('div');
        div.className = 'file-input-row';
        div.innerHTML = '<input type="file" class="p-files" accept="image/*">';
        zone.appendChild(div);
    };

    // PROFESSIONAL TOAST NOTIFIER
    function notify(msg) {
        const box = document.getElementById('notifier');
        const el = document.createElement('div');
        el.className = 'toast-msg';
        el.innerText = `SYS_MSG: ${msg}`;
        box.appendChild(el);
        setTimeout(() => el.remove(), 4000);
    }

    // MAIN UPLOAD CORE
    document.getElementById('injectionForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnInject');
        const pBar = document.getElementById('pBar');
        const pBox = document.getElementById('pBox');

        btn.disabled = true;
        btn.innerText = "TRANSFERRING PAYLOAD...";
        pBox.style.display = 'block';

        const fileInputs = document.querySelectorAll('.p-files');
        const photoUrls = [];

        try {
            // Step 1: Sequential Image Upload
            for(let input of fileInputs) {
                const file = input.files[0];
                if(!file) continue;

                const fileName = `nemi_v5_${Date.now()}_${file.name}`;
                const storageRef = sRef(storage, `products/${fileName}`);
                const uploadTask = uploadBytesResumable(storageRef, file);

                await new Promise((resolve, reject) => {
                    uploadTask.on('state_changed', 
                        (snap) => {
                            let prog = (snap.bytesTransferred / snap.totalBytes) * 100;
                            pBar.style.width = prog + '%';
                        }, 
                        reject, 
                        async () => {
                            const url = await getDownloadURL(uploadTask.snapshot.ref);
                            photoUrls.push(url);
                            resolve();
                        }
                    );
                });
            }

            // Step 2: RTDB Injection
            const basePrice = parseFloat(document.getElementById('price').value);
            const discPercent = parseFloat(document.getElementById('disc').value);
            const newProdRef = push(ref(db, 'products'));

            await set(newProdRef, {
                title: document.getElementById('title').value,
                category: document.getElementById('cat').value,
                price: basePrice,
                discount: discPercent,
                finalPrice: basePrice - (basePrice * (discPercent/100)),
                stock: document.getElementById('stock').value,
                images: photoUrls,
                hero: document.getElementById('hero').value,
                description: document.getElementById('longDesc').value,
                ingredients: document.getElementById('ing').value.split(','),
                usage: document.getElementById('usage').value,
                status: 'INSTOCK',
                createdAt: Date.now()
            });

            notify("INJECTION SUCCESSFUL - DATABASE SYNCED");
            document.getElementById('injectionForm').reset();
            pBar.style.width = '0%';
            
        } catch (err) {
            notify("CRITICAL ERROR: " + err.message);
        } finally {
            btn.disabled = false;
            btn.innerText = "Infect Cloud Database";
            pBox.style.display = 'none';
        }
    });

    // REAL-TIME FETCH (NO REFRESH NEEDED)
    onValue(ref(db, 'products'), (snapshot) => {
        const stream = document.getElementById('liveStream');
        stream.innerHTML = "";
        const data = snapshot.val();
        
        if(!data) {
            stream.innerHTML = "<div style='padding:50px; text-align:center;'>DATABASE VACANT - READY FOR INJECTION</div>";
            return;
        }

        // Convert to array and sort by newest first
        const sortedKeys = Object.keys(data).sort((a, b) => data[b].createdAt - data[a].createdAt);

        sortedKeys.forEach(key => {
            const p = data[key];
            const isOut = p.status === 'OUTSTOCK';

            stream.innerHTML += `
                <div class="product-card">
                    <img src="${p.images ? p.images[0] : 'https://via.placeholder.com/120'}">
                    <div class="product-info">
                        <span class="badge ${isOut ? 'out-stock' : 'in-stock'}">${p.status}</span>
                        <h3>${p.title}</h3>
                        <p>ID: ${key}</p>
                        <p style="color:var(--main); font-size:18px; margin-top:5px;">₹${p.finalPrice} <span style="font-size:12px; opacity:0.5;">(Stock: ${p.stock})</span></p>
                    </div>
                    <div class="btn-group">
                        <button class="action-btn" onclick="flipStatus('${key}', '${p.status}')">Toggle Status</button>
                        <button class="action-btn btn-wipe" onclick="vaporize('${key}')">Wipe Data</button>
                    </div>
                </div>
            `;
        });
    });

    // CLOUD CONTROLS
    window.flipStatus = (id, current) => {
        const next = current === 'INSTOCK' ? 'OUTSTOCK' : 'INSTOCK';
        update(ref(db, 'products/' + id), { status: next });
        notify("STATUS FLIPPED");
    };

    window.vaporize = (id) => {
        if(confirm("VAPORIZE THIS PRODUCT FROM DATABASE?")) {
            remove(ref(db, 'products/' + id));
            notify("PRODUCT DELETED");
        }
    };

</script>
</body>
</html>
