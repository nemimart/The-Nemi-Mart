 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEMI MASTER v10 | PRO BUSINESS SUITE</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --secondary: #f43f5e;
            --dark: #0f172a;
            --accent: #10b981;
            --bg: #f8fafc;
            --text-muted: #64748b;
        }

        * { box-sizing: border-box; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); margin: 0; padding-bottom: 100px; color: var(--dark); }

        /* HEAVY LOADER */
        #mainLoader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.95); z-index: 9999; display: none;
            flex-direction: column; justify-content: center; align-items: center; color: white;
            backdrop-filter: blur(5px);
        }
        .spinner { width: 60px; height: 60px; border: 6px solid #1e293b; border-top: 6px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* TOAST NOTIFICATIONS */
        #toastContainer { position: fixed; top: 80px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .toast { background: white; border-left: 5px solid var(--primary); padding: 15px 20px; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); font-weight: 600; font-size: 14px; animation: slideInRight 0.3s ease-out forwards; display: flex; align-items: center; gap: 10px; }
        .toast.error { border-color: var(--secondary); }
        .toast.success { border-color: var(--accent); }
        @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }

        /* PREMIUM HEADER */
        header {
            background: linear-gradient(135deg, var(--dark), #1e293b);
            padding: 20px; color: white; position: sticky; top: 0; z-index: 1000;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 4px solid var(--primary); box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .brand h1 { margin: 0; font-size: 18px; font-weight: 800; letter-spacing: 1px; }
        .nav-btns { display: flex; gap: 10px; }
        .btn-top { background: var(--primary); color: white; padding: 8px 15px; border-radius: 10px; text-decoration: none; font-size: 11px; font-weight: 700; border: none; cursor: pointer; transition: 0.3s; }
        .btn-top:active { transform: scale(0.95); }
        .btn-order { background: var(--secondary); }

        /* FORM & CARDS */
        .content-section { display: none; padding: 15px; animation: slideIn 0.4s ease-out; }
        .active-section { display: block; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: white; border-radius: 28px; padding: 25px; box-shadow: 0 15px 40px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .tag { font-size: 10px; font-weight: 800; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; display: block; }

        .input-grid { display: grid; gap: 15px; }
        .field { display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 12px; font-weight: 700; color: var(--text-muted); }
        input, textarea, select { background: #f1f5f9; border: 2px solid transparent; padding: 14px; border-radius: 16px; font-size: 15px; transition: 0.3s; color: var(--dark); font-weight: 500; }
        input:focus, textarea:focus, select:focus { border-color: var(--primary); background: white; outline: none; box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); }
        
        /* SEARCH BAR */
        .search-bar { width: 100%; padding: 15px 20px; border-radius: 20px; border: 2px solid #e2e8f0; font-size: 15px; margin-bottom: 20px; outline: none; transition: 0.3s; }
        .search-bar:focus { border-color: var(--primary); }

        /* MULTI-PHOTO SYSTEM */
        .photo-container { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .photo-row { display: flex; gap: 10px; align-items: center; background: #f8fafc; padding: 10px; border-radius: 16px; border: 1px dashed #cbd5e1; }
        .photo-row input { flex: 1; padding: 8px; background: transparent; }
        .btn-add-photo { background: #e0e7ff; color: var(--primary); border: none; padding: 12px; border-radius: 14px; font-weight: 800; cursor: pointer; margin-top: 5px; transition: 0.2s; }
        .btn-add-photo:active { background: #c7d2fe; }

        .btn-main { background: var(--dark); color: white; width: 100%; padding: 20px; border-radius: 20px; border: none; font-size: 18px; font-weight: 800; margin-top: 15px; cursor: pointer; box-shadow: 0 10px 25px rgba(15, 23, 42, 0.3); transition: 0.3s; }
        .btn-main:active { transform: translateY(2px); box-shadow: 0 5px 15px rgba(15, 23, 42, 0.2); }

        /* HISTORY CARDS */
        .hist-card { background: white; border-radius: 22px; padding: 15px; margin-bottom: 15px; display: flex; gap: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.03); align-items: flex-start; transition: 0.3s; position: relative; }
        .hist-card:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(0,0,0,0.08); }
        .hist-card img { width: 90px; height: 90px; border-radius: 15px; object-fit: cover; background: #f1f5f9; }
        .hist-details { flex: 1; overflow: hidden; }
        .hist-details h4 { margin: 0 0 5px 0; font-size: 16px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .status-badge { display: inline-block; padding: 4px 10px; border-radius: 8px; font-size: 10px; font-weight: 800; margin-top: 8px; text-transform: uppercase; }
        .in-stock { background: #dcfce7; color: #166534; }
        .out-stock { background: #fee2e2; color: #991b1b; }
        .limited-stock { background: #fef9c3; color: #854d0e; }

        .action-btns { display: flex; gap: 8px; margin-top: 12px; }
        .btn-icon { background: #f1f5f9; border: none; padding: 8px 12px; border-radius: 10px; cursor: pointer; font-size: 14px; transition: 0.2s; font-weight: 600; display: flex; align-items: center; justify-content: center; color: var(--dark); }
        .btn-icon:hover { background: #e2e8f0; }
        .btn-icon.edit { background: #e0e7ff; color: var(--primary); }
        .btn-icon.del { background: #ffe4e6; color: var(--secondary); }

        /* EDIT MODAL */
        #editModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15,23,42,0.8); z-index: 3000; display: none; justify-content: center; align-items: flex-end; backdrop-filter: blur(4px); }
        .modal-content { background: white; width: 100%; border-radius: 30px 30px 0 0; padding: 25px; max-height: 85vh; overflow-y: auto; animation: slideUpModal 0.3s ease-out; }
        @keyframes slideUpModal { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-header h3 { margin: 0; font-size: 20px; font-weight: 800; }
        .close-modal { background: #f1f5f9; border: none; width: 35px; height: 35px; border-radius: 50%; font-size: 16px; cursor: pointer; font-weight: bold; }

        /* BOTTOM NAV */
        nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 15px 0 25px; border-top: 1px solid #eee; z-index: 2000; box-shadow: 0 -5px 20px rgba(0,0,0,0.03); }
        .nav-link { text-decoration: none; color: #94a3b8; font-size: 11px; font-weight: 700; text-align: center; flex: 1; transition: 0.3s; }
        .nav-link.active { color: var(--primary); transform: translateY(-3px); }
        .nav-link i { font-size: 24px; display: block; margin-bottom: 4px; }
        
        /* Stats Bar */
        .stats-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .stat-box { flex: 1; background: white; padding: 15px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.03); text-align: center; }
        .stat-box h3 { margin: 0; font-size: 24px; color: var(--primary); font-weight: 800; }
        .stat-box p { margin: 5px 0 0; font-size: 11px; color: var(--text-muted); font-weight: 700; text-transform: uppercase; }
    </style>
</head>
<body>

<div id="toastContainer"></div>

<div id="mainLoader">
    <div class="spinner"></div>
    <p style="margin-top: 20px; font-weight: 800; letter-spacing: 1px; font-size: 18px;">DEPLOYING SECURELY...</p>
    <span id="loadProgress" style="font-size: 13px; color: var(--accent); margin-top: 5px; font-weight: 600;">Processing System</span>
</div>

<header>
    <div class="brand"><h1>NEMI MASTER <small style="font-size: 10px; color: var(--accent); background: rgba(16,185,129,0.2); padding: 2px 6px; border-radius: 5px;">PRO V10</small></h1></div>
    <div class="nav-btns">
        <a href="admin2.html" class="btn-top btn-order">📦 ORDERS</a>
    </div>
</header>

<div id="addPage" class="content-section active-section">
    <span class="tag">Inventory Master Control</span>
    <div class="card">
        <form id="proForm">
            <div class="input-grid">
                <div class="field">
                    <label>Full Product Title</label>
                    <input type="text" id="title" required placeholder="Ex: Pure Ayurvedic Neem Oil">
                </div>

                <div class="field">
                    <label>Product Category</label>
                    <select id="category" required>
                        <option value="">Select Category</option>
                        <option value="Skin Care">Skin Care</option>
                        <option value="Hair Care">Hair Care</option>
                        <option value="Oils">Oils</option>
                        <option value="Health">Health</option>
                        <option value="Personal Care">Personal Care</option>
                    </select>
                </div>

                <div style="display: flex; gap: 10px;">
                    <div class="field" style="flex:1;">
                        <label>Original Price (₹)</label>
                        <input type="number" id="price" required min="0">
                    </div>
                    <div class="field" style="flex:1;">
                        <label>Discount %</label>
                        <input type="number" id="disc" value="0" min="0" max="100">
                    </div>
                </div>

                <div class="field">
                    <label>Permanent Photos (Cloudinary CDN)</label>
                    <div id="photoList" class="photo-container">
                        <div class="photo-row">
                            <input type="file" class="photo-input" accept="image/*" required>
                        </div>
                    </div>
                    <button type="button" class="btn-add-photo" onclick="addNewPhotoField()">+ Add More Photo</button>
                </div>

                <div class="field">
                    <label>Current Stock Count</label>
                    <input type="number" id="stockCount" required placeholder="Total units available" min="0">
                </div>

                <div class="field">
                    <label>Marketing Tagline</label>
                    <input type="text" id="hero" placeholder="Ex: Best for glowing skin!">
                </div>

                <div class="field">
                    <label>Detailed Description</label>
                    <textarea id="desc" rows="3" placeholder="Explain the product..."></textarea>
                </div>

                <div class="field">
                    <label>How To Use (Process)</label>
                    <textarea id="usage" rows="2" placeholder="Step 1, Step 2..."></textarea>
                </div>

                <div class="field">
                    <label>Benefits & Saman (Ingredients)</label>
                    <input type="text" id="ing" placeholder="Neem, Tulsi, Aloe Vera...">
                </div>

                <button type="submit" class="btn-main">PUSH LIVE TO DATABASE</button>
            </div>
        </form>
    </div>
</div>

<div id="listPage" class="content-section">
    <div class="stats-bar">
        <div class="stat-box">
            <h3 id="totalProducts">0</h3>
            <p>Total Products</p>
        </div>
        <div class="stat-box">
            <h3 id="activeProducts" style="color: var(--accent);">0</h3>
            <p>In Stock</p>
        </div>
    </div>
    
    <input type="text" id="searchBox" class="search-bar" placeholder="🔍 Search products by name or category..." onkeyup="filterProducts()">
    
    <span class="tag">Active Inventory Feed</span>
    <div id="masterFeed"></div>
</div>

<div id="editModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Quick Edit</h3>
            <button class="close-modal" onclick="closeEditModal()">×</button>
        </div>
        <form id="editForm">
            <input type="hidden" id="editId">
            <div class="input-grid">
                <div class="field">
                    <label>Title</label>
                    <input type="text" id="editTitle" required>
                </div>
                <div style="display: flex; gap: 10px;">
                    <div class="field" style="flex:1;">
                        <label>Price</label>
                        <input type="number" id="editPrice" required>
                    </div>
                    <div class="field" style="flex:1;">
                        <label>Discount</label>
                        <input type="number" id="editDisc" required>
                    </div>
                </div>
                <div class="field">
                    <label>Stock Count</label>
                    <input type="number" id="editStock" required>
                </div>
                <button type="submit" class="btn-main" style="padding: 15px; font-size: 16px;">SAVE CHANGES</button>
            </div>
        </form>
    </div>
</div>

<nav>
    <a href="#" class="nav-link active" onclick="showTab('addPage', this)"><i>🚀</i><span>Deploy</span></a>
    <a href="#" class="nav-link" onclick="showTab('listPage', this)"><i>📊</i><span>Database</span></a>
</nav>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // --- CLOUDINARY API CONFIGURATIONS ---
    const CLOUD_NAME = "despxo7zb";
    const UPLOAD_PRESET = "nemi_preset"; // Bhai, Cloudinary me jo unsigned preset banaya hai uska naam yaha dalna (agar alag ho toh)
    
    // --- FIREBASE CONFIGURATION ---
    const firebaseConfig = { databaseURL: "https://nemi-mart-2-default-rtdb.firebaseio.com" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let globalProducts = {}; // Store data locally for search/edit

    // --- UTILITIES ---
    window.showToast = (msg, type = "success") => {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.innerHTML = type === 'success' ? `✅ ${msg}` : `⚠️ ${msg}`;
        container.appendChild(toast);
        setTimeout(() => { toast.style.animation = 'fadeOut 0.3s forwards'; setTimeout(() => toast.remove(), 300); }, 3000);
    };

    window.showTab = (id, el) => {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active-section'));
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active-section');
        el.classList.add('active');
        window.scrollTo({top: 0, behavior: 'smooth'});
    };

    window.addNewPhotoField = () => {
        const div = document.createElement('div');
        div.className = 'photo-row';
        div.innerHTML = `<input type="file" class="photo-input" accept="image/*"> <button type="button" class="btn-icon del" onclick="this.parentElement.remove()">❌</button>`;
        document.getElementById('photoList').appendChild(div);
    };

    // --- MEGA UPLOAD ENGINE (CLOUDINARY POWERED) ---
    document.getElementById('proForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const loader = document.getElementById('mainLoader');
        const progressText = document.getElementById('loadProgress');
        const fileInputs = document.querySelectorAll('.photo-input');
        
        loader.style.display = 'flex';
        let uploadedUrls = [];

        try {
            // STEP 1: Permanent Image Upload via Cloudinary
            for(let i=0; i < fileInputs.length; i++) {
                let file = fileInputs[i].files[0];
                if(file) {
                    progressText.innerText = `Uploading Image to Cloudinary: ${i+1}/${fileInputs.length}`;
                    
                    let formData = new FormData();
                    formData.append("file", file);
                    formData.append("upload_preset", UPLOAD_PRESET);
                    
                    // Cloudinary Upload API Call
                    const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
                        method: "POST",
                        body: formData
                    });
                    
                    const data = await res.json();
                    
                    if(data.secure_url) {
                        uploadedUrls.push(data.secure_url); // This URL is fast and permanent
                    } else {
                        throw new Error(data.error ? data.error.message : "Image upload failed");
                    }
                }
            }

            progressText.innerText = `Saving to Firebase Database...`;

            // STEP 2: Stock Logic
            const sCount = parseInt(document.getElementById('stockCount').value);
            let sStatus = sCount <= 0 ? "OUTOFSTOCK" : (sCount < 5 ? "LIMITED" : "INSTOCK");

            // STEP 3: Pricing Logic
            const p = parseFloat(document.getElementById('price').value);
            const d = parseFloat(document.getElementById('disc').value);
            const final = p - (p * (d/100));

            // STEP 4: Product Data Object
            const prodData = {
                title: document.getElementById('title').value,
                category: document.getElementById('category').value,
                price: p, discount: d, finalPrice: Math.round(final),
                stock: sCount, status: sStatus,
                images: uploadedUrls,
                hero: document.getElementById('hero').value,
                description: document.getElementById('desc').value,
                usage: document.getElementById('usage').value,
                ingredients: document.getElementById('ing').value,
                time: Date.now()
            };

            const newProdRef = push(ref(db, 'products'));
            await set(newProdRef, prodData);

            showToast("Product successfully deployed to Firebase!");
            document.getElementById('proForm').reset();
            document.getElementById('photoList').innerHTML = `<div class="photo-row"><input type="file" class="photo-input" accept="image/*" required></div>`;
            showTab('listPage', document.querySelectorAll('.nav-link')[1]);

        } catch (err) {
            console.error("Upload Error:", err);
            showToast("Error: " + err.message, "error");
        } finally {
            loader.style.display = 'none';
        }
    });

    // --- HISTORY MANAGER & RENDERER ---
    onValue(ref(db, 'products'), (snap) => {
        globalProducts = snap.val() || {};
        renderFeed(globalProducts);
    });

    function renderFeed(dataObj) {
        const feed = document.getElementById('masterFeed');
        feed.innerHTML = "";
        
        const keys = Object.keys(dataObj).reverse();
        
        // Update Stats
        document.getElementById('totalProducts').innerText = keys.length;
        document.getElementById('activeProducts').innerText = keys.filter(k => dataObj[k].stock > 0).length;

        if(keys.length === 0) { 
            feed.innerHTML = `<div style="text-align:center; padding:40px 20px; color:var(--text-muted);">
                <i style="font-size:40px;">📦</i><br><br>No products found in database.
            </div>`; 
            return; 
        }

        keys.forEach(id => {
            const p = dataObj[id];
            let actualStatus = p.status;
            if(p.stock <= 0) actualStatus = "OUTOFSTOCK";
            
            const badgeClass = actualStatus === 'INSTOCK' ? 'in-stock' : (actualStatus === 'LIMITED' ? 'limited-stock' : 'out-stock');
            const badgeText = actualStatus === 'LIMITED' ? `⚠️ ${p.stock} Left` : actualStatus;

            feed.innerHTML += `
                <div class="hist-card" id="card-${id}">
                    <img src="${p.images && p.images[0] ? p.images[0] : 'https://via.placeholder.com/90'}">
                    <div class="hist-details">
                        <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                            <small style="color:var(--primary); font-weight:800;">${p.category || 'NO CAT'}</small>
                            <button class="btn-icon edit" onclick="openEdit('${id}')" style="padding:4px 8px;">✏️ Edit</button>
                        </div>
                        <h4>${p.title}</h4>
                        <b style="font-size:16px;">₹${p.finalPrice}</b> <small style="text-decoration:line-through; color:#94a3b8; margin-left:5px;">₹${p.price}</small>
                        <br>
                        <span class="status-badge ${badgeClass}">${badgeText}</span>
                        <div class="action-btns">
                            <button class="btn-icon" onclick="quickStock('${id}', 10)">+10 Stock</button>
                            <button class="btn-icon" onclick="quickStock('${id}', 0)">Mark 0</button>
                            <button class="btn-icon del" onclick="delItem('${id}')">🗑️</button>
                        </div>
                    </div>
                </div>
            `;
        });
    }

    // --- SEARCH/FILTER ---
    window.filterProducts = () => {
        const query = document.getElementById('searchBox').value.toLowerCase();
        const filtered = {};
        Object.keys(globalProducts).forEach(id => {
            const p = globalProducts[id];
            if(p.title.toLowerCase().includes(query) || p.category.toLowerCase().includes(query)) {
                filtered[id] = p;
            }
        });
        renderFeed(filtered);
    };

    // --- QUICK ACTIONS ---
    window.quickStock = (id, newStock) => {
        let status = newStock <= 0 ? "OUTOFSTOCK" : (newStock < 5 ? "LIMITED" : "INSTOCK");
        update(ref(db, `products/${id}`), { stock: newStock, status: status })
            .then(() => showToast(`Stock updated to ${newStock}`))
            .catch(e => showToast("Update failed", "error"));
    };

    window.delItem = (id) => {
        if(confirm("⚠️ Are you sure you want to permanently delete this product?")) {
            remove(ref(db, `products/${id}`))
                .then(() => showToast("Product deleted successfully"))
                .catch(e => showToast("Delete failed", "error"));
        }
    };

    // --- EDIT MODAL SYSTEM ---
    window.openEdit = (id) => {
        const p = globalProducts[id];
        document.getElementById('editId').value = id;
        document.getElementById('editTitle').value = p.title;
        document.getElementById('editPrice').value = p.price;
        document.getElementById('editDisc').value = p.discount;
        document.getElementById('editStock').value = p.stock;
        document.getElementById('editModal').style.display = 'flex';
    };

    window.closeEditModal = () => {
        document.getElementById('editModal').style.display = 'none';
    };

    document.getElementById('editForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const id = document.getElementById('editId').value;
        const price = parseFloat(document.getElementById('editPrice').value);
        const disc = parseFloat(document.getElementById('editDisc').value);
        const finalPrice = Math.round(price - (price * (disc/100)));
        const stock = parseInt(document.getElementById('editStock').value);
        let status = stock <= 0 ? "OUTOFSTOCK" : (stock < 5 ? "LIMITED" : "INSTOCK");

        update(ref(db, `products/${id}`), {
            title: document.getElementById('editTitle').value,
            price: price, discount: disc, finalPrice: finalPrice,
            stock: stock, status: status
        }).then(() => {
            closeEditModal();
            showToast("Product details updated!");
        }).catch(err => {
            showToast("Error updating product", "error");
        });
    });
</script>
</body>
</html>
