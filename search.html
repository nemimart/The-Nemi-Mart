 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nemi Mart | Search</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Outfit:wght@600;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #1A3E26; /* Deep Green */
            --accent: #D4AF37;  /* Gold */
            --bg-light: #FDFBF7;
            --white: #ffffff;
            --text-main: #0A1F13;
            --text-muted: #64748B;
            --glass: rgba(255, 255, 255, 0.9);
            --shadow-lg: 0 25px 50px -12px rgba(26, 62, 38, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            background: var(--bg-light); 
            color: var(--text-main); 
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* --- STICKY NAVIGATION --- */
        .nav-container {
            position: sticky; top: 0; z-index: 1000;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 15px 20px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
        }

        .search-wrapper {
            display: flex;
            align-items: center;
            background: #f0f2f1;
            padding: 12px 18px;
            border-radius: 20px;
            gap: 12px;
            border: 2px solid transparent;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .search-wrapper:focus-within {
            background: var(--white);
            border-color: var(--accent);
            box-shadow: 0 10px 25px rgba(26, 62, 38, 0.08);
        }

        .search-input {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 16px;
            font-weight: 600;
            outline: none;
            color: var(--text-main);
        }

        .voice-btn {
            background: var(--primary);
            border: none;
            color: var(--accent);
            width: 38px; height: 38px;
            border-radius: 12px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: 0.3s;
        }

        .voice-btn:active { transform: scale(0.9); }

        /* --- VOICE POPUP (CENTERED) --- */
        .voice-modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 31, 19, 0.4); /* Dim background */
            backdrop-filter: blur(4px);
            z-index: 9999;
            display: none; /* Hidden by default */
            align-items: center; justify-content: center;
            padding: 20px;
        }

        .voice-card {
            background: var(--white);
            width: 100%; max-width: 320px;
            border-radius: 35px;
            padding: 40px 20px;
            text-align: center;
            position: relative;
            box-shadow: var(--shadow-lg);
            border: 1px solid rgba(212, 175, 55, 0.2);
            animation: popupScale 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popupScale {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .status-pill {
            display: inline-block;
            background: #E8F5E9;
            color: var(--primary);
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }

        .listening-msg {
            font-family: 'Outfit';
            font-size: 20px;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 30px;
        }

        /* Wave Animation */
        .audio-waves {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            height: 50px;
            margin-bottom: 35px;
        }

        .bar {
            width: 5px;
            height: 15px;
            background: var(--gold-gradient);
            border-radius: 10px;
            animation: quiet 1.2s ease-in-out infinite;
        }

        @keyframes quiet {
            0%, 100% { height: 15px; }
            50% { height: 50px; }
        }

        .bar:nth-child(1) { animation-delay: 0.1s; }
        .bar:nth-child(2) { animation-delay: 0.3s; }
        .bar:nth-child(3) { animation-delay: 0.5s; }
        .bar:nth-child(4) { animation-delay: 0.2s; }
        .bar:nth-child(5) { animation-delay: 0.4s; }

        .close-modal-btn {
            background: #f1f1f1;
            border: none;
            padding: 12px 25px;
            border-radius: 15px;
            font-weight: 700;
            color: var(--text-muted);
            cursor: pointer;
            transition: 0.3s;
        }
        .close-modal-btn:hover { background: #fee2e2; color: #ef4444; }

        /* --- PRODUCT GRID --- */
        .main-content { padding: 25px 20px; }
        .section-title { font-family: 'Outfit'; font-size: 22px; font-weight: 900; color: var(--primary); margin-bottom: 20px; }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .product-card {
            background: var(--white);
            border-radius: 28px;
            padding: 10px;
            text-decoration: none; color: inherit;
            box-shadow: 0 10px 20px rgba(0,0,0,0.03);
            border: 1px solid rgba(0,0,0,0.02);
            transition: 0.3s ease;
        }

        .product-card:active { transform: translateY(-5px); }

        .img-container {
            width: 100%; aspect-ratio: 1/1;
            border-radius: 20px; overflow: hidden;
            background: #f8f8f8;
        }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }

        .details { padding: 12px 8px; }
        .details h4 { font-size: 14px; font-weight: 700; color: var(--primary); line-height: 1.2; }
        .price-row { margin-top: 8px; display: flex; justify-content: space-between; align-items: center; }
        .price { font-weight: 800; font-size: 16px; color: var(--text-main); }
        .add-icon { color: var(--accent); font-size: 14px; }

        /* Suggestions */
        #suggestionBox {
            background: white; border-radius: 15px; margin: 5px 20px;
            box-shadow: var(--shadow-lg); display: none; flex-direction: column;
            overflow: hidden; border: 1px solid #eee;
        }
        .s-row { padding: 15px 20px; border-bottom: 1px solid #f9f9f9; font-weight: 600; font-size: 14px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="voice-modal-overlay" id="voiceModal">
        <div class="voice-card">
            <div class="status-pill" id="voiceStatus">Arham's AI</div>
            <div class="listening-msg" id="displayMsg">Listening for you...</div>
            
            <div class="audio-waves">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
            </div>

            <button class="close-modal-btn" onclick="stopVoiceSearch()">Cancel</button>
        </div>
    </div>

    <div class="nav-container">
        <div class="search-wrapper">
            <i class="fa-solid fa-magnifying-glass" style="color: var(--text-muted);"></i>
            <input type="text" id="mainSearch" class="search-input" placeholder="Find Saffron, Honey..." oninput="magicSearch()">
            <button class="voice-btn" onclick="startVoiceSearch()">
                <i class="fa-solid fa-microphone"></i>
            </button>
        </div>
    </div>

    <div id="suggestionBox"></div>

    <main class="main-content">
        <h2 class="section-title">Discover Premium</h2>
        <div class="results-grid" id="mainGrid"></div>
    </main>

    <script>
        // Database
        const items = [
            { id: 1, name: "Premium Kashmiri Kesar", price: "₹499", img: "https://images.unsplash.com/photo-1599307734170-4d372579120a?q=80&w=500" },
            { id: 2, name: "Raw Forest Honey", price: "₹320", img: "https://images.unsplash.com/photo-1587049352846-4a222e784d38?q=80&w=500" },
            { id: 3, name: "Roasted Walnuts", price: "₹750", img: "https://images.unsplash.com/photo-1585241936939-be4099591252?q=80&w=500" },
            { id: 4, name: "Virgin Olive Oil", price: "₹990", img: "https://images.unsplash.com/photo-1474979266404-7eaacbcd87c5?q=80&w=500" },
            { id: 5, name: "Dry Fig (Anjeer)", price: "₹650", img: "https://images.unsplash.com/photo-1621464010800-410a8c279a02?q=80&w=500" },
            { id: 6, name: "Green Tea Leaves", price: "₹250", img: "https://images.unsplash.com/photo-1564890369478-c89ca6d9cde9?q=80&w=500" }
        ];

        // --- Voice Logic ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.lang = 'en-IN';

            recognition.onresult = (event) => {
                const text = event.results[0][0].transcript;
                document.getElementById('mainSearch').value = text;
                document.getElementById('displayMsg').innerText = `Searching: "${text}"`;
                
                setTimeout(() => {
                    stopVoiceSearch();
                    magicSearch();
                }, 800);
            };

            recognition.onerror = () => {
                document.getElementById('displayMsg').innerText = "Try speaking again...";
                setTimeout(stopVoiceSearch, 1500);
            };
        }

        function startVoiceSearch() {
            if(!recognition) return alert("Browser not supported");
            document.getElementById('voiceModal').style.display = 'flex';
            document.getElementById('displayMsg').innerText = "Listening for you...";
            recognition.start();
        }

        function stopVoiceSearch() {
            document.getElementById('voiceModal').style.display = 'none';
            if(recognition) recognition.stop();
        }

        // --- Search Function ---
        function magicSearch() {
            const query = document.getElementById('mainSearch').value.toLowerCase();
            const grid = document.getElementById('mainGrid');
            const suggestions = document.getElementById('suggestionBox');

            if(query.length > 0) {
                const filtered = items.filter(i => i.name.toLowerCase().includes(query));
                suggestions.innerHTML = "";
                grid.innerHTML = "";

                if(filtered.length > 0) {
                    suggestions.style.display = "flex";
                    filtered.forEach(i => {
                        suggestions.innerHTML += `<div class="s-row" onclick="selectSearch('${i.name}')">${i.name}</div>`;
                        renderCard(i);
                    });
                }
            } else {
                suggestions.style.display = "none";
                renderInitial();
            }
        }

        function selectSearch(name) {
            document.getElementById('mainSearch').value = name;
            magicSearch();
        }

        function renderCard(i) {
            document.getElementById('mainGrid').innerHTML += `
                <a href="#" class="product-card">
                    <div class="img-container"><img src="${i.img}"></div>
                    <div class="details">
                        <h4>${i.name}</h4>
                        <div class="price-row">
                            <span class="price">${i.price}</span>
                            <i class="fa-solid fa-circle-plus add-icon"></i>
                        </div>
                    </div>
                </a>`;
        }

        function renderInitial() {
            document.getElementById('mainGrid').innerHTML = "";
            items.forEach(i => renderCard(i));
        }

        renderInitial();
    </script>
</body>
</html>
