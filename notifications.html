<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nemi Mart | Premium</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Outfit:wght@700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root {
            --gold: #C5A059;
            --premium-green: #0F5132;
            --cream-bg: #FCFBF7;
            --pure-white: #FFFFFF;
            --glass: rgba(255, 255, 255, 0.7);
            --border: rgba(197, 160, 89, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--cream-bg);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #1a1a1a;
            overflow-x: hidden;
            background-image: radial-gradient(circle at top right, #fdf5e6, transparent);
        }

        /* --- CLEAN HEADER --- */
        .header {
            padding: 30px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 32px;
            font-weight: 900;
            letter-spacing: -1px;
            color: var(--premium-green);
        }

        .clear-all {
            font-size: 12px;
            font-weight: 800;
            color: #ff4d4d;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
        }

        /* --- FEED CONTAINER --- */
        .feed {
            max-width: 500px;
            margin: 0 auto;
            padding: 0 20px 100px;
        }

        .card-container {
            margin-bottom: 25px;
            perspective: 1000px;
        }

        .nemi-card {
            background: var(--pure-white);
            border-radius: 35px;
            padding: 25px;
            display: flex;
            align-items: center;
            gap: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 15px 35px rgba(0,0,0,0.03);
            animation: slideIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) backwards;
            position: relative;
            overflow: hidden;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(30px) rotateX(-10deg); }
            to { opacity: 1; transform: translateY(0) rotateX(0); }
        }

        /* --- ADVANCED ICON MOTION --- */
        .icon-scene {
            position: relative;
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .main-icon {
            width: 55px;
            height: 55px;
            background: var(--cream-bg);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: var(--gold);
            z-index: 2;
            border: 1px solid var(--border);
            box-shadow: 0 10px 20px rgba(197, 160, 89, 0.1);
        }

        /* Revolving Ring */
        .orbit-line {
            position: absolute;
            width: 75px;
            height: 75px;
            border: 1px dashed var(--gold);
            border-radius: 50%;
            animation: rotateOrbit 10s linear infinite;
            opacity: 0.4;
        }

        @keyframes rotateOrbit {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Floating Products/Particles */
        .particle {
            position: absolute;
            font-size: 10px;
            color: var(--premium-green);
            opacity: 0.6;
            animation: floatParticle 4s ease-in-out infinite;
        }

        .p1 { top: 5px; right: 5px; animation-delay: 0s; }
        .p2 { bottom: 10px; left: 0px; animation-delay: 1s; }
        .p3 { top: 40%; left: -5px; animation-delay: 2s; }

        @keyframes floatParticle {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-10px) scale(1.2); }
        }

        /* --- CONTENT --- */
        .card-content { flex: 1; }
        .card-content h3 {
            font-size: 18px;
            font-weight: 800;
            margin-bottom: 5px;
            color: #111;
        }
        .card-content p {
            font-size: 14px;
            color: #666;
            line-height: 1.5;
            font-weight: 500;
        }

        .card-meta {
            margin-top: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .time {
            font-size: 10px;
            font-weight: 800;
            color: var(--gold);
            letter-spacing: 1px;
        }

        .del-btn {
            background: transparent;
            border: none;
            color: #ccc;
            cursor: pointer;
            padding: 5px;
            transition: 0.3s;
        }
        .del-btn:hover { color: #ff4d4d; }

        /* --- LOADER --- */
        #loader {
            position: fixed; inset: 0; background: var(--cream-bg);
            display: flex; align-items: center; justify-content: center; z-index: 9999;
        }
        .spinner {
            width: 40px; height: 40px; border: 3px solid #eee;
            border-top: 3px solid var(--gold); border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- TOAST --- */
        #toast {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            background: #111; color: #fff; padding: 12px 30px;
            border-radius: 50px; font-size: 13px; font-weight: 600;
            display: none; z-index: 10000; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div id="loader"><div class="spinner"></div></div>

    <div class="header">
        <h1>Notifications</h1>
        <div class="clear-all" onclick="clearAll()">Clear</div>
    </div>

    <main class="feed" id="feed"></main>

    <div id="toast">Action Confirmed</div>

    <script>
        const firebaseConfig = {
            databaseURL: "https://nemi-mart-2-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function initApp() {
            const feed = document.getElementById('feed');
            const loader = document.getElementById('loader');

            db.ref('notifications').on('value', (snap) => {
                loader.style.display = 'none';
                feed.innerHTML = '';
                const data = snap.val();

                if (!data) {
                    feed.innerHTML = `<div style="text-align:center; padding-top:100px; opacity:0.3;">
                        <i class="fa-solid fa-cloud" style="font-size:50px;"></i>
                        <p style="margin-top:10px; font-weight:700;">All Clear</p>
                    </div>`;
                    return;
                }

                Object.keys(data).reverse().forEach((key, idx) => {
                    const item = data[key];
                    let icon = 'fa-star';
                    if(item.type === 'sale') icon = 'fa-tag';
                    if(item.type === 'new') icon = 'fa-bag-shopping';
                    if(item.type === 'order') icon = 'fa-box';

                    const card = document.createElement('div');
                    card.className = 'card-container';
                    card.innerHTML = `
                        <div class="nemi-card" style="animation-delay: ${idx * 0.1}s">
                            <div class="icon-scene">
                                <div class="orbit-line"></div>
                                <div class="particle p1"><i class="fa-solid fa-circle"></i></div>
                                <div class="particle p2"><i class="fa-solid fa-square"></i></div>
                                <div class="particle p3"><i class="fa-solid fa-star"></i></div>
                                <div class="main-icon">
                                    <i class="fa-solid ${icon}"></i>
                                </div>
                            </div>
                            <div class="card-body" style="flex:1">
                                <div class="card-content">
                                    <h3>${item.title || 'Nemi Mart'}</h3>
                                    <p>${item.message || 'Check out our latest update.'}</p>
                                </div>
                                <div class="card-meta">
                                    <span class="time">${getTime(item.timestamp)}</span>
                                    <button class="del-btn" onclick="deleteItem('${key}')">
                                        <i class="fa-solid fa-trash-can"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                    feed.appendChild(card);
                });
            });
        }

        function getTime(ts) {
            if(!ts) return "Just now";
            const diff = Math.floor((Date.now() - ts)/1000);
            if(diff < 60) return "Just now";
            if(diff < 3600) return Math.floor(diff/60) + "m ago";
            return new Date(ts).toLocaleDateString();
        }

        function deleteItem(id) {
            db.ref('notifications/' + id).remove().then(() => toast("Removed"));
        }

        function clearAll() {
            if(confirm("Wipe all?")) db.ref('notifications').remove();
        }

        function toast(m) {
            const t = document.getElementById('toast');
            t.innerText = m; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 2000);
        }

        window.onload = initApp;
    </script>
</body>
</html>
