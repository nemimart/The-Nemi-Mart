<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nemi Mart | Elite Updates</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        /* --- GLOBAL DESIGN SYSTEM --- */
        :root {
            --p-gold: #D4AF37;
            --p-gold-deep: #B8860B;
            --p-gold-light: rgba(212, 175, 55, 0.12);
            --p-black: #050505;
            --p-glass: rgba(255, 255, 255, 0.75);
            --p-card-bg: #FFFFFF;
            --p-soft-gray: #F8FAFC;
            --p-border: rgba(212, 175, 55, 0.25);
            --p-text-main: #1A1A1A;
            --p-text-sub: #64748B;
            --p-success: #10B981;
            --p-error: #FF4757;
            --p-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
            --p-radius-lg: 32px;
            --p-radius-md: 20px;
        }

        /* Basic Reset */
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: #FAF9F6;
            color: var(--p-text-main);
            overflow-x: hidden;
            min-height: 100vh;
            background-image: 
                radial-gradient(at 0% 0%, rgba(212, 175, 55, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(212, 175, 55, 0.03) 0px, transparent 50%);
        }

        /* --- LUXURY SCROLLBAR --- */
        ::-webkit-scrollbar { width: 0px; }

        /* --- DYNAMIC ISLAND TOAST --- */
        #toast {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: var(--p-black); color: white;
            padding: 12px 24px; border-radius: 50px;
            font-size: 14px; font-weight: 600; z-index: 9999;
            display: flex; align-items: center; gap: 10px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #toast.show { top: 25px; }

        /* --- NAVIGATION --- */
        .nav-container {
            position: sticky; top: 0; z-index: 1000;
            background: var(--p-glass);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-bottom: 1px solid var(--p-border);
            padding: 18px 25px;
            display: flex; align-items: center; justify-content: space-between;
        }

        .nav-left { display: flex; align-items: center; gap: 18px; }
        
        .btn-round {
            width: 48px; height: 48px; border-radius: 50%;
            background: white; border: 1.5px solid var(--p-soft-gray);
            display: flex; align-items: center; justify-content: center;
            color: var(--p-text-main); font-size: 18px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.04);
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-round:active { transform: scale(0.85); background: #F1F5F9; }

        .brand-text h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 24px; font-weight: 900; letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--p-black) 0%, var(--p-gold-deep) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* --- MAIN FEED CONTAINER --- */
        .wrapper { max-width: 600px; margin: 0 auto; padding: 30px 20px 100px; }

        .header-section {
            display: flex; justify-content: space-between; align-items: flex-end;
            margin-bottom: 40px; padding: 0 10px;
        }

        .title-area h2 {
            font-family: 'Outfit', sans-serif; font-size: 32px; font-weight: 800;
            color: var(--p-black); line-height: 1;
        }
        .sub-tag {
            display: inline-flex; align-items: center; gap: 6px;
            font-size: 11px; font-weight: 800; color: var(--p-gold);
            text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px;
        }
        .pulse-icon { width: 8px; height: 8px; background: var(--p-gold); border-radius: 50%; animation: blink 1.2s infinite; }

        @keyframes blink { 0% { opacity: 0.2; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.1); } 100% { opacity: 0.2; transform: scale(0.8); } }

        .action-link {
            font-size: 14px; font-weight: 700; color: var(--p-error);
            cursor: pointer; opacity: 0.8; transition: 0.2s;
        }
        .action-link:hover { opacity: 1; text-decoration: underline; }

        /* --- LOADING SHIMMER --- */
        #loader { text-align: center; padding: 100px 0; }
        .shimmer-circle {
            width: 60px; height: 60px; border-radius: 50%;
            border: 4px solid var(--p-gold-light); border-top: 4px solid var(--p-gold);
            margin: 0 auto 20px; animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* --- NOTIFICATION CARDS --- */
        .card-item {
            background: var(--p-card-bg);
            border-radius: var(--p-radius-lg);
            padding: 24px; margin-bottom: 25px;
            display: flex; gap: 20px; position: relative;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: var(--p-shadow);
            transition: transform 0.4s cubic-bezier(0.2, 1, 0.2, 1), box-shadow 0.4s;
            animation: cardEntrance 0.7s cubic-bezier(0.2, 0.8, 0.2, 1) backwards;
        }
        .card-item:hover {
            transform: translateY(-8px) scale(1.01);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.12);
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(30px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .card-icon {
            width: 64px; height: 64px; border-radius: 22px;
            background: var(--p-gold-light);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; transition: 0.3s;
        }
        .card-icon i { font-size: 26px; color: var(--p-gold-deep); }

        .card-body { flex: 1; }
        .card-body h3 {
            font-family: 'Outfit', sans-serif; font-size: 19px; font-weight: 800;
            color: var(--p-black); margin-bottom: 8px; letter-spacing: -0.3px;
        }
        .card-body p {
            font-size: 15px; color: var(--p-text-sub); line-height: 1.6;
            margin-bottom: 18px; font-weight: 500;
        }

        .card-footer {
            display: flex; align-items: center; justify-content: space-between;
            padding-top: 15px; border-top: 1px solid var(--p-soft-gray);
        }
        .meta-tag {
            display: inline-flex; align-items: center; gap: 6px;
            font-size: 12px; font-weight: 700; color: var(--p-gold);
            background: var(--p-gold-light); padding: 6px 14px; border-radius: 50px;
        }
        
        .delete-trigger {
            width: 38px; height: 38px; border-radius: 12px;
            background: #FFF0F0; color: var(--p-error);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; border: none; transition: 0.2s;
        }
        .delete-trigger:hover { background: var(--p-error); color: white; transform: rotate(15deg); }

        /* --- EMPTY STATE --- */
        .empty-wrap {
            text-align: center; padding: 100px 40px; display: none;
            animation: fadeIn 0.8s ease forwards;
        }
        .empty-wrap i { font-size: 80px; color: var(--p-gold-light); margin-bottom: 25px; }
        .empty-wrap h4 { font-family: 'Outfit'; font-size: 24px; font-weight: 800; margin-bottom: 10px; }
        .empty-wrap p { color: var(--p-text-sub); font-size: 16px; max-width: 250px; margin: 0 auto; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- SCROLL PROGRESS BAR --- */
        .progress-bar {
            position: fixed; top: 0; left: 0; width: 0%; height: 4px;
            background: var(--p-gold); z-index: 9999; border-radius: 0 2px 2px 0;
        }

    </style>
</head>
<body>

    <div class="progress-bar" id="scrollProgress"></div>
    <div id="toast"><i class="fa-solid fa-circle-check"></i> <span id="toastMsg">Update Removed</span></div>

    <nav class="nav-container">
        <div class="nav-left">
            <div class="btn-round" onclick="window.history.back()">
                <i class="fa-solid fa-chevron-left"></i>
            </div>
            <div class="brand-text">
                <h1>Nemi Mart</h1>
            </div>
        </div>
        <div class="btn-round" style="border: none; background: transparent;">
            <i class="fa-solid fa-ellipsis-vertical"></i>
        </div>
    </nav>

    <main class="wrapper">
        <header class="header-section">
            <div class="title-area">
                <span class="sub-tag"><span class="pulse-icon"></span> Live Portal</span>
                <h2>Recent Feed</h2>
            </div>
            <div class="action-link" onclick="clearAll()">Clear All</div>
        </header>

        <div id="loader">
            <div class="shimmer-circle"></div>
            <p style="font-weight: 800; font-size: 12px; color: var(--p-gold); letter-spacing: 2px;">AUTHENTICATING...</p>
        </div>
        
        <div id="notif-feed"></div>

        <div id="empty-view" class="empty-wrap">
            <i class="fa-solid fa-crown"></i>
            <h4>All Caught Up!</h4>
            <p>You've seen all the premium updates from Nemi Mart.</p>
        </div>
    </main>

    <script>
        // 1. Firebase Initialization (Logic kept same as requested)
        const firebaseConfig = {
            databaseURL: "https://nemi-mart-2-default-rtdb.firebaseio.com/"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // 2. Core Loader Logic
        function loadNotifications() {
            const feedDiv = document.getElementById('notif-feed');
            const loader = document.getElementById('loader');
            const emptyView = document.getElementById('empty-view');

            database.ref('notifications').on('value', (snapshot) => {
                loader.style.display = 'none';
                feedDiv.innerHTML = '';
                
                const data = snapshot.val();

                if (!data) {
                    emptyView.style.display = 'block';
                    return;
                }

                emptyView.style.display = 'none';
                
                // Show latest first
                const entries = Object.entries(data).reverse();

                entries.forEach(([id, item], index) => {
                    const card = document.createElement('div');
                    card.className = 'card-item';
                    card.style.animationDelay = `${index * 0.08}s`;
                    
                    // Icon logic based on type
                    let iconClass = 'fa-gem';
                    if(item.type === 'new') iconClass = 'fa-cart-plus';
                    if(item.type === 'sale') iconClass = 'fa-fire-flame-curved';
                    if(item.type === 'order') iconClass = 'fa-box-open';

                    card.innerHTML = `
                        <div class="card-icon">
                            <i class="fa-solid ${iconClass}"></i>
                        </div>
                        <div class="card-body">
                            <h3>${item.title || 'Nemi Mart Elite'}</h3>
                            <p>${item.message || 'Unlock exclusive access to our premium collections.'}</p>
                            <div class="card-footer">
                                <div class="meta-tag">
                                    <i class="fa-regular fa-clock"></i> 
                                    ${getTimeAgo(item.timestamp)}
                                </div>
                                <button class="delete-trigger" onclick="deleteItem('${id}')">
                                    <i class="fa-solid fa-trash-can"></i>
                                </button>
                            </div>
                        </div>
                    `;
                    feedDiv.appendChild(card);
                });
            });
        }

        // 3. High-End Helper Functions
        function getTimeAgo(ts) {
            if (!ts) return "Recently";
            const seconds = Math.floor((Date.now() - ts) / 1000);
            if (seconds < 60) return "Just now";
            const minutes = Math.floor(seconds / 60);
            if (minutes < 60) return `${minutes}m ago`;
            const hours = Math.floor(minutes / 60);
            if (hours < 24) return `${hours}h ago`;
            return new Date(ts).toLocaleDateString();
        }

        function deleteItem(id) {
            database.ref('notifications/' + id).remove()
                .then(() => showToast("Removed Successfully"));
        }

        function clearAll() {
            if(confirm("Confirm: Delete all feed history? This cannot be undone.")) {
                database.ref('notifications').remove()
                    .then(() => showToast("Feed Cleared ✨"));
            }
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            const tMsg = document.getElementById('toastMsg');
            tMsg.innerText = msg;
            t.classList.add('show');
            setTimeout(() => { 
                t.classList.remove('show'); 
            }, 3000);
        }

        // Scroll Progress Logic
        window.onscroll = function() {
            let winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            let scrolled = (winScroll / height) * 100;
            document.getElementById("scrollProgress").style.width = scrolled + "%";
        };

        // Run on start
        window.onload = loadNotifications;

    </script>
</body>
</html>
