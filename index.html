<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Nemi Mart | Premium Ayurveda</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --creme: #FFFDF5;
            --gold: #D4AF37;
            --dark-green: #1B3022;
            --leaf-green: #2D5A27;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--creme); overflow-x: hidden; padding-bottom: 80px; }

        /* --- 1. SPLASH SCREEN & FLYING LOGO LOGIC --- */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: var(--creme); z-index: 9999; display: flex;
            justify-content: center; align-items: center; transition: 0.8s ease-in-out;
        }

        .logo-container {
            position: absolute;
            transition: all 1s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            display: flex; flex-direction: column; align-items: center;
        }

        /* Logo Initial State (Center) */
        .logo-img {
            width: 120px; /* Start size */
            height: auto;
            transition: all 1s ease-in-out;
        }

        .logo-text {
            font-family: 'Playfair Display';
            font-size: 28px; font-weight: bold; color: var(--dark-green);
            margin-top: 10px; transition: 0.8s;
        }

        /* Moving State (Top Left) */
        .move-up {
            top: 15px !important;
            left: 15px !important;
            transform: translate(0, 0) !important;
            align-items: flex-start !important;
        }
        .move-up .logo-img { width: 45px; } /* Small size for header */
        .move-up .logo-text { font-size: 18px; margin-top: 0; margin-left: 10px; color: white; }

        /* --- 2. HOME CONTENT (Initially Hidden) --- */
        #main-content { opacity: 0; transition: 1s ease-in-out; pointer-events: none; }
        .content-visible { opacity: 1 !important; pointer-events: auto !important; }

        /* --- 3. HEADER & NAV --- */
        header { 
            background: var(--dark-green); padding: 55px 15px 15px 15px; /* Padding for logo space */
            position: sticky; top: 0; z-index: 1000; 
        }
        .header-content { display: flex; flex-direction: column; gap: 12px; }
        
        .user-nav { position: absolute; top: 20px; right: 15px; display: flex; gap: 15px; color: white; font-size: 20px; }
        .user-nav a { color: white; text-decoration: none; }

        .search-bar { display: flex; background: white; border-radius: 8px; overflow: hidden; height: 42px; }
        .search-bar input { border: none; flex: 1; padding: 0 15px; outline: none; font-size: 14px; }
        .search-bar button { background: var(--gold); border: none; padding: 0 18px; color: white; }

        .address-box { display: flex; align-items: center; gap: 8px; color: #ccc; font-size: 12px; margin-top: 5px; }
        .address-box i { color: var(--gold); }

        /* --- 4. CATEGORY STRIP --- */
        .cat-strip { 
            display: flex; background: white; padding: 15px; 
            overflow-x: auto; gap: 20px; border-bottom: 1px solid #eee; 
            scrollbar-width: none;
        }
        .cat-strip::-webkit-scrollbar { display: none; }
        .cat-item { text-align: center; min-width: 70px; text-decoration: none; }
        .cat-item img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--gold); margin-bottom: 5px; }
        .cat-item span { display: block; font-size: 10px; font-weight: 600; color: var(--dark-green); }

        /* --- 5. BANNER SECTION --- */
        .banner-area { padding: 15px; }
        .banner-card { 
            width: 100%; height: 200px; background: #ddd; border-radius: 15px; 
            overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .banner-card img { width: 100%; height: 100%; object-fit: cover; }

        /* --- 6. BOTTOM NAV --- */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: white; display: flex; justify-content: space-around; align-items: center; padding: 12px 0; box-shadow: 0 -5px 15px rgba(0,0,0,0.05); z-index: 2000; border-radius: 20px 20px 0 0; }
        .nav-link { text-align: center; text-decoration: none; color: #999; font-size: 10px; font-weight: 600; }
        .nav-link i { font-size: 22px; display: block; margin-bottom: 4px; }
        .nav-link.active { color: var(--leaf-green); }

        .cart-float { position: relative; margin-top: -45px; }
        .cart-btn { width: 65px; height: 65px; background: var(--leaf-green); border: 5px solid var(--creme); border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; font-size: 24px; box-shadow: 0 8px 20px rgba(0,0,0,0.15); }

    </style>
</head>
<body>

    <div id="splash-screen">
        <div id="logo-main" class="logo-container">
            <img src="https://via.placeholder.com/150?text=LOGO" class="logo-img" alt="The Nemi Mart Logo">
            <div class="logo-text">The <span>Nemi</span> Mart</div>
        </div>
    </div>

    <div id="main-content">
        <header>
            <div class="header-content">
                <div class="user-nav">
                    <a href="wishlist.html"><i class="far fa-heart"></i></a>
                    <a href="profile.html"><i class="far fa-user-circle"></i></a>
                </div>
                <div class="address-box">
                    <i class="fas fa-map-marker-alt"></i>
                    <span>Deliver to <strong>Akash - Patiala 147001</strong></span>
                </div>
                <div class="search-bar">
                    <input type="text" placeholder="Search for Ayurvedic products...">
                    <button><i class="fas fa-search"></i></button>
                </div>
            </div>
        </header>

        <div class="cat-strip">
            <a href="gum-care.html" class="cat-item"><img src="https://cdn-icons-png.flaticon.com/128/3069/3069172.png"><span>Gum Care</span></a>
            <a href="immunity.html" class="cat-item"><img src="https://cdn-icons-png.flaticon.com/128/2553/2553642.png"><span>Immunity</span></a>
            <a href="vitality.html" class="cat-item"><img src="https://cdn-icons-png.flaticon.com/128/2913/2913520.png"><span>Vitality</span></a>
            <a href="wellness.html" class="cat-item"><img src="https://cdn-icons-png.flaticon.com/128/706/706195.png"><span>Wellness</span></a>
            <a href="hair-care.html" class="cat-item"><img src="https://cdn-icons-png.flaticon.com/128/825/825590.png"><span>Hair Care</span></a>
        </div>

        <section class="banner-area">
            <div class="banner-card">
                <img src="https://via.placeholder.com/750x425?text=Put+Your+GitHub+Banner+Here" alt="Sale Banner">
            </div>
        </section>

        <div style="padding: 15px; text-align: center; color: #888;">
            <p>Products will appear here from Admin Panel...</p>
        </div>

        <nav class="bottom-nav">
            <a href="index.html" class="nav-link active"><i class="fas fa-home"></i>Home</a>
            <a href="products.html" class="nav-link"><i class="fas fa-th-large"></i>Products</a>
            <div class="cart-float">
                <a href="cart.html">
                    <div class="cart-btn"><i class="fas fa-shopping-basket"></i></div>
                </a>
            </div>
            <a href="sale.html" class="nav-link"><i class="fas fa-bolt"></i>Sale</a>
            <a href="orders.html" class="nav-link"><i class="fas fa-truck-fast"></i>Orders</a>
        </nav>
    </div>

    <script>
        // --- The Magic Transition ---
        window.addEventListener('load', () => {
            const logo = document.getElementById('logo-main');
            const splash = document.getElementById('splash-screen');
            const mainContent = document.getElementById('main-content');

            // 1. Pehle 2 second tak logo center mein dikhao
            setTimeout(() => {
                // 2. Logo ko upar fly karwao
                logo.classList.add('move-up');
                
                // 3. Header background aur baaki content ko dheere se dikhao
                setTimeout(() => {
                    mainContent.classList.add('content-visible');
                    splash.style.background = "transparent";
                    splash.style.pointerEvents = "none";
                }, 600); // Logo travel ke beech mein hi content dikhna shuru ho jaye
            }, 2000); // 2 second ka wait
        });
    </script>
</body>
  </html>
