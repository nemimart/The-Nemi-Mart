 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEMI MASTER v10 | PRO BUSINESS</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --secondary: #f43f5e;
            --dark: #0f172a;
            --success: #10b981;
            --warning: #f59e0b;
            --bg: #f8fafc;
        }

        * { box-sizing: border-box; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); margin: 0; padding-bottom: 100px; color: var(--dark); }

        /* HEAVY LOADER */
        #mainLoader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.95); z-index: 9999; display: none;
            flex-direction: column; justify-content: center; align-items: center; color: white;
        }

        /* HEADER & TOP NAV */
        header {
            background: var(--dark); padding: 20px; color: white;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000;
        }
        .top-admin-nav {
            background: #1e293b; padding: 10px; display: flex; gap: 10px;
            overflow-x: auto; border-bottom: 2px solid var(--primary);
        }
        .admin-btn {
            background: var(--primary); color: white; padding: 8px 15px;
            border-radius: 8px; text-decoration: none; font-size: 12px; font-weight: 700;
            white-space: nowrap;
        }

        /* CARDS & FORMS */
        .content-section { display: none; padding: 15px; animation: slideUp 0.4s ease; }
        .active-section { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: white; border-radius: 24px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .section-h { font-size: 11px; font-weight: 800; color: var(--primary); text-transform: uppercase; margin-bottom: 15px; display: block; }

        .form-grid { display: grid; gap: 15px; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 12px; font-weight: 700; color: #64748b; }
        input, textarea, select {
            background: #f1f5f9; border: 2px solid transparent; padding: 14px;
            border-radius: 12px; font-size: 15px; transition: 0.3s;
        }
        input:focus { border-color: var(--primary); background: white; outline: none; }

        /* MULTI PHOTO ZONE */
        .photo-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .photo-box {
            aspect-ratio: 1/1; background: #eef2ff; border: 2px dashed var(--primary);
            border-radius: 12px; display: flex; flex-direction: column;
            justify-content: center; align-items: center; cursor: pointer; font-size: 10px;
            text-align: center; color: var(--primary); font-weight: 700;
        }

        /* BUTTONS */
        .btn-main {
            background: linear-gradient(135deg, var(--dark), #1e293b); color: white;
            width: 100%; padding: 18px; border-radius: 15px; border: none;
            font-size: 16px; font-weight: 800; margin-top: 10px;
        }

        /* HISTORY CARDS */
        .p-item {
            background: white; border-radius: 20px; padding: 15px; margin-bottom: 15px;
            display: flex; gap: 15px; align-items: center; position: relative;
        }
        .p-img-thumb { width: 80px; height: 80px; border-radius: 12px; object-fit: cover; }
        .badge {
            position: absolute; top: 10px; right: 10px; padding: 4px 10px;
            border-radius: 20px; font-size: 10px; font-weight: 800; color: white;
        }
        .bg-instock { background: var(--success); }
        .bg-low { background: var(--warning); }
        .bg-out { background: var(--secondary); }

        /* BOTTOM NAV */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; background: white;
            display: flex; justify-content: space-around; padding: 12px 0 25px;
            border-top: 1px solid #eee; z-index: 1000;
        }
        .nav-link { text-decoration: none; color: #94a3b8; font-size: 11px; font-weight: 700; text-align: center; }
        .nav-link.active { color: var(--primary); }
    </style>
</head>
<body>

<div id="mainLoader">
    <div style="font-size: 30px;">⏳</div>
    <p>SYNCING CLOUD DATA...</p>
</div>

<header>
    <h2 style="margin:0; font-size:18px;">NEMI PRO v10</h2>
    <div style="background:var(--success); padding:5px 10px; border-radius:20px; font-size:10px; font-weight:800;">LIVE ENGINE</div>
</header>

<div class="top-admin-nav">
    <a href="admin2.html" class="admin-btn">📦 View Orders</a>
    <a href="notification.html" class="admin-btn" style="background:var(--secondary);">🔔 Send Global Alert</a>
</div>

<div id="addPage" class="content-section active-section">
    <span class="section-h">Master Inventory Entry</span>
    <div class="card">
        <form id="proForm">
            <div class="form-grid">
                <div class="input-group">
                    <label>Product Name</label>
                    <input type="text" id="title" required placeholder="Ex: Premium Almonds 500g">
                </div>

                <div class="input-group">
                    <label>Product Photos (3 Mandatory)</label>
                    <div class="photo-grid">
                        <div class="photo-box" onclick="document.getElementById('f1').click()">
                            <span id="t1">Main Photo</span>
                            <input type="file" id="f1" hidden onchange="checkImg(1)">
                        </div>
                        <div class="photo-box" onclick="document.getElementById('f2').click()">
                            <span id="t2">Side View</span>
                            <input type="file" id="f2" hidden onchange="checkImg(2)">
                        </div>
                        <div class="photo-box" onclick="document.getElementById('f3').click()">
                            <span id="t3">Label/Back</span>
                            <input type="file" id="f3" hidden onchange="checkImg(3)">
                        </div>
                    </div>
                </div>

                <div style="display: flex; gap: 10px;">
                    <div class="input-group" style="flex:1;">
                        <label>Price (₹)</label>
                        <input type="number" id="price" required>
                    </div>
                    <div class="input-group" style="flex:1;">
                        <label>Discount %</label>
                        <input type="number" id="disc" value="0">
                    </div>
                </div>

                <div class="input-group">
                    <label>Stock Quantity (Total Packets)</label>
                    <input type="number" id="stock" required>
                </div>

                <div class="input-group">
                    <label>How to Use / Dosage</label>
                    <input type="text" id="usage" placeholder="Ex: Take 1 spoon with milk">
                </div>

                <div class="input-group">
                    <label>Product Benefits (Key points)</label>
                    <textarea id="benefits" rows="3" placeholder="Ex: Rich in Protein, No Sugar..."></textarea>
                </div>

                <button type="submit" class="btn-main">DEPLOY TO APP & TELEGRAM</button>
            </div>
        </form>
    </div>
</div>

<div id="historyPage" class="content-section">
    <span class="section-h">Live Inventory Management</span>
    <div id="inventoryFeed"></div>
</div>

<nav class="bottom-nav">
    <a href="#" class="nav-link active" onclick="tab('addPage', this)">➕ New Entry</a>
    <a href="#" class="nav-link" onclick="tab('historyPage', this)">📊 Edit Stock</a>
</nav>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const TG_TOKEN = "8675459597:AAH2TsikJaT1PAXfsMQ9Utfzszs8-_TE2bI";
    const CHAT_ID = "8415600127";
    const firebaseConfig = { databaseURL: "https://nemi-mart-2-default-rtdb.firebaseio.com" };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    window.tab = (id, el) => {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active-section'));
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active-section');
        el.classList.add('active');
    };

    window.checkImg = (n) => {
        const file = document.getElementById('f'+n).files[0];
        if(file) document.getElementById('t'+n).innerText = "✅ Done";
    };

    // --- MEGA UPLOAD FUNCTION ---
    document.getElementById('proForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const loader = document.getElementById('mainLoader');
        const files = [
            document.getElementById('f1').files[0],
            document.getElementById('f2').files[0],
            document.getElementById('f3').files[0]
        ];

        if(!files[0] || !files[1] || !files[2]) return alert("Bhai 3 photo mandatory hain!");

        loader.style.display = 'flex';
        let urls = [];

        try {
            // Upload 3 Photos to TG Cloud
            for(let i=0; i<3; i++){
                let fd = new FormData();
                fd.append("chat_id", CHAT_ID);
                fd.append("photo", files[i]);
                const res = await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendPhoto`, { method: "POST", body: fd });
                const data = await res.json();
                const fId = data.result.photo[data.result.photo.length-1].file_id;
                const fPathRes = await fetch(`https://api.telegram.org/bot${TG_TOKEN}/getFile?file_id=${fId}`);
                const fPathData = await fPathRes.json();
                urls.push(`https://api.telegram.org/file/bot${TG_TOKEN}/${fPathData.result.file_path}`);
            }

            const p = parseFloat(document.getElementById('price').value);
            const d = parseFloat(document.getElementById('disc').value);
            const final = p - (p * (d/100));
            const title = document.getElementById('title').value;

            // Save to Firebase
            const newKey = push(ref(db, 'products')).key;
            await set(ref(db, `products/${newKey}`), {
                title: title,
                price: p,
                discount: d,
                finalPrice: final,
                stock: parseInt(document.getElementById('stock').value),
                images: urls, // 3 Link Array
                usage: document.getElementById('usage').value,
                benefits: document.getElementById('benefits').value,
                status: 'INSTOCK',
                time: Date.now()
            });

            // 🔔 SEND NOTIFICATION TO notification.html
            await push(ref(db, 'notifications'), {
                msg: `Naya Product: ${title} ab stock mein hai! Check karo.`,
                time: Date.now(),
                type: 'new_launch'
            });

            alert("Kamaal! Product live ho gaya aur notification bhi chala gaya.");
            document.getElementById('proForm').reset();
            tab('historyPage', document.querySelectorAll('.nav-link')[1]);

        } catch (err) {
            alert("Error: " + err.message);
        } finally {
            loader.style.display = 'none';
        }
    });

    // --- STOCK & HISTORY ENGINE ---
    onValue(ref(db, 'products'), (snap) => {
        const feed = document.getElementById('inventoryFeed');
        feed.innerHTML = "";
        const data = snap.val();
        if(data) {
            Object.keys(data).reverse().forEach(key => {
                const it = data[key];
                const st = parseInt(it.stock);
                let badge = `<span class="badge bg-instock">IN STOCK</span>`;
                if(st <= 0) badge = `<span class="badge bg-out">SOLD OUT</span>`;
                else if(st <= 5) badge = `<span class="badge bg-low">${st} Left Only!</span>`;

                feed.innerHTML += `
                    <div class="p-item">
                        <img src="${it.images[0]}" class="p-img-thumb">
                        <div style="flex:1">
                            <h4 style="margin:0; font-size:14px;">${it.title}</h4>
                            <p style="margin:5px 0; font-size:12px; font-weight:700;">₹${it.finalPrice}</p>
                            <div style="display:flex; gap:5px;">
                                <input type="number" value="${st}" style="width:60px; padding:5px; font-size:12px;" onchange="updateStock('${key}', this.value)">
                                <button onclick="delItem('${key}')" style="background:none; border:none;">🗑️</button>
                            </div>
                        </div>
                        ${badge}
                    </div>
                `;
            });
        }
    });

    window.updateStock = (key, val) => {
        update(ref(db, `products/${key}`), { stock: parseInt(val) });
    };

    window.delItem = (key) => { if(confirm("Uda du?")) remove(ref(db, `products/${key}`)); };
</script>
</body>
</html>
