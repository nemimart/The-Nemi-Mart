<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nemi Mart | Premium</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Outfit:wght@700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root {
            --gold: #C5A059;
            --premium-green: #0F5132;
            --cream: #FCFBF7;
            --glass: rgba(255, 255, 255, 0.9);
            --border: rgba(197, 160, 89, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--cream);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #1A1A1A;
            min-height: 100vh;
            background-image: radial-gradient(circle at top right, #FDF7E7, transparent);
        }

        /* --- CLEAN NAV --- */
        .nav-bar {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(252, 251, 247, 0.8);
            backdrop-filter: blur(20px);
            padding: 15px 20px;
            display: flex; align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .back-link {
            width: 40px; height: 40px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: #1A1A1A; font-size: 18px; text-decoration: none;
            transition: 0.3s;
        }
        .back-link:active { background: #EEE; transform: scale(0.9); }

        .nav-title {
            flex: 1; text-align: center;
            font-family: 'Outfit', sans-serif; font-size: 18px;
            font-weight: 700; letter-spacing: 1px; margin-right: 40px;
        }

        /* --- FEED WRAPPER --- */
        .feed-container { max-width: 500px; margin: 0 auto; padding: 25px 15px; }

        .feed-top {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 30px; padding: 0 5px;
        }
        .feed-top h2 { font-family: 'Outfit'; font-size: 26px; }
        .wipe-btn { color: #FF4D4D; font-size: 12px; font-weight: 700; cursor: pointer; }

        /* --- ORBITING ICON SYSTEM (THE MAGIC) --- */
        .orbit-container {
            position: relative; width: 60px; height: 60px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
        }

        /* The Main Center Icon */
        .main-icon {
            width: 45px; height: 45px; border-radius: 15px;
            background: white; border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; color: var(--gold); z-index: 5;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        /* The Rotating Line */
        .orbit-line {
            position: absolute; width: 65px; height: 65px;
            border: 1px solid rgba(197, 160, 89, 0.3);
            border-radius: 50%; border-top-color: var(--premium-green);
            animation: spin 3s linear infinite;
        }

        /* Floating Mini Product Icons */
        .mini-product {
            position: absolute; font-size: 10px; color: var(--gold);
            animation: orbit 6s linear infinite; opacity: 0.6;
        }
        .p1 { top: -5px; animation-delay: 0s; }
        .p2 { right: -5px; animation-delay: -2s; }
        .p3 { bottom: -5px; animation-delay: -4s; }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        @keyframes orbit {
            0% { transform: rotate(0deg) translateX(35px) rotate(0deg); }
            100% { transform: rotate(360deg) translateX(35px) rotate(-360deg); }
        }

        /* --- COMPACT CARD --- */
        .card-item {
            background: white; border-radius: 22px;
            padding: 18px; margin-bottom: 15px;
            display: flex; gap: 15px; align-items: center;
            border: 1px solid rgba(0,0,0,0.03);
            box-shadow: 0 8px 25px rgba(0,0,0,0.03);
            position: relative; overflow: hidden;
            animation: slideIn 0.5s ease-out backwards;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

        .card-content { flex: 1; }
        .card-content h3 { font-size: 15px; font-weight: 800; color: #111; margin-bottom: 3px; }
        .card-content p { font-size: 13px; color: #666; line-height: 1.4; font-weight: 500; }

        .card-meta {
            margin-top: 10px; display: flex; align-items: center; justify-content: space-between;
        }
        .time-text { font-size: 10px; font-weight: 700; color: var(--gold); text-transform: uppercase; }

        .bin-btn {
            width: 32px; height: 32px; border-radius: 10px;
            background: #FFF0F0; color: #FF4D4D; border: none;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; cursor: pointer; transition: 0.2s;
        }
        .bin-btn:active { background: #FF4D4D; color: white; transform: scale(0.8); }

        /* --- APP STATES --- */
        #loader { text-align: center; padding: 100px 0; }
        .loader-ring { width: 30px; height: 30px; border: 3px solid #EEE; border-top-color: var(--gold); border-radius: 50%; animation: spin 1s infinite linear; margin: 0 auto; }

        .empty-box { text-align: center; padding: 80px 20px; display: none; }
        .empty-box i { font-size: 50px; color: #DDD; margin-bottom: 15px; }
        .empty-box h3 { font-size: 18px; color: #999; }

        /* --- TOAST --- */
        #toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #1A1A1A; color: white; padding: 10px 20px;
            border-radius: 50px; font-size: 13px; font-weight: 600;
            display: none; z-index: 5000; box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <nav class="nav-bar">
        <a href="javascript:history.back()" class="back-link">
            <i class="fa-solid fa-chevron-left"></i>
        </a>
        <div class="nav-title">Notifications</div>
    </nav>

    <main class="feed-container">
        <div class="feed-top">
            <h2>Updates</h2>
            <div class="wipe-btn" onclick="clearAll()">Clear All</div>
        </div>

        <div id="loader"><div class="loader-ring"></div></div>
        
        <div id="notif-list"></div>

        <div id="empty-state" class="empty-box">
            <i class="fa-solid fa-bell-slash"></i>
            <h3>No new updates</h3>
        </div>
    </main>

    <div id="toast">Done ✨</div>

    <script>
        // 1. Firebase Setup
        const firebaseConfig = {
            databaseURL: "https://nemi-mart-2-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 2. Load Notifications
        function fetchUpdates() {
            const list = document.getElementById('notif-list');
            const loader = document.getElementById('loader');
            const empty = document.getElementById('empty-state');

            db.ref('notifications').on('value', (snap) => {
                loader.style.display = 'none';
                list.innerHTML = '';
                const data = snap.val();

                if (!data) {
                    empty.style.display = 'block';
                    return;
                }

                empty.style.display = 'none';
                const keys = Object.keys(data).reverse();

                keys.forEach((key, i) => {
                    const item = data[key];
                    const card = document.createElement('div');
                    card.className = 'card-item';
                    card.style.animationDelay = (i * 0.05) + 's';
                    
                    // Dynamic Icon Logic
                    let mainIcon = 'fa-tag';
                    if(item.type === 'order') mainIcon = 'fa-box';
                    if(item.type === 'new') mainIcon = 'fa-star';

                    card.innerHTML = `
                        <div class="orbit-container">
                            <div class="orbit-line"></div>
                            <div class="mini-product p1"><i class="fa-solid fa-shirt"></i></div>
                            <div class="mini-product p2"><i class="fa-solid fa-mobile-screen"></i></div>
                            <div class="mini-product p3"><i class="fa-solid fa-bag-shopping"></i></div>
                            <div class="main-icon">
                                <i class="fa-solid ${mainIcon}"></i>
                            </div>
                        </div>
                        <div class="card-content">
                            <h3>${item.title || 'Nemi Mart'}</h3>
                            <p>${item.message || 'Check out our latest update.'}</p>
                            <div class="card-meta">
                                <span class="time-text">${getRelativeTime(item.timestamp)}</span>
                                <button class="bin-btn" onclick="deleteItem('${key}')">
                                    <i class="fa-solid fa-trash"></i>
                                </button>
                            </div>
                        </div>
                    `;
                    list.appendChild(card);
                });
            });
        }

        // 3. Logic Engines
        function getRelativeTime(ts) {
            if(!ts) return "Just Now";
            const s = Math.floor((Date.now() - ts) / 1000);
            if(s < 60) return "Just now";
            if(s < 3600) return Math.floor(s/60) + "m ago";
            if(s < 86400) return Math.floor(s/3600) + "h ago";
            return new Date(ts).toLocaleDateString();
        }

        function deleteItem(id) {
            db.ref('notifications/' + id).remove().then(() => showToast("Removed"));
        }

        function clearAll() {
            if(confirm("Clear all notifications?")) {
                db.ref('notifications').remove().then(() => showToast("Cleared All"));
            }
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 2000);
        }

        window.onload = fetchUpdates;
    </script>
</body>
</html>
