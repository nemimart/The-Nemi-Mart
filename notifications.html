<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nemi Mart | Premium Updates</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Outfit:wght@500;700;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        /* ==========================================
           1. LUXURY THEME SYSTEM (Cream & Gold)
           ========================================== 
        */
        :root {
            --gold-primary: #D4AF37;    /* Classic Gold */
            --gold-deep: #B8860B;       /* Darker Gold */
            --cream-bg: #FFFDF5;        /* Soft Cream */
            --cream-card: #FFFFFF;
            --slate-900: #0F172A;       /* Deep Black/Blue */
            --slate-600: #475569;       /* Muted Text */
            --success-green: #10B981;   /* Emerald */
            
            --glass-bg: rgba(255, 255, 255, 0.85);
            --shadow-lux: 0 20px 40px -15px rgba(212, 175, 55, 0.15);
            --anim-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* ==========================================
           2. GLOBAL RESET & BASE
           ========================================== 
        */
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--cream-bg);
            color: var(--slate-900);
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
            background-image: radial-gradient(circle at top right, #FDF7E2, transparent);
        }

        /* ==========================================
           3. PREMIUM NAVIGATION
           ========================================== 
        */
        .nav-header {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            position: sticky; top: 0; z-index: 1000;
            padding: 20px 24px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 2px solid rgba(212, 175, 55, 0.1);
        }

        .nav-brand { display: flex; align-items: center; gap: 16px; }

        .back-btn {
            width: 45px; height: 45px; border-radius: 15px;
            background: white; border: 1.5px solid #F1F5F9;
            display: flex; align-items: center; justify-content: center;
            color: var(--slate-900); cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            transition: all 0.3s ease;
        }
        .back-btn:active { transform: scale(0.9); }

        .header-text h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 24px; font-weight: 800;
            background: linear-gradient(135deg, var(--slate-900), var(--gold-deep));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .action-icon {
            font-size: 20px; color: var(--gold-primary);
            position: relative; cursor: pointer;
        }

        /* ==========================================
           4. MAIN CONTENT & FEED
           ========================================== 
        */
        .container {
            max-width: 650px; margin: 0 auto; padding: 25px 20px 100px;
        }

        .feed-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 25px;
        }

        .status-pill {
            background: #F1F5F9; padding: 6px 14px; border-radius: 50px;
            font-size: 11px; font-weight: 800; color: var(--slate-600);
            text-transform: uppercase; letter-spacing: 1px;
        }

        .clear-all {
            color: #EF4444; font-size: 13px; font-weight: 700;
            cursor: pointer; padding: 5px; border: none; background: none;
        }

        .notification-feed {
            display: flex; flex-direction: column; gap: 18px;
        }

        /* ==========================================
           5. LUXURY CARDS
           ========================================== 
        */
        .lux-card {
            background: var(--cream-card);
            border-radius: 28px;
            padding: 22px;
            display: flex; gap: 20px;
            position: relative;
            box-shadow: var(--shadow-lux);
            border: 1.5px solid rgba(212, 175, 55, 0.05);
            transition: all 0.4s var(--anim-bounce);
            animation: slideUp 0.6s ease backwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .lux-card:hover {
            transform: translateY(-8px);
            border-color: var(--gold-primary);
        }

        /* Decorative Gold Bar */
        .lux-card::before {
            content: ''; position: absolute; left: 0; top: 30%; bottom: 30%;
            width: 4px; background: var(--gold-primary);
            border-radius: 0 10px 10px 0;
        }

        .icon-wrap {
            width: 60px; height: 60px; border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 26px; flex-shrink: 0;
            background: #FFFBF0; border: 1px solid #FEF3C7;
            color: var(--gold-primary);
        }

        .card-content { flex: 1; }
        .card-content h3 {
            font-size: 17px; font-weight: 800; color: var(--slate-900);
            margin-bottom: 6px; font-family: 'Outfit', sans-serif;
        }
        .card-content p {
            font-size: 14.5px; color: var(--slate-600);
            line-height: 1.5; font-weight: 500;
        }

        .card-meta {
            margin-top: 15px; display: flex; align-items: center; gap: 15px;
            font-size: 12px; font-weight: 700; color: #94A3B8;
        }
        .time-tag { color: var(--gold-deep); background: #FEF9C3; padding: 2px 8px; border-radius: 6px; }

        .btn-del {
            width: 35px; height: 35px; border-radius: 12px;
            background: #FFF1F2; color: #EF4444;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; border: none; transition: 0.3s;
        }
        .btn-del:hover { background: #EF4444; color: white; transform: rotate(15deg); }

        /* ==========================================
           6. SKELETON & EMPTY STATE
           ========================================== 
        */
        .empty-state {
            text-align: center; padding: 80px 30px; display: none;
        }
        .empty-state i { font-size: 70px; color: #E2E8F0; margin-bottom: 20px; }
        
        .skeleton {
            background: white; height: 120px; border-radius: 28px;
            margin-bottom: 15px; position: relative; overflow: hidden;
        }
        .skeleton::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
            animation: loading 1.5s infinite;
        }
        @keyframes loading { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        /* ==========================================
           7. CUSTOM TOAST
           ========================================== 
        */
        #toast {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            background: var(--slate-900); color: white;
            padding: 16px 30px; border-radius: 20px; font-weight: 700;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); z-index: 2000;
            display: none; animation: slideUpToast 0.4s var(--anim-bounce);
        }
        @keyframes slideUpToast { from { bottom: -100px; } to { bottom: 40px; } }

    </style>
</head>
<body>

    <nav class="nav-header">
        <div class="nav-brand">
            <div class="back-btn" onclick="window.history.back()">
                <i class="fa-solid fa-arrow-left"></i>
            </div>
            <div class="header-text">
                <h1>Nemi Mart Live</h1>
            </div>
        </div>
        <div class="action-icon">
            <i class="fa-solid fa-bell"></i>
        </div>
    </nav>

    <main class="container">
        <div class="feed-header">
            <span class="status-pill">Official Feed</span>
            <button class="clear-all" onclick="clearEverything()">Clear All</button>
        </div>

        <div id="notif-feed" class="notification-feed">
            <div class="skeleton"></div>
            <div class="skeleton"></div>
            <div class="skeleton"></div>
        </div>

        <div id="no-data" class="empty-state">
            <i class="fa-solid fa-cloud-moon"></i>
            <h2 style="font-family: 'Outfit'; color: var(--slate-900);">All Caught Up!</h2>
            <p style="color: var(--slate-600); margin-top: 10px;">Check back later for new arrivals and exclusive deals.</p>
        </div>
    </main>

    <div id="toast">Action Successful ✨</div>

    <script>
        /* ==========================================
           8. FIREBASE REAL-TIME ENGINE
           ========================================== 
        */

        const fbConfig = {
            databaseURL: "https://nemi-mart-2-default-rtdb.firebaseio.com/"
        };
        
        firebase.initializeApp(fbConfig);
        const db = firebase.database();

        /**
         * INITIALIZE DATA SYNC
         * Admin panel se 'notifications' node par data push hoga
         */
        function startSync() {
            const notifRef = db.ref('notifications');

            // Listen for changes
            notifRef.on('value', (snapshot) => {
                const feed = document.getElementById('notif-feed');
                const empty = document.getElementById('no-data');
                const rawData = snapshot.val();

                feed.innerHTML = ""; // Clear loader

                if (rawData) {
                    empty.style.display = "none";
                    
                    // Convert to array and reverse (Newest First)
                    const sortedEntries = Object.entries(rawData).reverse();
                    
                    sortedEntries.forEach(([key, val], i) => {
                        createCard(key, val, i * 0.1);
                    });
                } else {
                    empty.style.display = "block";
                }
            });
        }

        /**
         * CREATE NOTIFICATION CARD
         */
        function createCard(key, data, delay) {
            const feed = document.getElementById('notif-feed');
            
            // Icon Logic
            let iconClass = "fa-star";
            const type = (data.type || 'new').toLowerCase();
            
            if (type === 'new') iconClass = "fa-bag-shopping";
            if (type === 'sale') iconClass = "fa-bolt";
            if (type === 'order') iconClass = "fa-box-open";

            const card = document.createElement('div');
            card.className = "lux-card";
            card.style.animationDelay = `${delay}s`;

            card.innerHTML = `
                <div class="icon-wrap">
                    <i class="fa-solid ${iconClass}"></i>
                </div>
                <div class="card-content">
                    <h3>${data.title || 'Special Update'}</h3>
                    <p>${data.message || 'Something exciting just happened at Nemi Mart!'}</p>
                    <div class="card-meta">
                        <span class="time-tag"><i class="fa-regular fa-clock"></i> ${formatTime(data.timestamp)}</span>
                        <span>•</span>
                        <span style="color: var(--success-green)"><i class="fa-solid fa-shield-check"></i> Verified</span>
                    </div>
                </div>
                <button class="btn-del" onclick="removeNotif('${key}')">
                    <i class="fa-solid fa-trash"></i>
                </button>
            `;

            feed.appendChild(card);
        }

        /**
         * UTILS
         */
        function formatTime(ts) {
            if (!ts) return "Recently";
            const sec = Math.floor((Date.now() - ts) / 1000);
            if (sec < 60) return "Just now";
            if (sec < 3600) return Math.floor(sec/60) + "m ago";
            if (sec < 86400) return Math.floor(sec/3600) + "h ago";
            return Math.floor(sec/86400) + "d ago";
        }

        function removeNotif(id) {
            event.stopPropagation();
            db.ref(`notifications/${id}`).remove()
                .then(() => triggerToast("Notification Removed"));
        }

        function clearEverything() {
            if (confirm("Master Clear? This will delete all notifications.")) {
                db.ref('notifications').remove()
                    .then(() => triggerToast("Inbox Cleared ✨"));
            }
        }

        function triggerToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.display = "block";
            setTimeout(() => { t.style.display = "none"; }, 2500);
        }

        // Start App
        window.onload = startSync;

    </script>
</body>
</html>
