 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Nemi Mart | Premium Ayurveda Hub</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@200;300;400;500;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #1B3022;
            --accent: #D4AF37;
            --leaf: #2D5A27;
            --creme: #FFFDF5;
            --white: #ffffff;
            --glass: rgba(255, 255, 255, 0.1);
            --shadow-sm: 0 4px 15px rgba(0,0,0,0.05);
            --shadow-lg: 0 15px 50px rgba(0,0,0,0.15);
            --transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* --- Reset & Base --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background: var(--creme); color: var(--primary); overflow-x: hidden; line-height: 1.6; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

        /* --- Animations --- */
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        @keyframes shimmer { 0% { background-position: -468px 0; } 100% { background-position: 468px 0; } }

        /* --- Header --- */
        header {
            background: var(--primary);
            padding: 20px 5%;
            position: sticky;
            top: 0;
            z-index: 5000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border-bottom: 2px solid var(--accent);
        }

        .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; }

        .logo-wrap { position: relative; width: 70px; height: 70px; }
        .logo-main { width: 100%; z-index: 10; filter: drop-shadow(0 0 10px var(--accent)); }
        
        .orbit-container {
            position: absolute; width: 100%; height: 100%;
            animation: rotate 20s linear infinite;
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .orbit-icon { position: absolute; color: var(--accent); font-size: 12px; opacity: 0.5; }

        .delivery-info { flex: 1; margin: 0 30px; color: var(--white); cursor: pointer; }
        .delivery-info p { font-size: 10px; text-transform: uppercase; color: var(--accent); font-weight: 700; }
        .delivery-info h4 { font-size: 15px; display: flex; align-items: center; gap: 8px; }

        /* Search Section */
        .search-wrapper { position: relative; max-width: 900px; margin: 0 auto; }
        .search-bar {
            width: 100%; height: 55px; background: var(--white);
            border-radius: 18px; display: flex; align-items: center;
            padding: 0 25px; border: 2px solid transparent; transition: var(--transition);
        }
        .search-bar:focus-within { border-color: var(--accent); transform: scale(1.02); }
        .search-bar input { border: none; outline: none; flex: 1; font-size: 15px; margin-left: 15px; }

        /* --- Category Section --- */
        .category-scroll {
            display: flex; gap: 30px; padding: 40px 5%; overflow-x: auto;
            scrollbar-width: none; background: var(--white);
        }
        .category-item {
            min-width: 100px; text-align: center; text-decoration: none; color: var(--primary);
            transition: var(--transition);
        }
        .icon-box {
            width: 85px; height: 85px; background: #f8fcf9; border-radius: 28px;
            display: flex; justify-content: center; align-items: center;
            margin-bottom: 12px; border: 1px solid #eee; position: relative;
        }
        .category-item i { font-size: 32px; color: var(--leaf); transition: 0.4s; }
        .category-item:hover .icon-box { background: var(--primary); transform: translateY(-10px) rotate(5deg); }
        .category-item:hover i { color: var(--accent); }
        .category-item span { font-weight: 600; font-size: 13px; }

        /* --- Banner System --- */
        .hero-slider {
            width: 95%; height: 450px; margin: 20px auto;
            border-radius: 35px; overflow: hidden; position: relative;
            box-shadow: var(--shadow-lg);
        }
        .slides-container { display: flex; height: 100%; transition: transform 0.8s ease-in-out; }
        .slide { min-width: 100%; position: relative; }
        .slide img { width: 100%; height: 100%; object-fit: cover; }
        .slide-content {
            position: absolute; bottom: 50px; left: 50px; color: white;
            z-index: 20; background: rgba(0,0,0,0.4); padding: 30px;
            border-radius: 20px; backdrop-filter: blur(10px);
            border: 1px solid var(--glass);
        }

        /* --- Product System --- */
        .section-title {
            padding: 50px 5% 25px; display: flex; justify-content: space-between; align-items: center;
        }
        .section-title h2 { font-family: 'Playfair Display', serif; font-size: 28px; }
        
        .product-container {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px; padding: 0 5%;
        }
        .product-card {
            background: var(--white); border-radius: 30px; padding: 20px;
            position: relative; transition: var(--transition);
            border: 1px solid rgba(0,0,0,0.03); box-shadow: var(--shadow-sm);
        }
        .product-card:hover { transform: translateY(-15px); box-shadow: var(--shadow-lg); border-color: var(--accent); }
        
        .badge-new {
            position: absolute; top: 15px; left: 15px; background: var(--accent);
            color: var(--primary); padding: 5px 15px; border-radius: 10px;
            font-size: 10px; font-weight: 800; z-index: 5;
        }
        
        .img-holder {
            width: 100%; aspect-ratio: 1/1; background: #fdfdfd;
            border-radius: 20px; margin-bottom: 20px; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        .img-holder img { width: 80%; transition: 0.6s; }
        .product-card:hover .img-holder img { transform: scale(1.15) rotate(3deg); }

        .p-info h3 { font-size: 17px; margin-bottom: 10px; height: 50px; overflow: hidden; }
        .price-tag { font-size: 22px; font-weight: 800; color: var(--leaf); }
        .old-price { font-size: 14px; text-decoration: line-through; color: #999; margin-left: 10px; }

        .add-to-cart {
            width: 100%; height: 50px; margin-top: 20px; border-radius: 15px;
            border: none; background: var(--primary); color: white;
            font-weight: 600; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .add-to-cart:hover { background: var(--accent); color: var(--primary); }

        /* --- Footer Nav --- */
        .dock-nav {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 500px; height: 75px; background: var(--primary);
            border-radius: 25px; display: flex; align-items: center;
            justify-content: space-around; padding: 0 10px; z-index: 9999;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); border: 1px solid var(--glass);
        }
        .dock-item { color: rgba(255,255,255,0.5); text-decoration: none; text-align: center; flex: 1; transition: 0.3s; }
        .dock-item.active { color: var(--accent); }
        .dock-item i { font-size: 24px; display: block; margin-bottom: 4px; }
        .dock-item span { font-size: 10px; font-weight: 600; }
        
        .main-dock-btn {
            background: var(--accent); width: 85px; height: 85px;
            border-radius: 50%; margin-top: -60px; border: 8px solid var(--creme);
            display: flex; justify-content: center; align-items: center;
            color: var(--primary); font-size: 30px; box-shadow: 0 10px 25px rgba(212,175,55,0.4);
        }

        /* --- Toast Notification --- */
        #toast {
            position: fixed; top: 30px; right: -300px; background: var(--white);
            padding: 15px 30px; border-radius: 15px; border-left: 5px solid var(--leaf);
            box-shadow: var(--shadow-lg); z-index: 10000; transition: 0.5s;
        }
        #toast.show { right: 30px; }

        @media (max-width: 600px) {
            .hero-slider { height: 250px; }
            .section-title h2 { font-size: 20px; }
            .product-container { grid-template-columns: repeat(2, 1fr); gap: 15px; }
            .p-info h3 { font-size: 13px; }
            .price-tag { font-size: 16px; }
        }
    </style>
</head>
<body>

    <script src="logic.js"></script>
</body>
</html>
