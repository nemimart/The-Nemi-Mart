 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Nemi Mart | Premium Ayurveda Hub</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #1B3022; --accent: #D4AF37; --leaf: #2D5A27;
            --creme: #FFFDF5; --white: #ffffff; --shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--creme); color: var(--primary); padding-bottom: 100px; overflow-x: hidden; }

        /* Header Customization */
        header { background: var(--primary); padding: 15px 5%; position: sticky; top: 0; z-index: 5000; border-bottom: 2px solid var(--accent); }
        .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
        .logo-main { width: 55px; filter: drop-shadow(0 0 8px var(--accent)); }
        
        .search-container { position: relative; width: 100%; }
        .search-bar { background: var(--white); border-radius: 15px; display: flex; align-items: center; padding: 12px 18px; box-shadow: var(--shadow); }
        .search-bar input { border: none; outline: none; flex: 1; margin-left: 12px; font-size: 14px; }

        /* Categories Section */
        .category-container { background: var(--white); padding: 20px 0; margin-bottom: 10px; border-bottom: 1px solid #eee; }
        .category-scroll { display: flex; gap: 20px; overflow-x: auto; padding: 0 5%; scrollbar-width: none; }
        .category-scroll::-webkit-scrollbar { display: none; }
        .cat-card { min-width: 80px; text-align: center; }
        .cat-icon { width: 65px; height: 65px; background: #F0F7F1; border-radius: 22px; display: flex; align-items: center; justify-content: center; margin-bottom: 8px; transition: 0.3s; border: 1px solid #e8f0e9; }
        .cat-card:active .cat-icon { transform: scale(0.9); background: var(--primary); }
        .cat-card:active i { color: var(--accent); }
        .cat-card i { font-size: 26px; color: var(--leaf); }
        .cat-card span { font-size: 11px; font-weight: 600; color: #444; }

        /* Banner Slider */
        .banner-area { width: 92%; height: 180px; margin: 10px auto; border-radius: 25px; overflow: hidden; position: relative; box-shadow: var(--shadow); }
        .banner-img { width: 100%; height: 100%; object-fit: cover; }

        /* Section Titles */
        .section-header { padding: 25px 5% 15px; display: flex; justify-content: space-between; align-items: flex-end; }
        .section-header h2 { font-family: 'Playfair Display', serif; font-size: 24px; position: relative; }
        .section-header h2::after { content: ''; position: absolute; bottom: -5px; left: 0; width: 40px; height: 3px; background: var(--accent); }
        .view-all { color: var(--leaf); font-weight: 700; text-decoration: none; font-size: 13px; }

        /* Product Grid */
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 0 5%; }
        .product-card { background: var(--white); border-radius: 25px; padding: 15px; position: relative; border: 1px solid #f0f0f0; transition: 0.3s; }
        .badge { position: absolute; top: 12px; left: 12px; background: #e74c3c; color: white; font-size: 9px; padding: 3px 8px; border-radius: 5px; font-weight: bold; z-index: 10; }
        .p-img-box { width: 100%; aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; margin-bottom: 12px; }
        .product-card img { width: 90%; height: 90%; object-fit: contain; }
        .product-card h3 { font-size: 13px; height: 40px; overflow: hidden; color: #333; margin-bottom: 8px; }
        .price-box { display: flex; align-items: center; gap: 8px; }
        .current-price { color: var(--leaf); font-weight: 800; font-size: 17px; }
        .old-price { color: #999; text-decoration: line-through; font-size: 11px; }
        .buy-btn { width: 100%; background: var(--primary); color: white; border: none; padding: 10px; border-radius: 12px; margin-top: 12px; font-weight: 600; font-size: 12px; }

        /* Full Screen Detail Modal */
        .modal { position: fixed; inset: 0; background: white; z-index: 10000; display: none; overflow-y: auto; }
        .modal.active { display: block; animation: slideUp 0.4s ease-out; }
        .modal-header { padding: 20px; position: sticky; top: 0; background: white; display: flex; align-items: center; gap: 15px; z-index: 11; border-bottom: 1px solid #eee; }
        .modal-body { padding: 20px; }
        .modal-img { width: 100%; border-radius: 30px; margin-bottom: 25px; box-shadow: var(--shadow); }

        /* Bottom Nav */
        .dock-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 92%; background: var(--primary); height: 70px; border-radius: 25px; display: flex; align-items: center; justify-content: space-around; z-index: 9000; box-shadow: 0 15px 35px rgba(0,0,0,0.3); }
        .dock-item { color: rgba(255,255,255,0.5); text-align: center; text-decoration: none; transition: 0.3s; }
        .dock-item.active { color: var(--accent); }
        .dock-item i { font-size: 22px; display: block; margin-bottom: 4px; }
        .dock-item span { font-size: 10px; font-weight: 600; }
        .cart-float { background: var(--accent); width: 75px; height: 75px; border-radius: 50%; margin-top: -50px; border: 8px solid var(--creme); display: flex; flex-direction: column; justify-content: center; align-items: center; color: var(--primary); box-shadow: 0 8px 20px rgba(212,175,55,0.4); }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body>

    <header>
        <div class="header-top">
            <img src="https://raw.githubusercontent.com/nemimart/The-Nemi-Mart/main/logo.png" class="logo-main">
            <div style="color:white; text-align:right">
                <p style="font-size:9px; color:var(--accent)">SHOP FOR</p>
                <h4 style="font-size:14px">Premium Ayurveda</h4>
            </div>
        </div>
        <div class="search-container">
            <div class="search-bar">
                <i class="fas fa-search" style="color:var(--accent)"></i>
                <input type="text" id="mainSearch" placeholder="Search 'Oil', 'Juice' or 'Herbs'...">
            </div>
        </div>
    </header>

    <div class="category-container">
        <div class="category-scroll" id="categoryBox">
            </div>
    </div>

    <div class="banner-area">
        <img src="https://raw.githubusercontent.com/nemimart/The-Nemi-Mart/main/Amritprash%20(1).png" class="banner-img" id="heroBanner">
    </div>

    <div class="section-header">
        <h2>🔥 Top Selling</h2>
        <a href="#" class="view-all">View All</a>
    </div>
    <div class="product-grid" id="topSellingBox"></div>

    <div class="section-header">
        <h2>✨ Premium Range</h2>
        <a href="#" class="view-all">View All</a>
    </div>
    <div class="product-grid" id="premiumBox"></div>

    <div class="section-header">
        <h2>🌿 All Products</h2>
    </div>
    <div class="product-grid" id="allProductsBox"></div>

    <div class="modal" id="pModal">
        <div class="modal-header" onclick="closeP()">
            <i class="fas fa-chevron-left" style="font-size:20px"></i>
            <h3 style="font-size:16px">Product Details</h3>
        </div>
        <div class="modal-body" id="pDetailContent">
            </div>
    </div>

    <nav class="dock-nav">
        <a href="#" class="dock-item active"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="#" class="dock-item"><i class="fas fa-th-large"></i><span>Store</span></a>
        <div class="cart-float">
            <i class="fas fa-shopping-bag" style="font-size:24px"></i>
            <span id="cartVal" style="font-size:12px; font-weight:bold">0</span>
        </div>
        <a href="#" class="dock-item"><i class="fas fa-gift"></i><span>Offers</span></a>
        <a href="#" class="dock-item"><i class="fas fa-user"></i><span>Account</span></a>
    </nav>

    <script src="logic.js"></script>
</body>
</html>
