 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nemi Mart | Search</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Outfit:wght@600;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #1A3E26;
            --accent: #D4AF37;
            --bg-glass: rgba(255, 255, 255, 0.9);
            --text-main: #0A1F13;
            --text-muted: #64748B;
            --card-shadow: 0 20px 40px rgba(0,0,0,0.06);
            --gold-gradient: linear-gradient(135deg, #D4AF37 0%, #B8860B 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            background: #FDFBF7; 
            color: var(--text-main); 
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
        }

        /* --- STICKY NAV --- */
        .nav-container {
            position: sticky; top: 0; z-index: 2000;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 20px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
        }

        .search-wrapper {
            display: flex;
            align-items: center;
            background: #f0f2f1;
            padding: 14px 20px;
            border-radius: 22px;
            gap: 12px;
            border: 1.5px solid transparent;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .search-wrapper:focus-within {
            background: #ffffff;
            border-color: var(--accent);
            box-shadow: 0 10px 30px rgba(26, 62, 38, 0.08);
            transform: translateY(-2px);
        }

        .search-input {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 16px;
            font-weight: 600;
            outline: none;
            color: var(--text-main);
        }

        .voice-icon { color: var(--accent); font-size: 18px; cursor: pointer; }

        /* --- DYNAMIC CONTENT SECTIONS --- */
        .discover-section { padding: 25px 20px; }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
        }

        .section-header h2 {
            font-family: 'Outfit';
            font-size: 18px;
            font-weight: 800;
            color: var(--primary);
        }

        /* --- TRENDING CHIPS --- */
        .trending-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 30px;
        }

        .trend-chip {
            padding: 10px 18px;
            background: #ffffff;
            border: 1px solid rgba(0,0,0,0.05);
            border-radius: 14px;
            font-size: 13px;
            font-weight: 700;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }

        .trend-chip i { color: #FF4D4D; font-size: 12px; }
        .trend-chip:active { transform: scale(0.95); background: var(--primary); color: white; }

        /* --- REAL-TIME RESULTS GRID --- */
        .results-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 10px;
        }

        .p-card {
            background: #ffffff;
            border-radius: 28px;
            padding: 12px;
            position: relative;
            box-shadow: var(--card-shadow);
            border: 1px solid rgba(212, 175, 55, 0.05);
            animation: cardEntrance 0.6s cubic-bezier(0.23, 1, 0.32, 1) both;
            text-decoration: none;
            color: inherit;
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .p-img-box {
            width: 100%;
            height: 160px;
            background: #f9f9f9;
            border-radius: 22px;
            overflow: hidden;
            position: relative;
        }

        .p-img-box img { width: 100%; height: 100%; object-fit: cover; }

        .p-badge {
            position: absolute; top: 10px; left: 10px;
            background: var(--gold-gradient);
            color: white; font-size: 10px; font-weight: 800;
            padding: 4px 10px; border-radius: 8px;
            text-transform: uppercase;
        }

        .p-info { padding: 12px 8px 4px; }
        .p-category { font-size: 10px; font-weight: 800; color: var(--accent); text-transform: uppercase; margin-bottom: 4px; }
        .p-title { font-size: 15px; font-weight: 700; line-height: 1.3; color: var(--primary); }
        
        .p-footer {
            display: flex; justify-content: space-between; align-items: center; margin-top: 10px;
        }
        .p-price { font-weight: 900; font-size: 17px; color: var(--text-main); }
        .add-btn {
            width: 34px; height: 34px; background: var(--primary); color: var(--accent);
            border-radius: 10px; display: flex; align-items: center; justify-content: center;
        }

        /* --- SUGGESTIONS --- */
        #suggestionBox {
            position: absolute; width: calc(100% - 40px);
            background: white; margin: 5px 20px; border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            display: none; flex-direction: column; overflow: hidden;
            z-index: 1500;
        }

        .s-item {
            padding: 16px 20px; display: flex; align-items: center; gap: 15px;
            font-size: 14px; font-weight: 600; border-bottom: 1px solid #f8f8f8;
            cursor: pointer;
        }
        .s-item:active { background: #f0f2f1; }
        .s-item i { color: #cbd5e1; }

        /* --- EMPTY STATE --- */
        .empty-state {
            display: none; text-align: center; padding: 60px 20px;
        }
        .empty-state i { font-size: 50px; color: #e2e8f0; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div class="nav-container">
        <div class="search-wrapper">
            <i class="fa-solid fa-magnifying-glass" style="color: var(--text-muted);"></i>
            <input type="text" id="mainSearch" class="search-input" placeholder="Search Arham's Picks..." oninput="magicSearch()">
            <i class="fa-solid fa-microphone voice-icon"></i>
        </div>
    </div>

    <div id="suggestionBox"></div>

    <main class="discover-section" id="discoverView">
        <div id="defaultContent">
            <div class="section-header">
                <h2>Trending Now</h2>
            </div>
            <div class="trending-container">
                <div class="trend-chip" onclick="quickSearch('Honey')"><i class="fa-solid fa-fire"></i> Wild Honey</div>
                <div class="trend-chip" onclick="quickSearch('Kesar')">Premium Saffron</div>
                <div class="trend-chip" onclick="quickSearch('Oil')">Cold Pressed</div>
                <div class="trend-chip" onclick="quickSearch('Dry')">Dry Fruits</div>
            </div>

            <div class="section-header">
                <h2>Recommended for You</h2>
            </div>
        </div>

        <div class="results-grid" id="mainGrid">
            </div>

        <div class="empty-state" id="emptyUI">
            <i class="fa-solid fa-magnifying-glass-chart"></i>
            <h3 style="font-family: 'Outfit';">Bhai, ye item out of stock hai!</h3>
            <p style="color: var(--text-muted); font-size: 14px;">Kuch aur dhoondo, maza aayega.</p>
        </div>
    </main>

    <script>
        const database = [
            { id: 1, name: "Kashmiri Kesar", price: "₹499", cat: "Luxury", img: "https://images.unsplash.com/photo-1599307734170-4d372579120a?q=80&w=500", badge: "Best Seller" },
            { id: 2, name: "Raw Forest Honey", price: "₹320", cat: "Organic", img: "https://images.unsplash.com/photo-1587049352846-4a222e784d38?q=80&w=500", badge: "New" },
            { id: 3, name: "Walnuts (Akhrot)", price: "₹750", cat: "Dry Fruit", img: "https://images.unsplash.com/photo-1585241936939-be4099591252?q=80&w=500", badge: "" },
            { id: 4, name: "Virgin Coconut Oil", price: "₹550", cat: "Essentials", img: "https://images.unsplash.com/photo-1620981195759-397753fc801d?q=80&w=500", badge: "Pure" },
            { id: 5, name: "Organic Almonds", price: "₹899", cat: "Dry Fruit", img: "https://images.unsplash.com/photo-1508029050012-b2da3ddc3973?q=80&w=500", badge: "Premium" }
        ];

        function magicSearch() {
            const query = document.getElementById('mainSearch').value.toLowerCase();
            const grid = document.getElementById('mainGrid');
            const suggestions = document.getElementById('suggestionBox');
            const defaults = document.getElementById('defaultContent');
            const empty = document.getElementById('emptyUI');

            grid.innerHTML = "";
            suggestions.innerHTML = "";

            if(query.length > 0) {
                defaults.style.display = "none";
                const matched = database.filter(p => p.name.toLowerCase().includes(query) || p.cat.toLowerCase().includes(query));

                if(matched.length > 0) {
                    empty.style.display = "none";
                    suggestions.style.display = "flex";
                    
                    matched.forEach((p, index) => {
                        // Create Suggestion Row
                        const sItem = document.createElement('div');
                        sItem.className = 's-item';
                        sItem.innerHTML = `<i class="fa-solid fa-search"></i> <span>${p.name}</span>`;
                        sItem.onclick = () => { document.getElementById('mainSearch').value = p.name; magicSearch(); };
                        suggestions.appendChild(sItem);

                        // Create Luxury Card
                        const card = `
                            <a href="product.html?id=${p.id}" class="p-card" style="animation-delay: ${index * 0.1}s">
                                ${p.badge ? `<div class="p-badge">${p.badge}</div>` : ''}
                                <div class="p-img-box">
                                    <img src="${p.img}" alt="${p.name}">
                                </div>
                                <div class="p-info">
                                    <div class="p-category">${p.cat}</div>
                                    <div class="p-title">${p.name}</div>
                                    <div class="p-footer">
                                        <div class="p-price">${p.price}</div>
                                        <div class="add-btn"><i class="fa-solid fa-plus"></i></div>
                                    </div>
                                </div>
                            </a>
                        `;
                        grid.innerHTML += card;
                    });
                } else {
                    suggestions.style.display = "none";
                    empty.style.display = "block";
                }
            } else {
                defaults.style.display = "block";
                suggestions.style.display = "none";
                empty.style.display = "none";
                renderInitial();
            }
        }

        function quickSearch(val) {
            document.getElementById('mainSearch').value = val;
            magicSearch();
        }

        function renderInitial() {
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = database.slice(0, 4).map((p, i) => `
                <a href="product.html?id=${p.id}" class="p-card" style="animation-delay: ${i * 0.1}s">
                    <div class="p-img-box"><img src="${p.img}"></div>
                    <div class="p-info">
                        <div class="p-category">${p.cat}</div>
                        <div class="p-title">${p.name}</div>
                        <div class="p-footer">
                            <div class="p-price">${p.price}</div>
                            <div class="add-btn"><i class="fa-solid fa-plus"></i></div>
                        </div>
                    </div>
                </a>
            `).join('');
        }

        renderInitial();
    </script>
</body>
</html>
