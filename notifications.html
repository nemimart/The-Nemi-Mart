<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nemi Mart | Live Updates</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        /* ==========================================
           1. DESIGN SYSTEM & VARIABLES
           ========================================== 
        */
        :root {
            --p-dark: #0F172A;         /* Slate 900 */
            --p-accent: #D4AF37;       /* Metallic Gold */
            --bg-main: #F8FAFC;        /* Cool Gray */
            --card-bg: #FFFFFF;
            --text-h: #1E293B;
            --text-p: #64748B;
            
            /* Notification Categories */
            --pay-c: #10B981; --pay-bg: #F0FDF4;
            --ord-c: #3B82F6; --ord-bg: #EFF6FF;
            --sale-c: #EF4444; --sale-bg: #FEF2F2;
            --new-c: #8B5CF6; --new-bg: #F5F3FF;
            
            --radius-lg: 24px;
            --radius-md: 16px;
            --shadow: 0 10px 30px -10px rgba(0,0,0,0.07);
            --anim-smooth: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ==========================================
           2. GLOBAL RESET
           ========================================== 
        */
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-h);
            line-height: 1.6;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ==========================================
           3. PREMIUM HEADER
           ========================================== 
        */
        .navbar {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: sticky; top: 0; z-index: 1000;
            padding: 18px 24px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .nav-left { display: flex; align-items: center; gap: 15px; }

        .back-circle {
            width: 44px; height: 44px; border-radius: 50%;
            background: var(--card-bg); border: 1px solid #E2E8F0;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; color: var(--p-dark); cursor: pointer;
            transition: var(--anim-smooth);
        }
        .back-circle:active { transform: scale(0.9); background: var(--bg-main); }

        .nav-title h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 22px; font-weight: 800; letter-spacing: -0.5px;
        }

        .clear-btn {
            background: var(--sale-bg); color: var(--sale-c);
            padding: 8px 16px; border-radius: 12px; font-size: 13px;
            font-weight: 700; cursor: pointer; transition: var(--anim-smooth);
            border: none;
        }
        .clear-btn:hover { background: var(--sale-c); color: white; }

        /* ==========================================
           4. MAIN FEED CONTAINER
           ========================================== 
        */
        .content-area {
            max-width: 600px; margin: 0 auto; padding: 20px;
        }

        .section-tag {
            font-size: 12px; font-weight: 800; color: var(--text-p);
            text-transform: uppercase; letter-spacing: 1.5px;
            margin-bottom: 20px; padding-left: 5px;
        }

        .feed-list {
            display: flex; flex-direction: column; gap: 16px;
        }

        /* ==========================================
           5. NOTIFICATION CARDS (THE HEART)
           ========================================== 
        */
        .n-card {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: 20px;
            display: flex; gap: 18px;
            position: relative;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255,255,255,0.8);
            transition: var(--anim-smooth);
            animation: cardEntrance 0.6s ease backwards;
            cursor: pointer;
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(20px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .n-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px -15px rgba(0,0,0,0.1);
        }

        /* Icon Styling */
        .n-icon-box {
            width: 56px; height: 56px; border-radius: var(--radius-md);
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; flex-shrink: 0; transition: var(--anim-smooth);
        }
        .n-card:hover .n-icon-box { transform: rotate(-5deg) scale(1.1); }

        /* Dynamic Colors */
        .type-pay { background: var(--pay-bg); color: var(--pay-c); }
        .type-ord { background: var(--ord-bg); color: var(--ord-c); }
        .type-sale { background: var(--sale-bg); color: var(--sale-c); }
        .type-new { background: var(--new-bg); color: var(--new-c); }

        /* Text Body */
        .n-info { flex: 1; }
        .n-info h3 {
            font-size: 16px; font-weight: 800; color: var(--text-h);
            margin-bottom: 4px; line-height: 1.2;
        }
        .n-info p {
            font-size: 14px; color: var(--text-p); font-weight: 500;
            line-height: 1.5;
        }

        .n-footer {
            margin-top: 12px; display: flex; align-items: center; gap: 12px;
            font-size: 11px; font-weight: 700; color: #94A3B8;
        }
        .n-footer span i { margin-right: 4px; }

        /* Actions */
        .n-delete {
            position: absolute; right: 15px; top: 15px;
            width: 32px; height: 32px; border-radius: 10px;
            background: #F1F5F9; color: #94A3B8;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: var(--anim-smooth);
        }
        .n-card:hover .n-delete { opacity: 1; }
        .n-delete:hover { background: #fee2e2; color: #ef4444; }

        /* ==========================================
           6. STATE HANDLERS (SKELETON & EMPTY)
           ========================================== 
        */
        .skeleton-ui {
            background: white; padding: 20px; border-radius: 24px;
            display: flex; gap: 15px; border: 1px solid #f1f5f9;
        }
        .sk-circle { width: 56px; height: 56px; border-radius: 16px; background: #f1f5f9; animation: pulse 1.5s infinite; }
        .sk-text { flex: 1; display: flex; flex-direction: column; gap: 10px; }
        .sk-line { height: 12px; background: #f1f5f9; border-radius: 6px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }

        #empty-view {
            display: none; flex-direction: column; align-items: center;
            justify-content: center; padding: 100px 40px; text-align: center;
        }
        #empty-view i { font-size: 80px; color: #E2E8F0; margin-bottom: 20px; }
        #empty-view h2 { font-size: 22px; color: var(--text-h); margin-bottom: 10px; }

        /* ==========================================
           7. TOAST FEEDBACK
           ========================================== 
        */
        .toast-container {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 9999;
        }
        .toast-msg {
            background: var(--p-dark); color: white; padding: 14px 28px;
            border-radius: 50px; font-size: 14px; font-weight: 600;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            display: flex; align-items: center; gap: 10px;
            animation: toastUp 0.4s ease forwards;
        }
        @keyframes toastUp { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-left">
            <div class="back-circle" onclick="window.history.back()">
                <i class="fa-solid fa-chevron-left"></i>
            </div>
            <div class="nav-title">
                <h1>Notifications</h1>
            </div>
        </div>
        <button class="clear-btn" onclick="clearAllData()">Clear All</button>
    </nav>

    <main class="content-area">
        <div class="section-tag" id="status-text">Recent Updates</div>

        <div class="feed-list" id="main-feed">
            <div class="skeleton-ui"><div class="sk-circle"></div><div class="sk-text"><div class="sk-line" style="width:40%"></div><div class="sk-line"></div></div></div>
            <div class="skeleton-ui"><div class="sk-circle"></div><div class="sk-text"><div class="sk-line" style="width:40%"></div><div class="sk-line"></div></div></div>
        </div>

        <div id="empty-view">
            <i class="fa-solid fa-bell-slash"></i>
            <h2>Inbox is Clean!</h2>
            <p style="color:var(--text-p)">No new notifications at the moment. We'll alert you when something happens.</p>
        </div>
    </main>

    <div class="toast-container" id="toast-root"></div>

    <script>
        /* ==========================================
           8. FIREBASE CORE LOGIC
           ========================================== 
        */

        // Direct Connection to your Database
        const config = {
            databaseURL: "https://nemi-mart-2-default-rtdb.firebaseio.com/"
        };
        
        firebase.initializeApp(config);
        const database = firebase.database();
        const nodePath = "notifications"; // Root node where data arrives

        /**
         * Real-time Data Sync
         * This listens to EVERY change in the database automatically.
         */
        function initApp() {
            const ref = database.ref(nodePath);

            ref.on('value', (snap) => {
                const container = document.getElementById('main-feed');
                const emptyUI = document.getElementById('empty-view');
                const statusTxt = document.getElementById('status-text');
                const data = snap.val();

                container.innerHTML = ""; // Flush skeletons/old content

                if (data) {
                    emptyUI.style.display = "none";
                    container.style.display = "flex";
                    statusTxt.innerText = "Recent Updates";

                    // Convert to array, reverse it (Latest first)
                    const entries = Object.entries(data).reverse();
                    
                    entries.forEach(([id, val], index) => {
                        // Ensure data is valid
                        if (val && typeof val === 'object' && val.title) {
                            renderNotification(id, val, index * 0.1);
                        }
                    });
                } else {
                    container.style.display = "none";
                    statusTxt.innerText = "";
                    emptyUI.style.display = "flex";
                }
            });
        }

        /**
         * Generate Card HTML
         */
        function renderNotification(id, info, delay) {
            const feed = document.getElementById('main-feed');

            // Logic for Icon & Theme based on type
            let icon = "fa-bell";
            let theme = "type-new";

            const type = (info.type || "").toLowerCase();
            
            if (type.includes("pay")) {
                icon = "fa-receipt"; theme = "type-pay";
            } else if (type.includes("order") || type.includes("confirm")) {
                icon = "fa-box-check"; theme = "type-ord";
            } else if (type.includes("price") || type.includes("sale") || type.includes("drop")) {
                icon = "fa-tags"; theme = "type-sale";
            } else if (type.includes("new") || type.includes("arrival")) {
                icon = "fa-sparkles"; theme = "type-new";
            }

            const card = document.createElement('div');
            card.className = `n-card`;
            card.style.animationDelay = `${delay}s`;

            card.innerHTML = `
                <div class="n-icon-box ${theme}">
                    <i class="fa-solid ${icon}"></i>
                </div>
                <div class="n-info">
                    <h3>${info.title}</h3>
                    <p>${info.message}</p>
                    <div class="n-footer">
                        <span><i class="fa-regular fa-clock"></i> ${calculateTime(info.timestamp)}</span>
                        <span>•</span>
                        <span>Official Update</span>
                    </div>
                </div>
                <div class="n-delete" onclick="deleteSingle('${id}')">
                    <i class="fa-solid fa-trash-can"></i>
                </div>
            `;

            feed.appendChild(card);
        }

        /**
         * Helper: Relative Time
         */
        function calculateTime(ts) {
            if (!ts) return "Just now";
            const diff = Math.floor((Date.now() - ts) / 1000);
            if (diff < 60) return "Just now";
            if (diff < 3600) return Math.floor(diff/60) + "m ago";
            if (diff < 86400) return Math.floor(diff/3600) + "h ago";
            return Math.floor(diff/86400) + " days ago";
        }

        /**
         * Database Operations
         */
        function deleteSingle(id) {
            event.stopPropagation();
            database.ref(`${nodePath}/${id}`).remove()
                .then(() => showToast("Removed from list"));
        }

        function clearAllData() {
            if (confirm("Are you sure you want to clear all notifications?")) {
                database.ref(nodePath).remove()
                    .then(() => showToast("All notifications cleared"));
            }
        }

        /**
         * UI: Toast Feedback
         */
        function showToast(msg) {
            const root = document.getElementById('toast-root');
            const el = document.createElement('div');
            el.className = 'toast-msg';
            el.innerHTML = `<i class="fa-solid fa-check-circle" style="color:var(--pay-c)"></i> ${msg}`;
            root.appendChild(el);
            setTimeout(() => el.remove(), 2500);
        }

        // Boot
        window.onload = initApp;

    </script>
</body>
    </html>
