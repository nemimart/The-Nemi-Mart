 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEMI ADMIN v2.0 | PRODUCT INJECTION</title>
    <style>
        /* INDUSTRIAL WHITE THEME - MOBILE RESPONSIVE */
        :root {
            --black: #000000;
            --white: #ffffff;
            --gray: #f4f4f4;
            --border: #dddddd;
            --success: #28a745;
            --danger: #dc3545;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background-color: var(--white); 
            color: var(--black); 
            font-family: 'Courier New', Courier, monospace; 
            margin: 0; 
            padding: 10px; 
            line-height: 1.6;
        }

        .wrapper { 
            max-width: 100%; 
            margin: 0 auto; 
            border: 3px solid var(--black); 
            padding: 15px;
        }

        header { 
            border-bottom: 3px solid var(--black); 
            padding-bottom: 15px; 
            margin-bottom: 20px;
        }

        h1 { font-size: 22px; text-transform: uppercase; margin: 0; letter-spacing: -1px; }
        .nav-link { 
            display: inline-block; 
            margin-top: 10px; 
            background: var(--black); 
            color: var(--white); 
            padding: 8px 15px; 
            text-decoration: none; 
            font-size: 12px;
            font-weight: bold;
        }

        .section-header { 
            background: var(--black); 
            color: var(--white); 
            padding: 5px 10px; 
            font-weight: bold; 
            text-transform: uppercase; 
            margin-top: 25px;
            font-size: 14px;
        }

        /* FORM SYSTEM */
        .grid-system { display: flex; flex-direction: column; gap: 15px; margin-top: 15px; }
        .field { display: flex; flex-direction: column; }
        label { font-weight: bold; text-transform: uppercase; font-size: 11px; margin-bottom: 5px; }
        
        input, textarea, select { 
            border: 2px solid var(--black); 
            padding: 12px; 
            font-size: 16px; 
            font-family: inherit;
            outline: none;
            width: 100%;
        }

        input:focus { background: var(--gray); }

        /* MULTI-PHOTO SYSTEM */
        .photo-upload-zone { 
            border: 2px dashed var(--black); 
            padding: 15px; 
            margin-top: 5px; 
            background: var(--gray);
        }
        .image-slot { margin-bottom: 10px; border-bottom: 1px solid #ccc; padding-bottom: 10px; }
        .add-more-btn { 
            background: #eee; 
            border: 1px solid var(--black); 
            padding: 5px; 
            font-size: 11px; 
            cursor: pointer; 
            margin-top: 5px;
            text-transform: uppercase;
        }

        /* BUTTONS */
        #executeBtn { 
            background: var(--black); 
            color: var(--white); 
            border: none; 
            padding: 20px; 
            font-size: 18px; 
            font-weight: bold; 
            width: 100%; 
            margin-top: 30px; 
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 5px 5px 0px #ccc;
        }
        #executeBtn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px #ccc; }
        #executeBtn:disabled { background: #999; }

        /* PROGRESS BAR */
        .p-container { width: 100%; border: 1px solid var(--black); height: 15px; margin-top: 10px; display: none; }
        .p-bar { height: 100%; background: var(--black); width: 0%; transition: 0.3s; }

        /* HISTORY TABLE - MOBILE CARD VIEW */
        .history-section { margin-top: 50px; }
        .prod-card { 
            border: 2px solid var(--black); 
            margin-bottom: 15px; 
            padding: 10px; 
            position: relative;
        }
        .prod-card img { width: 60px; height: 60px; object-fit: cover; border: 1px solid var(--black); }
        .status-badge { 
            position: absolute; 
            top: 10px; 
            right: 10px; 
            padding: 3px 8px; 
            font-size: 10px; 
            font-weight: bold;
            text-transform: uppercase;
        }
        .in-stock { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .out-stock { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

        .action-btns { display: flex; gap: 5px; margin-top: 10px; }
        .btn-sm { padding: 8px; border: 1px solid var(--black); font-size: 10px; cursor: pointer; background: var(--white); flex: 1; text-transform: uppercase; font-weight: bold; }
        .btn-del { background: var(--black); color: var(--white); }

        #notifBox { 
            position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
            background: var(--black); color: var(--white); padding: 10px 20px;
            font-size: 12px; z-index: 9999; display: none;
        }

        @media (min-width: 768px) {
            .grid-system { display: grid; grid-template-columns: 1fr 1fr; }
            .full { grid-column: span 2; }
            h1 { font-size: 35px; }
        }
    </style>
</head>
<body>

<div id="notifBox">SYSTEM NOTIFICATION: NEW PRODUCT DETECTED</div>

<div class="wrapper">
    <header>
        <h1>NEMI_ADMIN_01</h1>
        <a href="admin2.html" class="nav-link">SWITCH TO ORDERS (P3) -></a>
    </header>

    <div class="section-header">Core Database Injection (P2)</div>

    <form id="megaForm">
        <div class="grid-system">
            <div class="field">
                <label>Product Title</label>
                <input type="text" id="p_title" required placeholder="Ex: Organic Himalayan Salt">
            </div>

            <div class="field">
                <label>Category Tag</label>
                <select id="p_cat">
                    <option value="organic">Organic Food</option>
                    <option value="beauty">Beauty & Wellness</option>
                    <option value="seeds">Agricultural Seeds</option>
                    <option value="oils">Essential Oils</option>
                </select>
            </div>

            <div class="field">
                <label>Base Price (₹)</label>
                <input type="number" id="p_price" required placeholder="0.00">
            </div>

            <div class="field">
                <label>Discount (%)</label>
                <input type="number" id="p_disc" value="0">
            </div>

            <div class="field">
                <label>Stock Count</label>
                <input type="number" id="p_stock" required placeholder="99">
            </div>

            <div class="field">
                <label>Product Media (Multiple Photos)</label>
                <div class="photo-upload-zone" id="imageZone">
                    <div class="image-slot">
                        <input type="file" class="p-img-input" accept="image/*" required>
                    </div>
                </div>
                <button type="button" class="add-more-btn" onclick="addPhotoSlot()">+ Add Another Photo Slot</button>
            </div>

            <div class="field full">
                <label>Hero Description (One Liner)</label>
                <input type="text" id="p_hero" placeholder="The best salt from the hills...">
            </div>

            <div class="field full">
                <label>Full Content / Story</label>
                <textarea id="p_long" rows="6" placeholder="Describe your product here..."></textarea>
            </div>

            <div class="field full">
                <label>Ingredients (Comma separated)</label>
                <textarea id="p_ing" rows="2" placeholder="Salt, Minerals, Trace Elements..."></textarea>
            </div>

            <div class="field full">
                <label>Application / Usage</label>
                <textarea id="p_use" rows="2" placeholder="How to use this product..."></textarea>
            </div>
        </div>

        <div class="p-container" id="pContainer"><div class="p-bar" id="pBar"></div></div>
        <button type="submit" id="executeBtn">Execute Cloud Injection</button>
    </form>

    <div class="history-section">
        <div class="section-header">Live Inventory Logs</div>
        <div id="historyList" style="margin-top: 15px;">
            </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

    // PROJECT 2 CONFIG (Nemi Mart 2)
    const firebaseConfig = {
        apiKey: "AIzaSyDVIz9_OlUcxl-Dy5oFa_yV6LPPNLp1M80",
        authDomain: "nemi-mart-2.firebaseapp.com",
        projectId: "nemi-mart-2",
        storageBucket: "nemi-mart-2.firebasestorage.app",
        messagingSenderId: "787406811321",
        appId: "1:787406811321:web:c2306258fccb0bb171eb68"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);

    // DYNAMIC PHOTO SLOTS
    window.addPhotoSlot = () => {
        const zone = document.getElementById('imageZone');
        const div = document.createElement('div');
        div.className = 'image-slot';
        div.innerHTML = '<input type="file" class="p-img-input" accept="image/*">';
        zone.appendChild(div);
    };

    // NOTIFICATION TRIGGER
    function triggerNotif(msg) {
        const box = document.getElementById('notifBox');
        box.innerText = msg;
        box.style.display = 'block';
        setTimeout(() => box.style.display = 'none', 4000);
    }

    // MAIN UPLOAD ENGINE
    document.getElementById('megaForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('executeBtn');
        btn.disabled = true;
        
        const files = document.querySelectorAll('.p-img-input');
        const imageUrls = [];
        const pBar = document.getElementById('pBar');
        const pContainer = document.getElementById('pContainer');
        
        pContainer.style.display = 'block';

        try {
            // 1. UPLOAD MULTIPLE PHOTOS
            for(let i=0; i < files.length; i++) {
                const file = files[i].files[0];
                if(!file) continue;

                const sRef = ref(storage, `nemi_multi/${Date.now()}_${file.name}`);
                const task = uploadBytesResumable(sRef, file);

                await new Promise((resolve, reject) => {
                    task.on('state_changed', 
                        (snap) => {
                            let prog = (snap.bytesTransferred / snap.totalBytes) * 100;
                            pBar.style.width = prog + '%';
                        },
                        reject,
                        async () => {
                            const url = await getDownloadURL(task.snapshot.ref);
                            imageUrls.push(url);
                            resolve();
                        }
                    );
                });
            }

            // 2. SAVE TO FIRESTORE
            const price = parseFloat(document.getElementById('p_price').value);
            const disc = parseFloat(document.getElementById('p_disc').value);

            await addDoc(collection(db, "products"), {
                title: document.getElementById('p_title').value,
                category: document.getElementById('p_cat').value,
                price: price,
                discount: disc,
                finalPrice: price - (price * (disc/100)),
                stock: parseInt(document.getElementById('p_stock').value),
                images: imageUrls,
                hero: document.getElementById('p_hero').value,
                description: document.getElementById('p_long').value,
                ingredients: document.getElementById('p_ing').value.split(','),
                usage: document.getElementById('p_use').value,
                status: 'in-stock',
                createdAt: serverTimestamp()
            });

            triggerNotif("SUCCESS: PRODUCT INJECTED & NOTIFIED");
            document.getElementById('megaForm').reset();
            fetchLogs();
            
        } catch (err) {
            alert("CRITICAL ERROR: " + err.message);
        } finally {
            btn.disabled = false;
            pContainer.style.display = 'none';
        }
    });

    // FETCH LOGS (HISTORY)
    async function fetchLogs() {
        const list = document.getElementById('historyList');
        list.innerHTML = "LOGGING CLOUD DATA...";
        
        const snap = await getDocs(collection(db, "products"));
        list.innerHTML = "";
        
        snap.forEach(docSnap => {
            const p = docSnap.data();
            const id = docSnap.id;
            const statusClass = p.status === 'in-stock' ? 'in-stock' : 'out-stock';
            
            list.innerHTML += `
                <div class="prod-card">
                    <span class="status-badge ${statusClass}">${p.status}</span>
                    <div style="display:flex; gap:10px; align-items:center;">
                        <img src="${p.images[0] || 'https://via.placeholder.com/60'}">
                        <div>
                            <strong style="font-size:14px;">${p.title}</strong><br>
                            <small>Stock: ${p.stock} | Price: ₹${p.finalPrice}</small>
                        </div>
                    </div>
                    <div class="action-btns">
                        <button class="btn-sm" onclick="toggleStock('${id}', '${p.status}')">Toggle Stock</button>
                        <button class="btn-sm btn-del" onclick="vaporize('${id}')">Delete</button>
                    </div>
                </div>
            `;
        });
    }

    // TOGGLE STOCK
    window.toggleStock = async (id, current) => {
        const next = current === 'in-stock' ? 'out-of-stock' : 'in-stock';
        await updateDoc(doc(db, "products", id), { status: next });
        fetchLogs();
    };

    // DELETE (VAPORIZE)
    window.vaporize = async (id) => {
        if(confirm("VAPORIZE PRODUCT DATA?")) {
            await deleteDoc(doc(db, "products", id));
            fetchLogs();
        }
    };

    fetchLogs();
</script>

</body>
</html>
