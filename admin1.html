<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEMI MASTER ADMIN </title>
    <style>
        /* ELITE INDUSTRIAL THEME - WHITE & BOLD */
        :root {
            --accent: #000000;
            --bg: #ffffff;
            --surface: #f8f9fa;
            --border: #000000;
            --success: #00ff6a;
            --danger: #ff3e3e;
            --font: 'Courier New', Courier, monospace;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { 
            background-color: var(--bg); 
            color: var(--accent); 
            font-family: var(--font); 
            margin: 0; 
            padding: 20px; 
            font-weight: 600;
            line-height: 1.4;
        }

        .master-wrapper { 
            max-width: 1200px; 
            margin: 0 auto; 
            border: 6px solid var(--border); 
            padding: 40px;
            box-shadow: 20px 20px 0px #eeeeee;
        }

        header { 
            border-bottom: 6px solid var(--border); 
            padding-bottom: 30px; 
            margin-bottom: 40px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            flex-wrap: wrap;
            gap: 20px;
        }

        .brand-zone h1 { font-size: clamp(24px, 6vw, 50px); text-transform: uppercase; margin: 0; letter-spacing: -3px; line-height: 0.8; }
        .brand-zone p { margin: 10px 0 0 0; font-size: 12px; text-transform: uppercase; opacity: 0.7; }

        .nav-gate { 
            background: var(--accent); 
            color: var(--bg); 
            padding: 15px 25px; 
            text-decoration: none; 
            font-size: 14px;
            font-weight: 900;
            text-transform: uppercase;
            border: 2px solid var(--accent);
            transition: 0.3s;
        }
        .nav-gate:hover { background: var(--bg); color: var(--accent); }

        /* INPUT ARCHITECTURE */
        .grid-engine { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .input-cell { display: flex; flex-direction: column; gap: 10px; }
        .full-cell { grid-column: 1 / -1; }
        
        label { font-weight: 900; text-transform: uppercase; font-size: 13px; letter-spacing: 1px; }
        
        input, textarea, select { 
            border: 3px solid var(--border); 
            padding: 18px; 
            font-size: 16px; 
            font-family: var(--font);
            width: 100%;
            background: var(--bg);
            border-radius: 0;
            transition: 0.2s;
        }

        input:focus, textarea:focus { background: var(--surface); box-shadow: 8px 8px 0px #eee; }

        /* MEDIA SLOTS */
        .media-factory { 
            border: 3px dashed var(--border); 
            padding: 25px; 
            background: var(--surface);
            margin-top: 5px;
        }
        .file-row { margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .add-slot-btn { 
            background: var(--bg); 
            border: 3px solid var(--border); 
            padding: 12px; 
            font-size: 12px; 
            cursor: pointer; 
            font-weight: 900;
            text-transform: uppercase;
            width: 100%;
            margin-top: 10px;
        }
        .add-slot-btn:hover { background: #eee; }

        /* ACTION CORE */
        #coreExecute { 
            background: var(--accent); 
            color: var(--bg); 
            border: none; 
            padding: 30px; 
            font-size: 24px; 
            font-weight: 900; 
            width: 100%; 
            margin-top: 50px; 
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 4px;
            position: relative;
            overflow: hidden;
        }
        #coreExecute:disabled { background: #444; cursor: not-allowed; }

        /* CUSTOM PROGRESS */
        .sync-rail { width: 100%; border: 3px solid var(--border); height: 24px; margin-top: 20px; display: none; background: #eee; }
        .sync-flow { height: 100%; background: var(--accent); width: 0%; transition: 0.3s; }

        /* LIVE FEED SYSTEM */
        .feed-section { margin-top: 80px; }
        .feed-header { background: var(--accent); color: var(--bg); padding: 15px 20px; text-transform: uppercase; font-size: 18px; display: flex; justify-content: space-between; }
        
        .product-strip { 
            border: 3px solid var(--border); 
            margin-top: 20px; 
            padding: 20px; 
            display: flex; 
            align-items: center; 
            gap: 25px;
            background: var(--bg);
            transition: 0.3s;
        }
        .product-strip:hover { transform: translateX(10px); }
        .product-strip img { width: 100px; height: 100px; object-fit: cover; border: 3px solid var(--border); }
        
        .info-block { flex-grow: 1; }
        .info-block h3 { margin: 0; text-transform: uppercase; font-size: 20px; }
        .info-block p { margin: 5px 0 0 0; font-size: 13px; opacity: 0.8; }

        .tag-status { padding: 5px 15px; font-size: 11px; font-weight: 900; text-transform: uppercase; border: 2px solid var(--border); }
        .active-tag { background: var(--success); }
        .out-tag { background: var(--danger); color: #fff; }

        .op-controls { display: flex; gap: 10px; }
        .op-btn { 
            padding: 15px; border: 2px solid var(--border); font-size: 11px; 
            cursor: pointer; background: var(--bg); font-weight: 900; text-transform: uppercase;
        }
        .op-del { background: var(--accent); color: var(--bg); }

        /* CUSTOM TOAST SYSTEM */
        #toastContainer { 
            position: fixed; bottom: 30px; right: 30px; z-index: 10000;
            display: flex; flex-direction: column; gap: 10px;
        }
        .toast {
            background: var(--accent); color: var(--bg); padding: 20px 40px;
            border: 3px solid var(--border); font-weight: 900; text-transform: uppercase;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.1); animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

        @media (max-width: 768px) {
            .master-wrapper { padding: 20px; border-width: 4px; }
            .product-strip { flex-direction: column; text-align: center; }
            .op-controls { width: 100%; }
        }
    </style>
</head>
<body>

<div id="toastContainer"></div>

<div class="master-wrapper">
    <header>
        <div class="brand-zone">
            <h1>NEMI_CORE_v4</h1>
            <p>Deployment: Realtime-Link-Protocol // P2_INJECTION</p>
        </div>
        <a href="admin2.html" class="nav-gate">Access Orders (P3) -></a>
    </header>

    <form id="masterForm">
        <div class="grid-engine">
            <div class="input-cell">
                <label>Identifier [Product Name]</label>
                <input type="text" id="pTitle" required placeholder="Ex: Raw Cold-Pressed Oil">
            </div>

            <div class="input-cell">
                <label>Inventory Classification</label>
                <select id="pCat">
                    <option value="organic-food">Organic Nutrition</option>
                    <option value="wellness">Elite Wellness</option>
                    <option value="agriculture">Pure Seeds</option>
                    <option value="body-care">Natural Bodycare</option>
                </select>
            </div>

            <div class="input-cell">
                <label>Unit Valuation (₹)</label>
                <input type="number" id="pPrice" required placeholder="0.00">
            </div>

            <div class="input-cell">
                <label>Market Discount (%)</label>
                <input type="number" id="pDisc" value="0">
            </div>

            <div class="input-cell">
                <label>Stock Quantum</label>
                <input type="number" id="pStock" required placeholder="50">
            </div>

            <div class="input-cell">
                <label>Media Payload [Images]</label>
                <div class="media-factory" id="mediaZone">
                    <div class="file-row">
                        <input type="file" class="payload-file" accept="image/*" required>
                    </div>
                </div>
                <button type="button" class="add-slot-btn" onclick="addPayloadSlot()">+ Initiate New Media Slot</button>
            </div>

            <div class="input-cell full-cell">
                <label>Marketing Hero Line</label>
                <input type="text" id="pHero" placeholder="The single most important selling point...">
            </div>

            <div class="input-cell full-cell">
                <label>Full Technical Description</label>
                <textarea id="pLong" rows="8" placeholder="Detailed product story and specifications..."></textarea>
            </div>

            <div class="input-cell full-cell">
                <label>Constituents / Ingredients (Comma-Separated)</label>
                <textarea id="pIng" rows="2" placeholder="Item A, Item B, Item C..."></textarea>
            </div>
        </div>

        <div class="sync-rail" id="syncRail"><div class="sync-flow" id="syncFlow"></div></div>
        <button type="submit" id="coreExecute">Execute Cloud Injection</button>
    </form>

    <div class="feed-section">
        <div class="feed-header">
            <span>Live Database Stream</span>
            <span id="streamStatus" style="font-size:10px;">• SYNC_ACTIVE</span>
        </div>
        <div id="realtimeFeed">
            <p style="padding:40px; text-align:center;">CONNECTING TO PROTOCOL...</p>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getStorage, ref as sRef, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

    const config = {
        apiKey: "AIzaSyDVIz9_OlUcxl-Dy5oFa_yV6LPPNLp1M80",
        authDomain: "nemi-mart-2.firebaseapp.com",
        databaseURL: "https://nemi-mart-2-default-rtdb.firebaseio.com",
        projectId: "nemi-mart-2",
        storageBucket: "nemi-mart-2.firebasestorage.app",
        messagingSenderId: "787406811321",
        appId: "1:787406811321:web:c2306258fccb0bb171eb68"
    };

    const app = initializeApp(config);
    const db = getDatabase(app);
    const storage = getStorage(app);

    // DYNAMIC SLOTS
    window.addPayloadSlot = () => {
        const zone = document.getElementById('mediaZone');
        const div = document.createElement('div');
        div.className = 'file-row';
        div.innerHTML = '<input type="file" class="payload-file" accept="image/*">';
        zone.appendChild(div);
    };

    // CUSTOM NOTIFICATIONS
    function showToast(msg) {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = msg;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 4000);
    }

    // UPLOAD PROTOCOL
    document.getElementById('masterForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('coreExecute');
        const rail = document.getElementById('syncRail');
        const flow = document.getElementById('syncFlow');

        btn.disabled = true;
        btn.innerText = "UPLOADING PAYLOAD...";
        rail.style.display = 'block';

        const inputs = document.querySelectorAll('.payload-file');
        const imageUrls = [];

        try {
            for(let input of inputs) {
                const file = input.files[0];
                if(!file) continue;

                const path = `nemi_v4/${Date.now()}_${file.name}`;
                const storageRef = sRef(storage, path);
                const task = uploadBytesResumable(storageRef, file);

                await new Promise((resolve, reject) => {
                    task.on('state_changed', 
                        (s) => { flow.style.width = (s.bytesTransferred / s.totalBytes) * 100 + "%" },
                        reject,
                        async () => {
                            const url = await getDownloadURL(task.snapshot.ref);
                            imageUrls.push(url);
                            resolve();
                        }
                    );
                });
            }

            const p = parseFloat(document.getElementById('pPrice').value);
            const d = parseFloat(document.getElementById('pDisc').value);
            const newRef = push(ref(db, 'products'));

            await set(newRef, {
                title: document.getElementById('pTitle').value,
                category: document.getElementById('pCat').value,
                price: p,
                discount: d,
                finalPrice: p - (p * (d/100)),
                stock: document.getElementById('pStock').value,
                images: imageUrls,
                hero: document.getElementById('pHero').value,
                description: document.getElementById('pLong').value,
                ingredients: document.getElementById('pIng').value.split(','),
                status: 'INSTOCK',
                timestamp: Date.now()
            });

            showToast("DATABASE INJECTION SUCCESSFUL");
            document.getElementById('masterForm').reset();
        } catch (err) {
            showToast("ERROR: " + err.message);
        } finally {
            btn.disabled = false;
            btn.innerText = "Execute Cloud Injection";
            rail.style.display = 'none';
        }
    });

    // REAL-TIME STREAM (RTDB MAGIC)
    onValue(ref(db, 'products'), (snapshot) => {
        const feed = document.getElementById('realtimeFeed');
        feed.innerHTML = "";
        const data = snapshot.val();
        
        if(!data) {
            feed.innerHTML = "<p style='padding:40px; text-align:center;'>DATABASE VACANT. AWAITING PAYLOAD.</p>";
            return;
        }

        Object.keys(data).reverse().forEach(key => {
            const prod = data[key];
            const isOut = prod.status === 'OUTSTOCK';

            feed.innerHTML += `
                <div class="product-strip">
                    <img src="${prod.images ? prod.images[0] : 'https://via.placeholder.com/100'}">
                    <div class="info-block">
                        <span class="tag-status ${isOut ? 'out-tag' : 'active-tag'}">${prod.status}</span>
                        <h3>${prod.title}</h3>
                        <p>ID: ${key} | Price: ₹${prod.finalPrice} | Stock: ${prod.stock}</p>
                    </div>
                    <div class="op-controls">
                        <button class="op-btn" onclick="toggleStatus('${key}', '${prod.status}')">Flip Status</button>
                        <button class="op-btn op-del" onclick="wipeData('${key}')">Wipe</button>
                    </div>
                </div>
            `;
        });
    });

    // CONTROL LOGIC
    window.toggleStatus = (id, current) => {
        const next = current === 'INSTOCK' ? 'OUTSTOCK' : 'INSTOCK';
        update(ref(db, 'products/' + id), { status: next });
        showToast("STATUS UPDATED");
    };

    window.wipeData = (id) => {
        if(confirm("PERMANENTLY WIPE THIS PRODUCT?")) {
            remove(ref(db, 'products/' + id));
            showToast("PRODUCT REMOVED");
        }
    };

</script>
</body>
</html>
