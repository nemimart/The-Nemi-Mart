<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nemi Mart | Premium Updates</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root {
            --gold: #D4AF37;
            --gold-light: #F9F1D7;
            --cream: #FFFDF5;
            --success: #10B981; /* Green Theme */
            --dark: #1A1A1A;
            --text-muted: #71717A;
            --radius: 24px;
            --shadow: 0 15px 35px -5px rgba(212, 175, 55, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--cream);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--dark);
            min-height: 100vh;
        }

        /* Top Navigation */
        .navbar {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(15px);
            position: sticky; top: 0; z-index: 1000;
            padding: 15px 20px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1.5px solid var(--gold-light);
        }

        .nav-title h1 { font-family: 'Outfit', sans-serif; font-size: 20px; font-weight: 800; }
        
        .back-circle {
            width: 40px; height: 40px; border-radius: 12px;
            background: white; border: 1px solid var(--gold-light);
            display: flex; align-items: center; justify-content: center;
        }

        /* Feed Styling */
        .container { max-width: 500px; margin: 0 auto; padding: 20px; }

        .feed-info {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px;
        }

        .badge-green {
            background: #D1FAE5; color: var(--success);
            padding: 5px 12px; border-radius: 50px; font-size: 11px; font-weight: 800;
        }

        .notif-card {
            background: white;
            border-radius: var(--radius);
            padding: 20px; margin-bottom: 15px;
            display: flex; gap: 15px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(212, 175, 55, 0.1);
            position: relative;
            animation: popIn 0.5s ease backwards;
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .icon-box {
            width: 50px; height: 50px; border-radius: 16px;
            background: var(--gold-light); color: var(--gold);
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; flex-shrink: 0;
        }

        .content-box { flex: 1; }
        .content-box h3 { font-size: 16px; font-weight: 800; margin-bottom: 4px; color: var(--dark); }
        .content-box p { font-size: 13.5px; color: var(--text-muted); line-height: 1.5; }

        .time-stamp {
            margin-top: 10px; font-size: 11px; font-weight: 700;
            color: var(--gold); display: flex; align-items: center; gap: 5px;
        }

        .delete-btn {
            position: absolute; right: 15px; top: 15px;
            background: #FEE2E2; color: #EF4444;
            border: none; padding: 6px; border-radius: 8px; font-size: 12px;
        }

        /* Loader & Empty */
        #loader { text-align: center; padding: 50px; }
        .empty-view { text-align: center; padding: 100px 20px; display: none; }
        .empty-view i { font-size: 60px; color: var(--gold-light); margin-bottom: 15px; }

        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: var(--dark); color: white; padding: 12px 25px;
            border-radius: 50px; font-size: 14px; z-index: 2000; display: none;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="back-circle" onclick="window.history.back()"><i class="fa-solid fa-chevron-left"></i></div>
        <div class="nav-title"><h1>Updates</h1></div>
        <div style="width: 40px;"></div>
    </nav>

    <main class="container">
        <div class="feed-info">
            <span class="badge-green">LIVE UPDATES</span>
            <span onclick="clearAll()" style="color: #EF4444; font-size: 12px; font-weight: 700; cursor: pointer;">Clear All</span>
        </div>

        <div id="loader"><i class="fas fa-spinner fa-spin" style="color: var(--gold);"></i> Connecting...</div>
        
        <div id="notif-list"></div>

        <div id="empty-view" class="empty-view">
            <i class="fa-solid fa-bell-slash"></i>
            <h3>No Updates Yet</h3>
            <p>Admin hasn't posted anything new.</p>
        </div>
    </main>

    <div id="toast" class="toast">Action Done ✨</div>

    <script>
        // 1. Firebase Config
        const firebaseConfig = {
            databaseURL: "https://nemi-mart-2-default-rtdb.firebaseio.com/"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // 2. Main Logic
        function loadNotifications() {
            const listDiv = document.getElementById('notif-list');
            const loader = document.getElementById('loader');
            const empty = document.getElementById('empty-view');

            // Listening to 'notifications' node
            database.ref('notifications').on('value', (snapshot) => {
                loader.style.display = 'none';
                listDiv.innerHTML = '';
                
                const data = snapshot.val();

                if (!data) {
                    empty.style.display = 'block';
                    return;
                }

                empty.style.display = 'none';
                
                // Latest first
                const entries = Object.entries(data).reverse();

                entries.forEach(([id, item]) => {
                    const card = document.createElement('div');
                    card.className = 'notif-card';
                    
                    // Dynamic Icon based on type
                    let icon = 'fa-star';
                    if(item.type === 'sale') icon = 'fa-tag';
                    if(item.type === 'order') icon = 'fa-box';

                    card.innerHTML = `
                        <div class="icon-box"><i class="fa-solid ${icon}"></i></div>
                        <div class="content-box">
                            <h3>${item.title || 'Nemi Mart Update'}</h3>
                            <p>${item.message || 'Check out our new premium collections.'}</p>
                            <div class="time-stamp">
                                <i class="fa-regular fa-clock"></i> 
                                ${item.timestamp ? new Date(item.timestamp).toLocaleTimeString() : 'Just Now'}
                            </div>
                        </div>
                        <button class="delete-btn" onclick="deleteItem('${id}')"><i class="fa-solid fa-trash"></i></button>
                    `;
                    listDiv.appendChild(card);
                });
            }, (error) => {
                console.error("Firebase Error:", error);
                loader.innerText = "Database Connection Failed!";
            });
        }

        // 3. Database Functions
        function deleteItem(id) {
            database.ref('notifications/' + id).remove().then(() => {
                showToast("Removed!");
            });
        }

        function clearAll() {
            if(confirm("Sare notifications delete karein?")) {
                database.ref('notifications').remove();
            }
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 2000);
        }

        // Start
        window.onload = loadNotifications;
    </script>
</body>
</html>
